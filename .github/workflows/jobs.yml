name: 台灣實習雷達每日更新

on:
  schedule:
    - cron: "0 1 * * *"      # 每天 01:00 UTC = 台灣 09:00
  workflow_dispatch:          # 也可手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 抓取台灣技術實習
        run: python jobs_radar.py
      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add career/jobs.json
          git diff --staged --quiet || git commit -m "台灣實習雷達每日更新"
          git push
