<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Royalty dApp · 音樂版稅智慧合約</title>
<meta name="description" content="A working Ethereum dApp: configurable music royalty smart contract that auto-splits payments by share. By Elaine Chi.">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Inter","PingFang TC",system-ui,sans-serif;background:linear-gradient(160deg,#14161c,#26262f);
       color:#e8e6e0;min-height:100vh;padding:26px 16px 60px}
  .wrap{max-width:760px;margin:0 auto}
  h1{font-size:25px;text-align:center}
  .sub{text-align:center;color:#9aa4b2;font-size:14px;margin:6px 0 4px}
  .addr{text-align:center;font-size:12px;margin-bottom:20px}
  .addr a{color:#7fb5ff;text-decoration:none;word-break:break-all}
  .card{background:#1b1e26;border:1px solid #2a2f3a;border-radius:16px;padding:20px;margin-bottom:16px}
  .stats{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .stat{flex:1;min-width:130px;text-align:center;background:#20242e;border-radius:12px;padding:14px}
  .stat .n{font-size:28px;font-weight:800;color:#7fb5ff}
  .stat .l{font-size:13px;color:#9aa4b2;margin-top:4px}
  h2{font-size:15px;color:#9aa4b2;margin-bottom:12px}
  #bar{display:flex;height:30px;border-radius:8px;overflow:hidden;margin:4px 0 14px}
  #bar div{display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#0b0d12;min-width:0;overflow:hidden}
  .payee{display:flex;align-items:center;justify-content:space-between;padding:11px 4px;border-bottom:1px solid #262b36}
  .payee:last-child{border:none}
  .who{font-weight:700;font-size:14px}.who small{display:block;color:#8a8576;font-weight:400;font-size:11px;word-break:break-all}
  .bal{font-size:15px;font-weight:800;text-align:right}.bal small{display:block;color:#9aa4b2;font-weight:400;font-size:11px}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px;vertical-align:middle}
  button{background:#1f3a56;color:#7fb5ff;border:1px solid #2b5680;border-radius:10px;
         padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer}
  button:hover{background:#254a6e}
  button:disabled{opacity:.5;cursor:not-allowed}
  .btn-primary{background:#7fb5ff;color:#0b0d12;border:none}.btn-primary:hover{background:#9cc7ff}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
  input{background:#0f1116;border:1px solid #2a2f3a;color:#e8e6e0;border-radius:10px;padding:10px 12px;font-size:14px}
  input.amt{width:110px}input.share{width:90px}input.address{flex:1;min-width:200px}
  .status{margin-top:14px;font-size:13px;color:#9aa4b2;min-height:18px;word-break:break-word}
  .ok{color:#8ff0b0}.err{color:#ff9a9a}
  .ownerbox{border-top:1px dashed #2a2f3a;margin-top:14px;padding-top:14px}
  .hint{font-size:12px;color:#8a8576;margin-top:4px}
  .foot{text-align:center;color:#8a8576;font-size:12px;margin-top:22px;line-height:1.8}
  .foot a{color:#8a8576}
  .badge{display:inline-block;font-size:11px;background:#122a1c;color:#8ff0b0;border:1px solid #2f6b47;border-radius:20px;padding:2px 10px;margin-left:6px}
</style>
</head>
<body>
<div class="wrap">
  <h1>🎵 Music Royalty dApp <span class="badge">Sepolia testnet</span></h1>
  <div class="sub">可設定的音樂版稅智慧合約 · 付款自動按比例分潤</div>
  <div class="addr"><a id="ethlink" target="_blank"></a></div>

  <div class="card">
    <div class="stats">
      <div class="stat"><div class="n" id="total">…</div><div class="l">總收入 (ETH)</div></div>
      <div class="stat"><div class="n" id="count">…</div><div class="l">付款次數</div></div>
      <div class="stat"><div class="n" id="npayees">…</div><div class="l">收款人數</div></div>
    </div>
    <div style="font-size:13px;color:#9aa4b2;margin:14px 0 2px">分潤比例</div>
    <div id="bar"></div>
    <div id="payeeList"></div>
  </div>

  <div class="card">
    <h2>💰 付款(任何人都能付)</h2>
    <button id="connectBtn" onclick="connect()">🦊 連接錢包</button>
    <div class="row" id="payArea" style="display:none">
      <input id="amount" class="amt" type="number" step="0.001" value="0.005"> <span>ETH</span>
      <button class="btn-primary" id="payBtn" onclick="pay()">付款分潤</button>
    </div>
    <div class="ownerbox" id="ownerArea" style="display:none">
      <h2>👑 擁有者功能(只有合約擁有者能用)</h2>
      <div class="row">
        <input id="addAddr" class="address" placeholder="新收款人地址 0x...">
        <input id="addShare" class="share" type="number" placeholder="份數" value="10">
        <button onclick="addPayee()">➕ 加人</button>
      </div>
      <div class="row">
        <input id="setAddr" class="address" placeholder="要改的收款人地址 0x...">
        <input id="setShare" class="share" type="number" placeholder="新份數" value="30">
        <button onclick="changeShare()">✏️ 改比例</button>
      </div>
      <div class="hint">份數是相對的：50/25/25 時總份數 100，某人拿「他的份數 ÷ 總份數」。</div>
    </div>
    <div class="status" id="status">初始化中…</div>
  </div>

  <div class="foot">
    Built by Elaine Chi · Solidity + ethers.js · <a id="etherfoot" target="_blank">在 Etherscan 上驗證</a><br>
    部署在 Ethereum Sepolia 測試網的真實智慧合約（非模擬）。
  </div>
</div>

<script>
// 任何未捕捉的錯誤都顯示在畫面上，方便除錯
window.addEventListener('error', function(ev){
  var s=document.getElementById('status');
  if(s){ s.textContent="⚠️ 錯誤："+(ev.message||'資源載入失敗'); s.className="status err"; }
});

const CONTRACT="0x6E44Ad35de5Aa0c33750f9a24FeB94A5b730a503";
const RPCS=["https://sepolia.drpc.org","https://sepolia.gateway.tenderly.co","https://0xrpc.io/sep","https://api.zan.top/eth-sepolia"];
const SEPOLIA_HEX="0xaa36a7";
const COLORS=["#7fb5ff","#f0d68a","#8ff0b0","#d6a3ff","#ff9a9a","#7ee0d0","#ffb27f"];
const ABI=[
  "function owner() view returns (address)",
  "function payeesCount() view returns (uint256)",
  "function payees(uint256) view returns (address)",
  "function shareOf(address) view returns (uint256)",
  "function totalShares() view returns (uint256)",
  "function totalReceived() view returns (uint256)",
  "function paymentCount() view returns (uint256)",
  "function pay() payable",
  "function addPayee(address,uint256)",
  "function setShare(address,uint256)"
];
const ES="https://sepolia.etherscan.io/address/"+CONTRACT;
document.getElementById('ethlink').textContent="合約："+CONTRACT+" ↗";
document.getElementById('ethlink').href=ES;
document.getElementById('etherfoot').href=ES;
let connectedAddr=null, ownerAddr=null, SEPOLIA_NET=null;
function setStatus(m,c){const s=document.getElementById('status');s.textContent=m;s.className="status "+(c||"");}

// 依序嘗試多個 CDN 載入 ethers.js
function loadEthers(){
  const urls=[
    "https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js",
    "https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js",
    "https://unpkg.com/ethers@6.13.4/dist/ethers.umd.min.js"
  ];
  return new Promise((resolve,reject)=>{
    let i=0;
    (function next(){
      if(i>=urls.length){ reject(new Error("ethers.js 載入失敗(你的網路可能擋了這些 CDN)")); return; }
      const s=document.createElement('script');
      s.src=urls[i++]; s.onload=resolve; s.onerror=next;
      document.head.appendChild(s);
    })();
  });
}

async function readProvider(){
  let lastErr;
  for(const u of RPCS){
    try{ const p=new ethers.JsonRpcProvider(u,SEPOLIA_NET,{staticNetwork:SEPOLIA_NET}); await p.getBlockNumber(); return p; }
    catch(e){ lastErr=e; }
  }
  throw new Error("所有 RPC 都連不上"+(lastErr?("："+lastErr.message):""));
}
const fmt=(w)=>Number(ethers.formatEther(w)).toFixed(4);

async function load(){
  try{
    const p=await readProvider();
    const c=new ethers.Contract(CONTRACT,ABI,p);
    const [t,n,cnt,ts,ownr]=await Promise.all([
      c.totalReceived(),c.paymentCount(),c.payeesCount(),c.totalShares(),c.owner()]);
    ownerAddr=ownr.toLowerCase();
    document.getElementById('total').textContent=fmt(t);
    document.getElementById('count').textContent=cnt.toString();
    document.getElementById('npayees').textContent=n.toString();
    const bar=document.getElementById('bar'); bar.innerHTML="";
    const list=document.getElementById('payeeList'); list.innerHTML="";
    const total=Number(ts);
    for(let i=0;i<Number(n);i++){
      const addr=await c.payees(i);
      const [sh,bal]=await Promise.all([c.shareOf(addr),p.getBalance(addr)]);
      const pct=total>0?Math.round(Number(sh)/total*100):0;
      const col=COLORS[i%COLORS.length];
      const seg=document.createElement('div'); seg.style.background=col; seg.style.width=pct+"%"; seg.textContent=pct+"%"; bar.appendChild(seg);
      const row=document.createElement('div'); row.className="payee";
      row.innerHTML=`<div class="who"><span class="dot" style="background:${col}"></span>收款人 ${i+1}（份數 ${sh}）<small>${addr}</small></div><div class="bal">${fmt(bal)} ETH<small>${pct}%</small></div>`;
      list.appendChild(row);
    }
    document.getElementById('ownerArea').style.display=(connectedAddr && connectedAddr===ownerAddr)?"block":"none";
    setStatus("✅ 已讀取鏈上資料 · "+new Date().toLocaleTimeString(),"ok");
  }catch(e){ setStatus("⚠️ 讀取失敗："+(e.message||e),"err"); }
}

async function getSigner(){
  const bp=new ethers.BrowserProvider(window.ethereum);
  const net=await bp.getNetwork();
  if(net.chainId!==11155111n){
    try{ await window.ethereum.request({method:"wallet_switchEthereumChain",params:[{chainId:SEPOLIA_HEX}]}); }catch(e){}
  }
  return await new ethers.BrowserProvider(window.ethereum).getSigner();
}
async function connect(){
  if(!window.ethereum){ setStatus("找不到 MetaMask，請先安裝。","err"); return; }
  try{
    setStatus("連接中…");
    await window.ethereum.request({method:"eth_requestAccounts"});
    const s=await getSigner();
    connectedAddr=(await s.getAddress()).toLowerCase();
    document.getElementById('connectBtn').textContent="✅ "+connectedAddr.slice(0,6)+"…"+connectedAddr.slice(-4);
    document.getElementById('payArea').style.display="flex";
    setStatus("錢包已連接。","ok"); load();
  }catch(e){ setStatus("連接失敗："+(e.message||e),"err"); }
}
async function sendTx(fn){
  if(!window.ethereum){ setStatus("請先安裝 MetaMask。","err"); return; }
  try{
    setStatus("請在 MetaMask 確認交易…");
    const s=await getSigner();
    const c=new ethers.Contract(CONTRACT,ABI,s);
    const tx=await fn(c);
    setStatus("交易送出，等待上鏈… "+tx.hash.slice(0,12)+"…");
    await tx.wait(); setStatus("✅ 成功！","ok"); load();
  }catch(e){ setStatus("失敗："+(e.shortMessage||e.message||e),"err"); }
}
function pay(){ sendTx(c=>c.pay({value:ethers.parseEther(document.getElementById('amount').value)})); }
function addPayee(){ const a=document.getElementById('addAddr').value.trim(); if(!a){setStatus("請填地址。","err");return;} sendTx(c=>c.addPayee(a,document.getElementById('addShare').value)); }
function changeShare(){ const a=document.getElementById('setAddr').value.trim(); if(!a){setStatus("請填地址。","err");return;} sendTx(c=>c.setShare(a,document.getElementById('setShare').value)); }

// 啟動
setStatus("載入 ethers.js…");
loadEthers().then(()=>{
  SEPOLIA_NET=new ethers.Network("sepolia",11155111);
  setStatus("讀取鏈上資料…");
  load(); setInterval(load,15000);
}).catch(e=>{ setStatus("⚠️ "+e.message,"err"); });
</script>
</body>
</html>
