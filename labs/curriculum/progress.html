<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 每日課程進度｜技能實驗室</title>
<meta name="description" content="求職技能衝刺課程：依104人力銀行AI人才趨勢報告排序，每天一課，累積到能在面試講清楚為止。">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#10131a; --panel:#161b24; --panel2:#1d2430; --line:#2a3140;
    --tx:#e7ecf3; --mut:#8b97a8; --acc:#7fb5ff; --acc2:#5b8def;
    --green:#3ec97a; --yellow:#e8b94a; --red:#ef6b6b; --gold:#e0c060;
    --grad:linear-gradient(135deg,#3a6ea5,#7c5cff);
  }
  body{font-family:"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
       background:var(--bg);color:var(--tx);min-height:100vh;font-size:16px;line-height:1.6}
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(1100px 560px at 75% -8%,rgba(70,100,180,.14),transparent 60%),
               radial-gradient(900px 520px at -5% 105%,rgba(130,70,160,.11),transparent 60%);}
  .topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;
    padding:10px 18px;background:rgba(11,13,18,.82);
    -webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
  .topbar .brand{font-weight:800;font-size:16px;letter-spacing:.5px}
  .topbar a{color:#9aa4b2;text-decoration:none;font-size:13.5px;font-weight:600;padding:6px 13px;border-radius:8px;white-space:nowrap}
  .topbar a:hover{background:#161922;color:#e6e6e6}
  .topbar .sp{margin-left:auto}
  .wrap{max-width:1060px;margin:0 auto;padding:26px 18px 90px}
  h1{font-size:25px;margin-bottom:4px}
  .sub{color:var(--mut);font-size:14px;margin-bottom:20px}

  .cdrow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .cd{flex:1;min-width:180px;background:linear-gradient(135deg,#1b2030,#13161d 70%);
      border:1px solid var(--line);border-radius:14px;padding:13px 16px;display:flex;align-items:baseline;gap:10px}
  .cd .n{font-size:30px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums}
  .cd .l{font-size:13px;color:#cfd6e2}
  .cd .d{font-size:12px;color:var(--mut);margin-left:auto}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:10px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px 16px}
  .stat b{font-size:26px;color:var(--acc);display:block;font-variant-numeric:tabular-nums}
  .stat span{font-size:13px;color:var(--mut)}
  .pbar{height:9px;background:var(--panel2);border-radius:99px;overflow:hidden;margin:16px 0 26px;border:1px solid var(--line)}
  .pbar i{display:block;height:100%;background:var(--grad);border-radius:99px;transition:width .6s}

  .act{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px}
  .act-h{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .act-h .tag{background:var(--grad);color:#fff;font-weight:800;font-size:13px;border-radius:8px;padding:3px 10px;letter-spacing:1px}
  .act-h .name{font-weight:700;font-size:16px}
  .act-h .cnt{margin-left:auto;font-size:12.5px;color:var(--mut);font-variant-numeric:tabular-nums}
  .trow{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;border-left:4px solid var(--line);
        background:var(--panel2);margin-bottom:7px}
  .trow.done{border-left-color:var(--green)}
  .trow.today{border-left-color:var(--acc2);box-shadow:0 0 0 1px rgba(91,141,239,.35)}
  .trow .st{font-size:12px;font-weight:700;white-space:nowrap;width:86px;flex-shrink:0}
  .trow.done .st{color:var(--green)}
  .trow.todo .st{color:var(--mut)}
  .trow.today .st{color:var(--acc)}
  .trow .t{font-size:14.5px;flex:1;min-width:0}
  .trow .t a{color:var(--tx);text-decoration:none;border-bottom:1px dotted #3a4152}
  .trow .t a:hover{color:var(--acc)}
  .trow .meta{font-size:11.5px;color:var(--mut);white-space:nowrap;font-variant-numeric:tabular-nums}
  .pill{font-size:11px;padding:1px 8px;border-radius:20px;background:#0f1219;border:1px solid var(--line);color:var(--mut);white-space:nowrap}
  .foot{color:var(--mut);font-size:12.5px;margin-top:24px;text-align:center}
  @media(max-width:560px){ .trow .meta{display:none} .cd .n{font-size:24px} }
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">📚 每日課程進度</span>
  <a href="./index.html">🧪 技能實驗室</a>
  <a href="./certs.html">📋 認證任務清單</a>
  <span class="sp"></span>
  <a href="../../index.html">🏠 學習中心</a>
  <a href="../../resume/">👤 我的履歷</a>
</div>

<div class="wrap">
<h1>求職技能衝刺課程</h1>
<div class="sub">依 104 人力銀行 AI 人才趨勢報告排序（流程自動化／NLP／預測分析為成長最快硬技能）：每天一課，學到能在面試現場講清楚為止，累積夠了再挑出來做成技能實驗室的真專案。每日凌晨自動產出一篇。</div>

<div class="cdrow" id="cds"></div>

<div class="stats" id="stats"></div>
<div class="pbar"><i id="pfill" style="width:0%"></i></div>

<div id="board"></div>

<div class="foot" id="foot"></div>
</div>

<script>
const ACTS = {
  M1:"人工智慧核心概念", M2:"生成式AI應用開發", M3:"深度學習應用實戰",
  M4:"前端開發", M5:"後端與資料庫", M6:"量化交易",
  M7:"機器學習核心", M8:"Python與爬蟲", M9:"深度學習模型延伸", M10:"行銷與商業"
};
const ORDER = ["M1","M2","M3","M4","M5","M6","M7","M8","M9","M10"];
const JOB_SPRINT_START = "2026-10-01"; // 求職主戰場開跑日，對齊「2026下半年戰略地圖」

function dstr(d){return d.toISOString().slice(0,10);}
function dleft(target){ const ms=new Date(target+"T00:00:00")-new Date(new Date().toDateString()); return Math.ceil(ms/86400000); }

fetch("data/progress.json").then(r=>r.json()).then(D=>{
  const today = dstr(new Date());

  const n = dleft(JOB_SPRINT_START);
  document.getElementById("cds").innerHTML = n>0
    ? `<div class="cd"><span class="n">D-${n}</span><span class="l">求職主戰場開跑（10月）</span><span class="d">${JOB_SPRINT_START.slice(5).replace("-","/")}</span></div>`
    : `<div class="cd"><span class="n">已開跑</span><span class="l">求職主戰場進行中</span></div>`;

  const done = D.lessons.filter(t=>t.status==="done");
  const slides = done.reduce((s,t)=>s+(t.slides||0),0);
  const pct = Math.round(done.length/D.lessons.length*100);
  document.getElementById("stats").innerHTML = `
    <div class="stat"><b>${done.length}<span style="font-size:15px;color:var(--mut)"> / ${D.lessons.length}</span></b><span>已完成課程</span></div>
    <div class="stat"><b>${slides}</b><span>累積投影片（張）</span></div>
    <div class="stat"><b>${pct}%</b><span>課程完成率</span></div>`;
  document.getElementById("pfill").style.width = pct+"%";

  let html="";
  ORDER.forEach(a=>{
    const list = D.lessons.filter(t=>t.act===a);
    if(!list.length) return;
    const dn = list.filter(t=>t.status==="done").length;
    const firstTodoIdx = D.lessons.findIndex(t=>t.status==="todo");
    html += `<div class="act"><div class="act-h"><span class="tag">${a}</span><span class="name">${ACTS[a]||""}</span><span class="cnt">${dn}／${list.length}</span></div>`;
    list.forEach(t=>{
      const globalIdx = D.lessons.findIndex(x=>x.id===t.id);
      const isNext = t.status!=="done" && globalIdx===firstTodoIdx;
      const cls = t.status==="done" ? "done" : (isNext ? "today":"todo");
      const st  = t.status==="done" ? "✓ "+(t.date? t.date.slice(5).replace("-","/"):"") : (isNext ? "● 下一課" : "○ 排隊中");
      const title = t.status==="done" && t.url ? `<a href="${t.url}">${t.title}</a>` : t.title;
      const meta = t.status==="done" ? `${t.slides||0} 張投影片` : "";
      html += `<div class="trow ${cls}"><span class="st">${st}</span><span class="t">${title}</span><span class="meta">${meta}</span><span class="pill">${t.topic}</span></div>`;
    });
    html += `</div>`;
  });
  document.getElementById("board").innerHTML = html;
  document.getElementById("foot").textContent = `資料更新：${D.updated}・由每日雲端自動流程維護｜技能實驗室 © 2026 姬政妤`;
}).catch(e=>{
  document.getElementById("board").innerHTML = `<div class="act">面板資料載入失敗：${e}</div>`;
});
</script>
</body>
</html>
