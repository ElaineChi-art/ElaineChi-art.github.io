  .toggle .sw::after{content:"";position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;

  #guide{position:fixed;z-index:18;top:54px;left:0;bottom:0;width:392px;max-width:42vw;
    display:flex;flex-direction:column;border-right:1px solid var(--line);
    background:var(--panel);backdrop-filter:blur(10px)}
  #guideHead{padding:18px 24px 12px;border-bottom:1px solid var(--line)}
  #guideHead .phase{font-size:11px;letter-spacing:.22em;color:var(--blue);font-weight:700;font-family:ui-monospace,monospace}
  #guideHead h2{font-size:21px;font-weight:800;margin-top:6px;line-height:1.25;letter-spacing:-.01em}
  #guideBody{flex:1;overflow-y:auto;padding:18px 24px 8px}
  #guideBody p{font-size:14px;line-height:1.78;color:#2c3447;margin-bottom:14px}
  #guideBody code{font-family:ui-monospace,Menlo,monospace;font-size:12.5px;background:#eef1f6;
    border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:#1d2b4d}
  #guideBody .eq{font-family:ui-monospace,Menlo,monospace;font-size:13px;background:#0f1626;color:#bfe6ff;
    border-radius:9px;padding:13px 15px;margin:4px 0 16px;line-height:1.7;overflow-x:auto}
  #guideBody .eq b{color:#ffd479}
  #guideBody .eq .c{color:#6fcf97}
  .legalNote{display:none;margin:2px 0 16px;padding:12px 14px;border-left:3px solid var(--purple);
    background:rgba(123,84,214,.07);border-radius:0 8px 8px 0}
  .legalNote.show{display:block}
  .legalNote .lk{font-size:10.5px;letter-spacing:.2em;color:var(--purple);font-weight:700;margin-bottom:5px}
  .legalNote p{font-size:12.5px;line-height:1.7;color:#3a3357;margin:0}
  #guideNav{display:flex;align-items:center;gap:10px;padding:13px 24px;border-top:1px solid var(--line)}
  #guideNav button{flex:1;border:1px solid var(--line);background:#fff;cursor:pointer;font:inherit;
    font-size:13px;font-weight:600;padding:9px;border-radius:9px;color:var(--ink);transition:.16s}
  #guideNav button:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}
  #guideNav button:disabled{opacity:.4;cursor:default}
  #guideNav .nx{background:var(--ink);color:#fff;border-color:var(--ink)}
  #guideNav .nx:hover{background:#2b3650}
  #steps{display:flex;gap:5px;padding:0 24px 16px;flex-wrap:wrap}
  #steps .d{flex:1;min-width:14px;height:4px;border-radius:3px;background:#d3dae6;cursor:pointer;transition:.2s}
  #steps .d.on{background:var(--blue)}

  /* legend + hint */
  #legend{position:fixed;z-index:16;right:16px;bottom:14px;display:flex;flex-direction:column;gap:6px;
    background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-size:11px;color:var(--ink2)}
  #legend .row{display:flex;align-items:center;gap:7px}
  #legend .sw{width:11px;height:11px;border-radius:3px}
  #hint{position:fixed;z-index:16;right:16px;top:64px;font-size:11px;color:var(--ink2);
    background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:7px 11px}

  /* tooltip */
  #tip{position:fixed;z-index:30;pointer-events:none;display:none;background:#0f1626;color:#eaf2ff;
    border-radius:8px;padding:8px 11px;font-family:ui-monospace,Menlo,monospace;font-size:12px;
    box-shadow:0 8px 24px rgba(10,18,40,.35);line-height:1.5;max-width:280px}
  #tip b{color:#ffd479}
  #tip .v{color:#7ee0a6}

  /* loading */
  #load{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
    background:var(--bg0);font-size:13px;color:var(--ink2);letter-spacing:.1em;transition:opacity .5s}
  #load.off{opacity:0;pointer-events:none}

  @media(max-width:720px){#guide{width:100%;max-width:100%;height:46vh;top:auto;bottom:0;border-right:0;border-top:1px solid var(--line)}
    #legend,#hint{display:none}}
</style>

  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ===================== renderer / scene ===================== */
const stage=document.getElementById('stage');
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x000000,0);
renderer.outputColorSpace=THREE.SRGBColorSpace;
stage.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.1,500);
camera.position.set(0,2,34);

scene.add(new THREE.HemisphereLight(0xffffff,0xc7d0de,1.05));
const dir=new THREE.DirectionalLight(0xffffff,1.15); dir.position.set(8,16,20); scene.add(dir);
const dir2=new THREE.DirectionalLight(0xdfe7f5,0.5); dir2.position.set(-12,4,-8); scene.add(dir2);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.09;
controls.target.set(0,1,0); controls.minDistance=4; controls.maxDistance=70;
let userDriving=false, followCam=true;
controls.addEventListener('start',()=>{userDriving=true;followCam=false;});

/* ===================== palette / helpers ===================== */
const COL={
  base:0xd8dee6, green:0x2fae5e, greenLo:0xdaf2e2, blue:0x2b6cb0, blueLo:0xd6e4f5,
  amber:0xe0a32a, amberLo:0xf7e9c8, purple:0x7b54d6, purpleLo:0xe6ddf8, red:0xe0556a,
  ink:0x1b2230, line:0x9aa6b8, dim:0xe3e7ee
};
const _c=new THREE.Color();
function lerpCol(loHex, hiHex, t){const a=new THREE.Color(loHex),b=new THREE.Color(hiHex);return a.lerp(b,Math.max(0,Math.min(1,t)));}

let pickables=[];     // instanced grids for raycasting
let tweens=[];        // active tweens
let tickers=[];       // per-frame ambient fns
let root=new THREE.Group(); scene.add(root);

function tween(ms, onUpd, onDone){tweens.push({t:0,ms,onUpd,onDone});}
function clearScene(){
  scene.remove(root);
  root.traverse(o=>{ if(o.geometry)o.geometry.dispose(); if(o.material){(Array.isArray(o.material)?o.material:[o.material]).forEach(m=>m.dispose());} });
  root=new THREE.Group(); scene.add(root);
  pickables=[]; tweens=[]; tickers=[];
}

/* ---- cell grid: rows x cols of cubes; each cell carries {value,label} ---- */
function grid(rows,cols,opt={}){
  const cw=opt.cell??0.5, gap=opt.gap??0.1, d=opt.depth??0.34;
  const n=rows*cols;
  const geo=new THREE.BoxGeometry(cw,cw,d);
  const mat=new THREE.MeshStandardMaterial({roughness:0.82,metalness:0.02});
  const mesh=new THREE.InstancedMesh(geo,mat,n);
  mesh.frustumCulled=false;
  const dummy=new THREE.Object3D();
  const W=cols*(cw+gap)-gap, H=rows*(cw+gap)-gap;
  const meta=[];
  let i=0;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const x=-W/2+c*(cw+gap)+cw/2, y=H/2-r*(cw+gap)-cw/2;
    dummy.position.set(x,y,0); dummy.updateMatrix(); mesh.setMatrixAt(i,dummy.matrix);
    mesh.setColorAt(i,_c.set(opt.base??COL.base));
    meta.push({r,c,x,y,value:'',label:''}); i++;
  }
  mesh.instanceMatrix.needsUpdate=true; mesh.instanceColor.needsUpdate=true;
  mesh.userData={rows,cols,cw,gap,W,H,meta};
  pickables.push(mesh);
  return mesh;
}
function setCell(mesh,r,c,o){const cols=mesh.userData.cols;const i=r*cols+c;const m=mesh.userData.meta[i];
  if(o.color!=null){mesh.setColorAt(i,_c.set(o.color));mesh.instanceColor.needsUpdate=true;}
  if(o.value!=null)m.value=o.value; if(o.label!=null)m.label=o.label;}
function fillRow(mesh,r,o){for(let c=0;c<mesh.userData.cols;c++)setCell(mesh,r,c,o);}
function fillAll(mesh,o){for(let r=0;r<mesh.userData.rows;r++)fillRow(mesh,r,o);}
function flashRow(mesh,r,hi,lo,ms=700){const cols=mesh.userData.cols;
  tween(ms,(t)=>{const k=Math.sin(t*Math.PI);for(let c=0;c<cols;c++){const i=r*cols+c;mesh.setColorAt(i,lerpCol(lo,hi,k));}mesh.instanceColor.needsUpdate=true;},
  ()=>{for(let c=0;c<cols;c++){const i=r*cols+c;mesh.setColorAt(i,_c.set(lo));}mesh.instanceColor.needsUpdate=true;});}

/* ---- text label (dark on translucent light plate; billboard) ---- */
function label(text,opt={}){
  const size=opt.size??42, lines=text.split('\n'), pad=opt.pad??16, lh=size*1.34;
  const cv=document.createElement('canvas'),x=cv.getContext('2d');
  x.font=`${opt.weight??700} ${size}px ${opt.mono?'ui-monospace,Menlo,monospace':'Inter,"Noto Sans TC",sans-serif'}`;
  let w=0;lines.forEach(l=>w=Math.max(w,x.measureText(l).width));
  cv.width=w+pad*2;cv.height=lh*lines.length+pad*1.1;
  const c=cv.getContext('2d');
  if(opt.plate!==false){c.fillStyle=opt.bg??'rgba(255,255,255,.9)';rr(c,0,0,cv.width,cv.height,12);c.fill();
    c.strokeStyle=opt.border??'rgba(150,166,184,.6)';c.lineWidth=2;rr(c,1,1,cv.width-2,cv.height-2,12);c.stroke();}
  c.font=`${opt.weight??700} ${size}px ${opt.mono?'ui-monospace,Menlo,monospace':'Inter,"Noto Sans TC",sans-serif'}`;
  c.textBaseline='middle';c.fillStyle=opt.color??'#1b2230';
  lines.forEach((l,i)=>c.fillText(l,pad,pad*0.55+lh*(i+0.5)));
  const tex=new THREE.CanvasTexture(cv);tex.anisotropy=8;tex.colorSpace=THREE.SRGBColorSpace;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:opt.depthTest!==false}));
  const s=opt.scale??1; sp.scale.set(cv.width/150*s,cv.height/150*s,1);
  return sp;
}
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
function put(obj,x,y,z){obj.position.set(x,y,z);return obj;}

/* ---- connector tube ---- */
function link(a,b,color=COL.line){
  const from=new THREE.Vector3(...a),to=new THREE.Vector3(...b);
  const dir=new THREE.Vector3().subVectors(to,from),len=dir.length();
  const m=new THREE.Mesh(new THREE.CylinderGeometry(.045,.045,len,8),
    new THREE.MeshStandardMaterial({color,roughness:.6}));
  m.position.copy(from).lerp(to,.5);
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir.normalize());
  const head=new THREE.Mesh(new THREE.ConeGeometry(.16,.42,12),new THREE.MeshStandardMaterial({color,roughness:.6}));
  head.position.copy(to);head.quaternion.copy(m.quaternion);
  const g=new THREE.Group();g.add(m);g.add(head);return g;
}
function caption(text,x,y,z,col){return put(label(text,{size:30,color:col?('#'+new THREE.Color(col).getHexString()):'#3a4760'}),x,y,z);}

/* ===================== WALKTHROUGH STATE ===================== */
let STEPS=[], cur=0, lawOn=false, technique='erc2981';
const phaseEl=document.getElementById('phase'),gTitle=document.getElementById('gTitle'),
      gBody=document.getElementById('guideBody'),stepsEl=document.getElementById('steps'),
      prevBtn=document.getElementById('prev'),nextBtn=document.getElementById('next'),
      brandSub=document.getElementById('brandSub'),legendEl=document.getElementById('legend');

function renderSteps(){stepsEl.innerHTML='';STEPS.forEach((s,i)=>{const d=document.createElement('div');
  d.className='d'+(i===cur?' on':i<cur?' done':'');d.onclick=()=>goto(i);stepsEl.appendChild(d);});}
function goto(i){
  cur=Math.max(0,Math.min(STEPS.length-1,i));
  const s=STEPS[cur];
  phaseEl.textContent=`STEP ${cur+1} / ${STEPS.length}`;
  gTitle.textContent=s.title;
  gBody.innerHTML=s.body + (s.legal?`<div class="legalNote ${lawOn?'show':''}"><div class="lk">論文視角 · 三層次</div><p>${s.legal}</p></div>`:'');
  prevBtn.disabled=cur===0; nextBtn.textContent=cur===STEPS.length-1?'完成 ✓':'下一步 →';
  renderSteps();
  followCam=true; userDriving=false;
  if(s.cam){camTargetPos.set(...s.cam.pos);camTargetTgt.set(...s.cam.tgt);}
  if(s.enter)s.enter();
}
prevBtn.onclick=()=>goto(cur-1); nextBtn.onclick=()=>goto(cur+1);
addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')goto(cur+1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')goto(cur-1);});

const camTargetPos=new THREE.Vector3(0,2,34),camTargetTgt=new THREE.Vector3(0,1,0);

/* law toggle */
const lawToggle=document.getElementById('lawToggle');
lawToggle.onclick=()=>{lawOn=!lawOn;lawToggle.classList.toggle('on',lawOn);goto(cur);};

/* technique switch */
document.getElementById('tech').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  [...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));
  technique=b.dataset.t; build(technique);
});

function setLegend(items){legendEl.innerHTML=items.map(([c,t])=>`<div class="row"><span class="sw" style="background:#${new THREE.Color(c).getHexString()}"></span>${t}</div>`).join('');}

/* fmt: wei → ETH */
function eth(wei){const v=wei/1e18; return (v>=1?v.toFixed(2):v.toFixed(3)).replace(/\.?0+$/,'')+' ETH';}

/* ===================== TECHNIQUE BUILDERS ===================== */
function build(t){
  document.getElementById('load').classList.remove('off');
  clearScene();
  if(t==='erc2981') buildERC2981();
  else if(t==='splitter') buildSplitter();
  else buildStream();
  cur=0; goto(0);
  setTimeout(()=>document.getElementById('load').classList.add('off'),120);
}

/* ---------------- ERC-2981 ---------------- */
function buildERC2981(){
  brandSub.textContent='Royalty Distribution · ERC-2981';
  setLegend([[COL.blue,'address / id'],[COL.amber,'value (wei)'],[COL.purple,'storage slot'],[COL.green,'result']]);

  // CALLDATA  (top-left)
  const cd=new THREE.Group(); put(cd,-11,7,0); root.add(cd);
  cd.add(put(label('CALLDATA  ·  royaltyInfo(uint256,uint256)',{size:30,scale:1.1}),0,2.4,0));
  const gCd=grid(3,8,{base:COL.dim}); cd.add(gCd);
  // selector row
  const sel=['2a','55','20','5a']; sel.forEach((h,c)=>setCell(gCd,0,c,{color:COL.blue,value:'0x'+h,label:'selector 0x2a55205a · royaltyInfo'}));
  for(let c=4;c<8;c++)setCell(gCd,0,c,{color:COL.dim,value:'··',label:'selector (4 bytes)'});
  fillRow(gCd,1,{color:COL.blueLo,value:'00',label:'arg0 tokenId = 1 (32-byte word)'});
  setCell(gCd,1,7,{color:COL.blue,value:'01',label:'tokenId = 1'});
  fillRow(gCd,2,{color:COL.amberLo,value:'00',label:'arg1 salePrice = 1e18 wei (1.0 ETH)'});
  ['0d','e0','b6','b3','a7','64','00','00'].forEach((h,c)=>setCell(gCd,2,c,{color:c>=0?COL.amber:COL.amber,value:h,label:'salePrice 0xDE0B6B3A7640000 = 1.0 ETH'}));
  cd.add(put(label('selector',{size:22,plate:false,color:'#2b6cb0'}),-3.4,0.95,0));
  cd.add(put(label('tokenId = 1',{size:22,plate:false,color:'#2b6cb0'}),3.9,0.3,0));
  cd.add(put(label('salePrice = 1.0 ETH',{size:22,plate:false,color:'#9a6a08'}),4.6,-0.6,0));

  // STORAGE (left-mid)
  const st=new THREE.Group(); put(st,-11,0.4,0); root.add(st);
  st.add(put(label('CONTRACT STORAGE  ·  persistent state',{size:30,scale:1.1}),0,2.5,0));
  const gSt=grid(3,8,{base:COL.purpleLo});
  st.add(gSt);
  // slot: _royalties[1] packed = receiver(20B addr) + royaltyFraction(uint96)
  fillRow(gSt,0,{color:COL.blueLo,value:'a1',label:'_royalties[1].receiver = creator address (20 bytes)'});
  for(let c=0;c<5;c++)setCell(gSt,0,c,{color:COL.blue,value:['c0','ffee','1234','beef','cafe'][c]||'··',label:'creator address (packed in slot)'});
  fillRow(gSt,1,{color:COL.purpleLo,value:'00',label:'_royalties[1].royaltyFraction (uint96)'});
  setCell(gSt,1,6,{color:COL.purple,value:'01',label:'royaltyFraction = 500'});
  setCell(gSt,1,7,{color:COL.purple,value:'f4',label:'royaltyFraction = 500  (0x1F4)'});
  fillRow(gSt,2,{color:COL.dim,value:'··',label:'_feeDenominator() = 10000 (constant)'});
  setCell(gSt,2,7,{color:COL.purple,value:'2710',label:'_feeDenominator = 10000 (0x2710)'});
  st.add(put(label('_royalties[1].receiver  (creator)',{size:21,plate:false,color:'#234e87'}),-1.0,0.95,0));
  st.add(put(label('royaltyFraction = 500  (5.00%)',{size:21,plate:false,color:'#5b3aa8'}),-0.4,0.05,0));
  st.add(put(label('_feeDenominator = 10000',{size:21,plate:false,color:'#5b3aa8'}),-0.9,-0.85,0));

  // COMPUTE (center)  — the ALU: MUL then DIV
  const cp=new THREE.Group(); put(cp,1.5,2.2,0); root.add(cp);
  cp.add(put(label('royaltyInfo()  ·  arithmetic',{size:32,scale:1.18}),0,3.5,0));

  const names=['作詞 songwriter','作曲 composer','表演 performer','錄音 label'];

  const sh=new THREE.Group(); put(sh,-9,1,0); root.add(sh);
  sh.add(put(label('SHARES  ·  rights-holder allocation table',{size:30,scale:1.12}),0,3.6,0));
  const gSh=grid(4,2,{base:COL.purpleLo,cell:0.9,gap:0.18}); sh.add(gSh);

  po.add(put(label('released[account] tracked\n→ 防重複提領',{size:20,plate:false,color:'#1e7a45'}),0,-2.4,0));

  root.add(link([-5.4,1,0],[-1.6,0.8,0]));      // shares→compute
  root.add(link([1.5,3.6,0],[2,2.5,0]));         // received→compute

/* ---------------- Streaming (continuous) ---------------- */
function buildStream(){
  brandSub.textContent='Continuous Royalty · Streaming (Superfluid-style)';
  setLegend([[COL.blue,'payer'],[COL.amber,'flowRate'],[COL.green,'accrued'],[COL.purple,'time']]);

  const N=12; // timeline cells
  const tl=new THREE.Group(); put(tl,0,1.5,0); root.add(tl);
  tl.add(put(label('STREAM  ·  balance(t) = flowRate × elapsed',{size:30,scale:1.15}),0,3.4,0));
  const gT=grid(1,N,{base:COL.greenLo,cell:0.78,gap:0.12}); tl.add(gT);
  for(let c=0;c<N;c++)setCell(gT,0,c,{color:COL.greenLo,value:'0',label:`t=${c}s · accrued = flowRate × ${c}`});
  tl.add(put(label('flowRate = 1e15 wei/s   (0.001 ETH/s)',{size:22,plate:false,color:'#9a6a08'}),0,-2.2,0));

  // payer / receiver
  const pa=grid(1,1,{base:COL.blue,cell:1.1}); put(pa,-8,1.5,0); root.add(pa);
  setCell(pa,0,0,{color:COL.blue,value:'pay',label:'payer (label / platform)'});
  const re=grid(1,1,{base:COL.green,cell:1.1}); put(re,8.2,1.5,0); root.add(re);
  setCell(re,0,0,{color:COL.green,value:'rcv',label:'receiver (artist) — balance accrues every second'});
  root.add(link([-7,1.5,0],[-N*0.45/2-0.4,1.5,0]));
  root.add(link([N*0.45/2+0.4,1.5,0],[7.2,1.5,0]));

  let acc=0;
  tickers.push((t)=>{
    const phase=(t*0.6)%(N+2);
    for(let c=0;c<N;c++){
      const on=c<phase;
      gT.setColorAt(c,on?lerpCol(COL.greenLo,COL.green,(c+1)/N):_c.set(COL.greenLo).clone());
      gT.userData.meta[c].value=on?((c)*0.001).toFixed(3):'0';
    }
    gT.instanceColor.needsUpdate=true;
  });

  STEPS=[
    { title:'Overview — 版稅「連續分流」', cam:{pos:[0,1.5,30],tgt:[0,1,0]},
      body:`<p>不同於一次性分潤，<b>Streaming</b>（如 Superfluid）讓收款人的餘額<b>每秒連續累積</b>，適合訂閱式串流分潤。</p>
            <div class="eq">balance(t) = balance₀ + <b>flowRate</b> × (t − t₀)</div>
            <p>單一狀態（flowRate + 時間戳）即可表示無限多筆微支付，無需逐筆交易。</p>`,
      legal:'私法效力：連續履行仍是契約給付；flowRate 之約定與終止應對應授權期間與終止權。',
      enter:()=>{} },

      body:`<p>合約只存一個流速與起始時間：</p>
            <div class="eq">flowRate = 1e15 wei/s  <span class="c">// 0.001 ETH/s</span></div>
            <p>時間軸上每格代表 1 秒；綠色越深表示累積越多。</p>`,
      legal:'機制治理：以最小狀態承載連續分配，呼應可更新性與低 gas 的技術治理目標。',
      enter:()=>{} },

  ndc.x=(e.clientX/innerWidth)*2-1; ndc.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(ndc,camera);
  const hits=ray.intersectObjects(pickables,false);
  if(hits.length){
    const h=hits[0], m=h.object, id=h.instanceId, meta=m.userData.meta[id];
    if(meta&&meta.label){
      tip.style.display='block'; tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY+14)+'px';
      tip.innerHTML = (meta.value!==''&&meta.value!=null? `<b>${meta.value}</b><br>`:'') + `<span class="v">${meta.label}</span>`;
      renderer.domElement.style.cursor='crosshair'; return;
    }
  }
  tip.style.display='none'; renderer.domElement.style.cursor='grab';
});

/* ===================== LOOP ===================== */
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta(), t=clock.elapsedTime;
  // tweens
  for(let i=tweens.length-1;i>=0;i--){const tw=tweens[i];tw.t+=dt*1000;const k=Math.min(1,tw.t/tw.ms);tw.onUpd(k);if(k>=1){tw.onDone&&tw.onDone();tweens.splice(i,1);}}
  tickers.forEach(fn=>fn(t));
  if(followCam&&!userDriving){camera.position.lerp(camTargetPos,0.06);controls.target.lerp(camTargetTgt,0.06);}
  controls.update();
  renderer.render(scene,camera);
}
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

build('erc2981');
animate();
</script>
