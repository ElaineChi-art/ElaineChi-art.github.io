<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>司法官・律師一試｜歷屆全科複習（依當天考試節次）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0c0e13;--paper:#171b24;--ink:#e6e6e6;--muted:#7c8696;--line:#262b36;
        --green:#3ddc84;--greenbg:#10271c;--red:#ff6b6b;--blue:#7fb5ff;--gold:#e0c060;
        --grad:linear-gradient(135deg,#3a6ea5,#7c5cff);--card:linear-gradient(180deg,#171b24,#13161d);}
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:-apple-system,"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
       background:var(--bg);color:var(--ink);font-size:18px;line-height:1.6}
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(1100px 560px at 75% -8%,rgba(70,100,180,.13),transparent 60%),
               radial-gradient(900px 520px at -5% 105%,rgba(130,70,160,.11),transparent 60%);}
  .topnav{display:flex;gap:6px;background:#0b0d12;padding:8px 16px;border-bottom:1px solid #262b36;position:sticky;top:0;z-index:50;overflow-x:auto}
  .topnav a{color:#9aa4b2;text-decoration:none;font-size:14px;font-weight:600;padding:7px 16px;border-radius:8px;white-space:nowrap}
  .topnav a:hover{background:#161922;color:#e6e6e6}
  .topnav a.active{background:#1f2e3a;color:#7fb5ff}
  header{background:linear-gradient(135deg,#1b2030,#13161d 70%);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
  header h1{font-size:20px;margin:0;letter-spacing:.5px;background:linear-gradient(90deg,#cfe0ff,#e9d4ff);-webkit-background-clip:text;background-clip:text;color:transparent}
  .count{margin-left:auto;display:flex;gap:14px;font-size:13px;text-align:center}
  .count b{font-size:21px;color:var(--gold);display:block}
  .sched{background:#11151c;border-bottom:1px solid var(--line);padding:6px 18px;font-size:13px;color:var(--muted);display:flex;gap:18px;flex-wrap:wrap}
  .sched b{color:#c3cad6}
  .controls{display:flex;gap:8px;padding:9px 18px;background:#11151c;border-bottom:1px solid var(--line);flex-wrap:wrap;align-items:center}
  .grp{display:flex;gap:4px;background:#0f1219;border:1px solid var(--line);border-radius:999px;padding:3px;flex-wrap:wrap}
  .controls button{border:none;background:transparent;padding:6px 14px;border-radius:999px;cursor:pointer;font-size:15px;font-family:inherit;white-space:nowrap;color:#9aa4b2;transition:.18s}
  .controls button:hover{color:#e6e6e6}
  .controls button.on{background:var(--grad);color:#fff;box-shadow:0 6px 18px rgba(80,90,255,.3)}
  #search{padding:7px 12px;border:1px solid var(--line);border-radius:999px;font-size:15px;width:150px;background:#0f1219;color:var(--ink)}
  #search::placeholder{color:#5b6472}
  .toggle{margin-left:auto;font-size:14px;color:var(--muted)}
  .wrap{display:flex;height:calc(100vh - 190px)}
  #list{width:350px;overflow:auto;border-right:1px solid var(--line);background:#0f1219}
  .secthead{position:sticky;top:0;background:#1b2030;color:#fff;padding:7px 14px;font-size:13px;z-index:2;border-bottom:1px solid var(--line)}
  .secthead .t{color:var(--gold)}
  .subhead{background:#11151c;padding:4px 14px 4px 22px;font-size:13px;color:#9aa4b2;font-weight:bold}
  .qrow{padding:9px 14px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;gap:8px;align-items:flex-start}
  .qrow:hover{background:#161c27}
  .qrow.sel{background:#1a2230;border-left:4px solid var(--gold)}
  .qrow .n{font-weight:bold;color:var(--blue);min-width:42px;font-size:14px}
  .qrow .s{font-size:13.5px;color:#9aa4b2;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .dot{width:9px;height:9px;border-radius:50%;margin-left:auto;margin-top:5px;flex:none}
  .dot.ok{background:var(--green)} .dot.review{background:var(--red)}
  #detail{flex:1;overflow:auto;padding:24px 32px}
  .tags{display:flex;gap:7px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  .tag{background:#1f2430;border-radius:20px;padding:3px 11px;font-size:13px;color:#c3cad6}
  .tag.subj{background:var(--grad);color:#fff}
  .tag.per{background:var(--gold);color:#1b1b1b;font-weight:bold}
  .lawchip{background:#2a2410;border:1px solid var(--gold);border-radius:6px;padding:1px 8px;font-size:12px;color:#f0d98a}
  .stem{font-size:22px;line-height:1.7;margin:6px 0 16px;font-weight:500}
  .opt{border:2px solid var(--line);background:var(--paper);border-radius:12px;padding:11px 15px;margin:8px 0;display:flex;gap:11px;cursor:pointer}
  .opt .lab{font-weight:bold;color:var(--muted);flex:none}
  .opt.correct{border-color:var(--green);background:var(--greenbg)}
  .opt.correct .lab{color:var(--green)}
  .opt.correct::after{content:"✔ 官方正解";color:var(--green);margin-left:auto;font-size:14px;white-space:nowrap}
  body.hideAns .opt.correct{border-color:var(--line);background:var(--paper)}
  body.hideAns .opt.correct::after{content:""}
  body.hideAns .opt.correct.reveal{border-color:var(--green);background:var(--greenbg)}
  body.hideAns .opt.correct.reveal::after{content:"✔ 官方正解";color:var(--green);margin-left:auto;font-size:14px}
  .note{margin-top:20px;border:1px solid #3a3320;border-left:4px solid var(--gold);border-radius:14px;padding:16px 18px;
        background:linear-gradient(180deg,#1c1d18,#16160f);white-space:pre-wrap;line-height:1.8;color:#e9e4d3}
  .note h3{margin:0 0 8px;font-size:16px;color:#e0c060}
  .note.auto{border-style:dashed;border-color:#5a4f2a}
  .btns{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .btns button{font-family:inherit;font-size:15px;padding:9px 16px;border:none;border-radius:24px;cursor:pointer}
  .play{background:#3a6ea5;color:#fff} .note-play{background:#7a5cd0;color:#fff}
  .ok-b{background:#1f8a4c;color:#fff} .rev-b{background:#d64b4b;color:#fff}
  .nav{display:flex;justify-content:space-between;margin-top:22px;border-top:1px solid var(--line);padding-top:14px}
  .nav button{background:#1f2430;color:#fff;border:1px solid var(--line);border-radius:24px;padding:9px 20px;font-size:15px;cursor:pointer}
  .empty{color:var(--muted);padding:40px;text-align:center}
  /* ===== 考點統整模式 ===== */
  .modebar{display:flex;gap:4px;background:#0f1219;border:1px solid var(--line);border-radius:999px;padding:3px}
  .modebar button{color:#cdb86a;background:transparent;font-weight:bold;border-radius:999px}
  .modebar button.on{background:var(--grad);color:#fff;box-shadow:0 6px 18px rgba(80,90,255,.3)}
  #subjbar{display:none;gap:8px;padding:9px 18px;background:#11151c;border-bottom:1px solid var(--line);flex-wrap:wrap;align-items:center}
  #summary{display:none;height:calc(100vh - 240px);overflow:auto;padding:18px 22px;max-width:1000px;margin:0 auto}
  .sumtitle{font-size:15px;color:#e0c060;font-weight:bold;margin:18px 0 8px;border-bottom:2px solid var(--gold);padding-bottom:5px;position:sticky;top:-18px;background:var(--bg);z-index:2}
  .sumtitle:first-child{margin-top:0}
  /* 法條速記表 */
  .lawrow{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:10px;padding:11px 14px;margin:9px 0}
  .lawrow .law{font-weight:bold;color:#e0c060;font-size:16px}
  .lawrow .cpt{color:var(--blue);font-weight:bold;font-size:15px;margin-left:6px}
  .lawrow .key{display:block;margin-top:5px;color:#d3d8e0;font-size:15.5px;line-height:1.7}
  .lawrow .key b{color:#ff8a8a}
  .qchips{margin-top:7px;display:flex;gap:5px;flex-wrap:wrap}
  .qchip{background:#1f2430;border-radius:14px;padding:1px 9px;font-size:12px;color:#c3cad6;cursor:pointer;border:none;font-family:inherit}
  .qchip:hover{background:var(--gold);color:#1b1b1b}
  /* 易錯觀念卡 */
  .trapcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin:10px 0;cursor:pointer}
  .trapcard .qtag{font-size:12px;color:var(--muted);margin-bottom:4px}
  .trapcard .trap{font-size:16px;line-height:1.7}
  .trapcard .trap .x{color:#ff6b6b;font-weight:bold}
  .trapcard .ans{display:none;margin-top:11px;padding-top:10px;border-top:1px dashed var(--gold);font-size:15.5px;line-height:1.75}
  .trapcard.open{border-color:var(--green);background:#10241b}
  .trapcard.open .ans{display:block}
  .trapcard .flip{font-size:12px;color:var(--blue);margin-top:6px}
  .sumcount{font-size:13px;color:#888;margin-bottom:12px}
  /* ===== 知識樹 ===== */
  #tree{display:none;height:calc(100vh - 240px);overflow:auto;padding:16px;max-width:1060px;margin:0 auto}
  .treehint{background:rgba(20,26,40,.7);border:1px dashed var(--gold);border-radius:10px;padding:11px 14px;font-size:14.5px;color:#d9c98c;margin-bottom:16px;line-height:1.7}
  .branch{border-radius:16px;padding:14px 16px;margin-bottom:18px;border:1px solid var(--line)}
  .branch.zong{background:linear-gradient(180deg,#141d2c,#10141c);border-color:#2a3a55}
  .branch.fen{background:linear-gradient(180deg,#241620,#171015);border-color:#5a3145}
  .branch>h2{margin:0 0 6px;font-size:21px;display:flex;align-items:center;gap:9px}
  .branch.zong>h2{color:#7fb5ff} .branch.fen>h2{color:#ff9ecb}
  .branch>.sub{font-size:13px;color:var(--muted);margin-bottom:12px}
  .grp2{margin:14px 0 4px}
  .grp2>h3{margin:0 0 7px;font-size:15px;color:#c3cad6;display:flex;align-items:center;gap:7px}
  .grp2.zong>h3{border-left:5px solid #3a6ea5;padding-left:9px}
  .grp2.fen>h3{border-left:5px solid #c0613a;padding-left:9px}
  .leaf{border:1px solid var(--line);border-radius:11px;margin:6px 0;background:#13171f;overflow:hidden}
  .leaf-head{padding:10px 13px;cursor:pointer;display:flex;align-items:center;gap:9px;font-size:16px}
  .leaf-head:hover{background:#1a1f2a}
  .leaf-head .ic{font-size:17px}
  .leaf .bdg{margin-left:auto;background:#262b36;border-radius:13px;padding:1px 10px;font-size:12.5px;color:#c3cad6;font-weight:bold;flex:none}
  .leaf.hot .leaf-head{background:#241a12}
  .leaf.hot .bdg{background:#e0894e;color:#fff}
  .leaf.cold .leaf-head{opacity:.5}
  .leaf.cold .bdg{background:#333a47;color:#8a94a3}
  .leaf.open{border-color:var(--blue);box-shadow:0 6px 22px rgba(80,120,200,.18)}
  .leaf-body{display:none;padding:12px 15px;border-top:1px dashed var(--gold);background:#10141c;line-height:1.8}
  .leaf.open .leaf-body{display:block}
  .leaf-body .k{color:#d3d8e0;font-size:15.5px}
  .leaf-body .k b{color:#ff8a8a}
  .leaf-body .qh{font-size:13px;color:var(--muted);margin:9px 0 5px}
  .leaf-body .qchips{display:flex;flex-wrap:wrap;gap:6px}
  /* 正誤對照成對 */
  .vp{border:1px solid var(--line);border-radius:10px;margin:8px 0;background:#13171f;overflow:hidden}
  .vp-h{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer}
  .vp-h:hover{background:#1a1f2a}
  .vp .exp{margin-left:6px;font-size:13px;color:#9fc3f0;font-weight:bold;flex:none}
  .vp-c{display:none;padding:11px 13px;border-top:1px dashed var(--line)}
  .vp.open .vp-c{display:block}
  .vp .vpn{display:inline-block;background:#262b36;color:#cfe0ff;border-radius:10px;font-size:11.5px;padding:1px 8px;margin-right:7px;vertical-align:middle}
  .vp .vpc{font-size:13px;color:var(--muted)}
  .vp .bad{color:#ff8a8a;margin:5px 0;font-size:15.5px;line-height:1.65}
  .vp .good{color:#5fe39b;margin:3px 0;font-size:15.5px;line-height:1.65;font-weight:500}
  .vp .bad b,.vp .good b{font-weight:700;color:#fff}
  /* 選項訂正：錯的劃掉、對的打勾 */
  .opts{margin:7px 0}
  .o-wrong{color:#ff9a9a;font-size:15px;line-height:1.6;margin:4px 0;padding:3px 9px;border-radius:7px;background:rgba(160,50,50,.12)}
  .o-wrong s{opacity:.7;text-decoration-color:#ff6b6b;text-decoration-thickness:2px}
  .o-wrong .xm{font-weight:700;color:#ff6b6b}
  .o-right{color:#c9efd7;font-size:15px;line-height:1.6;margin:4px 0;padding:3px 9px;border-radius:7px;background:rgba(40,140,90,.14)}
  .o-right .cm{font-weight:700;color:#5fe39b}
  .o-pick{color:#ffd9a8;font-size:15px;line-height:1.6;margin:4px 0;padding:3px 9px;border-radius:7px;background:rgba(180,120,40,.16)}
  .o-pick .pm{font-weight:700;color:#ffb454}
  .fixnote{margin-top:8px;color:#7ff0b0;font-weight:600;font-size:15.5px;background:rgba(40,140,90,.12);border-left:3px solid var(--green);padding:8px 12px;border-radius:8px;line-height:1.7}
  .fixnote .lb{color:#5fe39b;font-weight:700}
  .pickwrong{font-size:12px;color:#ffb454;margin-left:4px}
  .vp .vptop{display:flex;align-items:center;gap:7px}
  .vp .hear{margin-left:auto;background:linear-gradient(135deg,#7c5cff,#a06bff);color:#fff;border:none;border-radius:50%;width:30px;height:30px;font-size:15px;cursor:pointer;flex:none;box-shadow:0 4px 12px rgba(124,92,255,.35)}
  .vp .hear:active{transform:scale(.9)}
  .vp .sit{margin:6px 0;font-size:16px;line-height:1.6;color:#cfe0ff;background:rgba(40,70,130,.22);border-left:4px solid var(--blue);border-radius:8px;padding:7px 11px}
  .vp .more{font-size:13px;color:#9fc3f0;background:rgba(40,70,130,.18);border:1px solid #2a3a55;border-radius:16px;cursor:pointer;padding:4px 12px;font-family:inherit;margin-top:7px}
  .full{margin-top:10px;background:#10141c;border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .full .fstem{font-size:16px;line-height:1.7;margin-bottom:9px;font-weight:500;color:#e6e6e6}
  .opt2{border:1.5px solid var(--line);border-radius:9px;padding:8px 11px;margin:6px 0;font-size:15px;line-height:1.6;color:#d3d8e0}
  .opt2.cor{border-color:var(--green);background:var(--greenbg)}
  .opt2.cor::after{content:" ✔正解";color:var(--green);font-size:13px}
  .full .fnote{margin-top:10px;border-top:1px dashed var(--gold);padding-top:9px;font-size:14.5px;line-height:1.8;color:#b8c0cc}
  .treetools{display:flex;gap:8px;margin-bottom:12px;position:sticky;top:-16px;background:var(--bg);padding:8px 0;z-index:5}
  .treetools button{font-family:inherit;font-size:14px;padding:7px 15px;border:1px solid var(--gold);background:#1a1d16;border-radius:20px;cursor:pointer;color:#e0c060;font-weight:bold}
  .treetools button:hover{background:#262411}
  /* ===== ✏️ 手寫圖解（試做） ===== */
  #demo{display:none;height:calc(100vh - 240px);overflow:auto;padding:18px}
  .demohint{max-width:780px;margin:0 auto 18px;background:rgba(20,26,40,.7);border:1px dashed var(--gold);border-radius:10px;padding:11px 14px;font-size:14.5px;color:#d9c98c;line-height:1.7}
  .sk-wrap{max-width:780px;margin:0 auto}
  .sketch{background:#fbf6e9;color:#2a2418;border-radius:16px;padding:20px 24px;margin-bottom:28px;
          box-shadow:0 12px 34px rgba(0,0,0,.45);border:2px solid #d9cda8;transform:rotate(-.5deg);
          font-family:'Ma Shan Zheng',"PingFang TC",sans-serif;position:relative}
  .sketch:nth-child(even){transform:rotate(.6deg)}
  .sk-top{display:flex;align-items:center;gap:10px;margin-bottom:3px}
  .sk-title{font-size:27px;color:#b85c2e;margin:0;flex:1}
  .sk-hear{background:#7c5cff;color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;flex:none;box-shadow:0 4px 12px rgba(124,92,255,.4)}
  .sk-q{font-size:14px;color:#9b8f70;font-family:"PingFang TC",sans-serif;margin-bottom:16px}
  .sk-step{display:flex;gap:13px;align-items:flex-start;margin:4px 0}
  .sk-num{flex:none;width:32px;height:32px;border-radius:50%;border:2.5px solid #2a2418;display:flex;
          align-items:center;justify-content:center;font-size:18px;background:#fff;margin-top:2px}
  .sk-text{font-size:22px;line-height:1.45;padding-top:3px}
  .sk-down{color:#c08038;font-size:20px;margin:1px 0 1px 14px;letter-spacing:2px}
  .sk-point{margin-top:12px;background:#fff3a8;border-radius:10px;padding:11px 14px;font-size:18px;color:#7a4a10;
            border:1px dashed #c9a94e;box-shadow:2px 3px 0 rgba(0,0,0,.08);line-height:1.5;font-weight:600}
  #demo .sk-point{font-size:22px;transform:rotate(-.4deg)}
  .sk-opts{margin-top:18px;border-top:2px dashed #d9cda8;padding-top:12px}
  .sk-ol{font-size:14px;color:#9b8f70;font-family:"PingFang TC",sans-serif;margin-bottom:6px}
  .sk-opt{font-size:19px;line-height:1.55;margin:7px 0;display:flex;gap:9px;align-items:flex-start}
  .sk-opt .mk{flex:none;font-size:23px;font-family:"PingFang TC",sans-serif;font-weight:bold;line-height:1.2}
  .sk-opt.y{color:#1c5c33} .sk-opt.y .mk{color:#1f8a4c}
  .sk-opt.n{color:#9a4636} .sk-opt.n .mk{color:#c0392b}
  .sk-opt.n .ot{text-decoration:line-through;text-decoration-color:#d98b7a;text-decoration-thickness:2px}
  /* 王澤鑑式當事人關係圖 */
  .relsvg{width:100%;aspect-ratio:100/54;display:block;margin:6px 0 4px;background:#fffdf5;border-radius:10px;border:1px solid #e6dcc0}
  .relsvg text{font-family:'Ma Shan Zheng',"PingFang TC",sans-serif}
  .relsvg .nl{font-size:4.2px;fill:#2a2418;font-weight:bold;paint-order:stroke fill;stroke:#fffdf5;stroke-width:.7}
  .relsvg .ns{font-size:2.3px;fill:#9b6b3a;font-family:"PingFang TC",sans-serif}
  .relsvg .el{font-size:2.7px;fill:#b04a22;font-family:"PingFang TC",sans-serif;paint-order:stroke fill;stroke:#fffdf5;stroke-width:.95}
</style>
</head>

<header>
  <h1>📚 司法官・律師一試 歷屆全科複習</h1>
  <div class="count">
    <div>一試倒數<b id="d1">–</b></div>
    <div>調查局<b id="d2">–</b></div>
    <div>已懂<b id="prog">0</b></div>
  </div>
</header>

<div class="sched">
  <span>📅 <b>當天試程（一天4節）</b></span>
  <span><b>第1節</b> 09:00 綜一·刑事(刑法/刑訴/倫理)</span>
  <span><b>第2節</b> 11:10 綜一·公法(憲/行政/國公/國私)</span>
  <span><b>第3節</b> 14:00 綜二·民事(民法/民訴)</span>
  <span><b>第4節</b> 16:20 綜二·商事(公司/保險/票據/證交/強執/法英)</span>
</div>

<div class="controls">
  <div class="modebar" id="modebar">
    <button data-m="study" class="on">📖 逐題複習</button>
    <button data-m="summary">📋 考點統整</button>
    <button data-m="tree">🌳 知識樹</button>
    <button data-m="demo">✏️ 圖解(試做)</button>
  </div>
  <div class="grp" id="years"></div>
  <div class="grp" id="sections"></div>
  <input id="search" placeholder="🔍 搜尋關鍵字…">
  <label class="toggle"><input type="checkbox" id="hideAns"> 遮答案自測</label>
</div>

<div id="subjbar">
  <span style="font-size:13px;color:#9a7b16;font-weight:bold">科目</span>
  <div class="grp" id="subjs"></div>
  <div class="grp" id="sumviews">
    <button data-v="law" class="on">⚖️ 法條速記表</button>
    <button data-v="trap">⚠️ 易錯觀念卡</button>
  </div>
</div>

<div class="wrap" id="wrap">
  <div id="list"></div>
  <div id="detail"><div class="empty">← 左邊點一題開始複習；預設依當天節次排列</div></div>
</div>

<div id="summary"></div>

<div id="tree"></div>

<div id="demo"></div>

<script src="data.js"></script>
<script src="notes.js"></script>
<script src="scenarios.js"></script>
<script src="diagrams.js"></script>
<script>
const Q = window.QUESTIONS || [];
const NOTES = window.NOTES || {};
const LS = "sjg_marks_v2";
let marks = JSON.parse(localStorage.getItem(LS) || "{}");
let curYear = Math.max(...Q.map(q=>q.year));
let curSec = "全部";          // 全部/刑事組/公法組/民事組/商事組
let curKey = null, search = "";

function daysTo(d){return Math.max(0,Math.ceil((new Date(d)-new Date())/86400000));}
d1.textContent = daysTo("2026-08-01")+"天";
d2.textContent = daysTo("2026-08-08")+"天";

const years = [...new Set(Q.map(q=>q.year))].sort();
const secOrder = ["刑事組","公法組","民事組","商事組"];
const secLabel = {"全部":"全部","刑事組":"①刑事","公法組":"②公法","民事組":"③民事","商事組":"④商事"};

function buildTabs(){
  years_el.innerHTML = years.map(y=>`<button data-y="${y}" class="${y==curYear?'on':''}">${y}年</button>`).join("");
  years_el.querySelectorAll("button").forEach(b=>b.onclick=()=>{curYear=+b.dataset.y;buildTabs();renderList();});
  const secs=["全部",...secOrder];
  sections_el.innerHTML = secs.map(s=>`<button data-s="${s}" class="${s==curSec?'on':''}">${secLabel[s]}</button>`).join("");
  sections_el.querySelectorAll("button").forEach(b=>b.onclick=()=>{
    curSec=b.dataset.s; buildTabs();
    if(mode==="summary"){ if(curSec==="全部"||!SUBJ[curSec]){curSec="刑事組";buildTabs();} buildSubjBar(); renderSummary(); }
    else renderList();
  });
}
const years_el=document.getElementById("years"), sections_el=document.getElementById("sections");

function keyOf(q){return q.year+"-"+q.section+"-"+q.num;}
function filtered(){
  let r = Q.filter(q=> q.year===curYear
      && (curSec==="全部"||q.section===curSec)
      && (!search || (q.stem+q.options.join("")).includes(search)) );
  r.sort((a,b)=> a.period-b.period || a.num-b.num);
  return r;
}

function renderList(){
  const items=filtered();
  let html="", lastSec=null, lastSub=null;
  items.forEach(q=>{
    if(q.section!==lastSec){
      html+=`<div class="secthead"><span class="t">第${q.period}節 ${q.time}</span>　${q.volume}·${q.section}</div>`;
      lastSec=q.section; lastSub=null;
    }
    if(q.section==="刑事組" && q.subject!==lastSub){
      html+=`<div class="subhead">${q.subject}</div>`; lastSub=q.subject;
    }
    const k=keyOf(q), m=marks[k];
    html+=`<div class="qrow ${k===curKey?'sel':''}" data-k="${k}">
        <span class="n">第${q.num}題</span><span class="s">${q.stem.slice(0,42)}</span>
        <span class="dot ${m||''}"></span></div>`;
  });
  list.innerHTML = html || `<div class="empty">沒有符合的題目</div>`;
  list.querySelectorAll(".qrow").forEach(r=>r.onclick=()=>showQ(r.dataset.k));
  prog.textContent = Object.values(marks).filter(v=>v==="ok").length;
}
const list=document.getElementById("list");

function qByKey(k){const[y,sec,n]=k.split("-");return Q.find(q=>q.year==y&&q.section===sec&&q.num==n);}
function qType(s){return /錯誤|不正確|何者非|不屬|不包括|不得|尚非|不成立|不違反/.test(s)?"找『錯』的":
  /正確|何者是|何者得|何者應|構成|成立|何罪/.test(s)?"找『對』的":"判斷題";}
function autoNote(q){
  const laws=q.laws.length?("　法條："+q.laws.join("、")):"";
  const ansTxt = q.ansLetter==="#" ? "本題官方一律給分（送分題）" : q.ansLetter;
  return {auto:true,concept:"考點提示（詳解待補）",
    body:`📌 ${q.volume}・${q.section}（${q.subject}）${laws}\n📝 題型：這題要你${qType(q.stem)}\n✔ 官方答案：${ansTxt}\n\n（白話詳解之後補。）`};
}

function showQ(k){
  curKey=k; const q=qByKey(k); const note=NOTES[k]||autoNote(q);
  document.body.classList.toggle("hideAns", hideAns.checked);
  const L=["A","B","C","D"];
  const opts=q.options.map((o,i)=>`<div class="opt ${i===q.ansIndex?'correct':''}">
      <span class="lab">${L[i]}</span><span>${o}</span></div>`).join("");
  const laws=q.laws.map(l=>`<span class="lawchip">${l}</span>`).join("");
  detail.innerHTML=`
    <div class="tags"><span class="tag per">第${q.period}節 ${q.time}</span>
      <span class="tag subj">${q.section}</span><span class="tag">${q.subject}</span>
      <span class="tag">${q.year}年 第${q.num}題</span>${laws}</div>
    <div class="stem">${q.stem}</div>${opts}
    ${q.ansLetter==="#"?'<div style="margin:10px 0;padding:8px 14px;background:#fff3cd;border:2px solid var(--gold);border-radius:10px;font-weight:bold">⭐ 本題官方一律給分（送分題）</div>':''}
    <div class="note ${note.auto?'auto':''}"><h3>🖊️ ${note.concept}</h3>${note.body}</div>
    <div class="btns">
      <button class="play" onclick="readQ()">🔊 念題目</button>
      <button class="note-play" onclick="readNote()">🔊 念詳解</button>
      <button class="ok-b" onclick="mark('ok')">✅ 我懂了</button>
      <button class="rev-b" onclick="mark('review')">🔁 再看</button></div>
    <div class="nav"><button onclick="step(-1)">◀ 上一題</button>
      <button onclick="step(1)">下一題 ▶</button></div>`;
  detail.querySelectorAll(".opt").forEach(o=>o.onclick=()=>o.classList.add("reveal"));
  window._q=q; window._note=note; renderList(); detail.scrollTop=0;
}
const detail=document.getElementById("detail"), hideAns=document.getElementById("hideAns");

function step(d){const it=filtered();const i=it.findIndex(q=>keyOf(q)===curKey);const n=it[i+d];if(n)showQ(keyOf(n));}
function mark(t){marks[curKey]=marks[curKey]===t?undefined:t;if(!marks[curKey])delete marks[curKey];
  localStorage.setItem(LS,JSON.stringify(marks));renderList();}

function cleanForSpeech(t){
  return t
    .replace(/§\s*(\d+)\s*-\s*(\d+)/g,'第$1條之$2')   // §131-1 → 第131條之1
    .replace(/§\s*(\d+)/g,'第$1條')                    // §158 → 第158條
    .replace(/Ⅰ/g,'第一項').replace(/Ⅱ/g,'第二項').replace(/Ⅲ/g,'第三項')
    .replace(/\p{Extended_Pictographic}/gu,' ')         // 去掉所有 emoji（語音引擎會卡住）
    .replace(/[【】→•·▶◀↺✔（）()]/g,' ')
    .replace(/\n+/g,'。').replace(/\s+/g,' ').trim();
}
function speak(t){
  t=cleanForSpeech(t); if(!t) return;
  const u=new SpeechSynthesisUtterance(t);u.lang="zh-TW";u.rate=.92;
  const v=speechSynthesis.getVoices().find(v=>/zh|TW|Chinese|Mei|Ting|Han/i.test(v.lang+v.name));if(v)u.voice=v;
  speechSynthesis.cancel();speechSynthesis.speak(u);}
function readQ(){const q=window._q,L=["A","B","C","D"];
  speak("第"+q.num+"題。"+q.stem+" "+q.options.map((o,i)=>"選項"+L[i]+"，"+o).join("。"));}
function readNote(){const n=window._note;speak(n.concept+"。"+n.body);}

document.getElementById("search").oninput=e=>{search=e.target.value.trim();renderList();};
hideAns.onchange=()=>{if(curKey)showQ(curKey);};

/* ===================== 考點統整模式 ===================== */
let mode="study", sumView="law", curSub=null;
const SUBJ={
  刑事組:["刑法","刑訴"],
  公法組:["憲法","行政法","國際公法","國際私法"],
  民事組:["民法","民訴"],
  商事組:["公司法","保險法","票據法","證交法","強制執行","法學英文"]
};
function subOf(q){
  const n=q.num, sec=q.section;
  if(sec==="刑事組") return n<=35?"刑法":"刑訴";
  if(sec==="民事組") return n<=50?"民法":"民訴";
  if(sec==="商事組") return n<=15?"公司法":n<=25?"保險法":n<=35?"票據法":n<=45?"證交法":n<=55?"強制執行":"法學英文";
  if(sec==="公法組"){
    const law=((NOTES[keyOf(q)]||{}).body||"").split("\n").find(l=>l.trim().startsWith("⚖️"))||"";
    if(/涉外|國際私法|準據法|反致|法律適用法/.test(law)) return "國際私法";
    if(/國際公法|條約|公約|海洋法|聯合國|領海|引渡|戰爭|國際法院|外交/.test(law)) return "國際公法";
    if(/行政/.test(law)) return "行政法";
    return "憲法";
  }
  return q.subject;
}
function parseNote(note){
  const lines=(note.body||"").split("\n");
  const grab=e=>{const m=lines.find(l=>l.trim().startsWith(e));return m?m.replace(e,"").replace(/^法條：/,"").trim():"";};
  return {law:grab("⚖️"), key:grab("🔑"), ans:grab("✅"), trap:grab("❌"), concept:note.concept||""};
}
function sumItems(){
  return Q.filter(q=> q.section===curSec && NOTES[keyOf(q)] && (!curSub||subOf(q)===curSub))
          .sort((a,b)=> a.num-b.num || a.year-b.year)
          .map(q=>({q, p:parseNote(NOTES[keyOf(q)]), k:keyOf(q)}));
}
function renderSummary(){
  const items=sumItems(); let html="";
  if(sumView==="law"){
    const map=new Map();
    items.forEach(it=>{const c=it.p.concept;
      if(!map.has(c)) map.set(c,{law:it.p.law,key:it.p.key,ks:[]});
      if(!map.get(c).key && it.p.key) map.get(c).key=it.p.key;
      map.get(c).ks.push(it);});
    html=`<div class="sumcount">⚖️ <b>${curSub}</b>　共 <b>${map.size}</b> 個考點（去重）｜這些就是會考的範圍，點題號可跳到該題</div>`;
    for(const [c,v] of map){
      const chips=v.ks.map(it=>`<button class="qchip" data-k="${it.k}">${it.q.year}·${it.q.num}</button>`).join("");
      html+=`<div class="lawrow"><span class="law">${v.law||""}</span><span class="cpt">${c}</span>
        ${v.key?`<span class="key">🔑 ${v.key}</span>`:""}
        <div class="qchips">${chips}</div></div>`;
    }
  }else{
    const cards=items.filter(it=>it.p.trap);
    html=`<div class="sumcount">⚠️ <b>${curSub}</b>　共 <b>${cards.length}</b> 張易混淆卡｜先看陷阱說法，<b>點卡片翻開</b>看正解記憶</div>`;
    cards.forEach(it=>{
      html+=`<div class="trapcard" data-k="${it.k}">
        <div class="qtag">${it.q.year}年第${it.q.num}題｜${it.p.concept}</div>
        <div class="trap"><span class="x">⚠️ 常考易混淆：</span>${it.p.trap}</div>
        <div class="flip">👆 點開看正解＋法條</div>
        <div class="ans">✅ ${it.p.ans}${it.p.law?`<br><span style="color:#9a6a16">⚖️ ${it.p.law}</span>`:""}
          ${it.p.key?`<br>🔑 ${it.p.key}`:""}</div></div>`;
    });
  }
  summary.innerHTML=html||`<div class="empty">此科目尚無資料</div>`;
  summary.querySelectorAll(".qchip").forEach(c=>c.onclick=e=>{e.stopPropagation();jumpTo(c.dataset.k);});
  summary.querySelectorAll(".trapcard").forEach(card=>card.onclick=()=>card.classList.toggle("open"));
}
function buildSubjBar(){
  const subs=SUBJ[curSec]||[curSec];
  if(!subs.includes(curSub)) curSub=subs[0];
  subjs_el.innerHTML=subs.map(s=>`<button data-su="${s}" class="${s===curSub?'on':''}">${s}</button>`).join("");
  subjs_el.querySelectorAll("button").forEach(b=>b.onclick=()=>{curSub=b.dataset.su;buildSubjBar();renderSummary();});
  sumviews_el.querySelectorAll("button").forEach(b=>b.classList.toggle("on",b.dataset.v===sumView));
}
function switchMode(m){
  mode=m;
  modebar_el.querySelectorAll("button").forEach(b=>b.classList.toggle("on",b.dataset.m===m));
  document.getElementById("wrap").style.display = m==="study"?"flex":"none";
  summary.style.display = m==="summary"?"block":"none";
  document.getElementById("tree").style.display = m==="tree"?"block":"none";
  document.getElementById("demo").style.display = m==="demo"?"block":"none";
  subjbar_el.style.display = m==="summary"?"flex":"none";
  // 卷別/年份/搜尋/遮答案：知識樹、圖解模式全部隱藏
  years_el.style.display = m==="study"?"flex":"none";
  sections_el.style.display = (m==="tree"||m==="demo")?"none":"flex";
  document.getElementById("search").style.display = m==="study"?"block":"none";
  hideAns.parentElement.style.display = m==="study"?"inline-flex":"none";
  if(m==="summary"){
    if(curSec==="全部"||!SUBJ[curSec]){curSec="刑事組";buildTabs();}
    buildSubjBar(); renderSummary();
  }
  if(m==="tree") renderTree();
  if(m==="demo") renderDemo();
}
const subjs_el=document.getElementById("subjs"), sumviews_el=document.getElementById("sumviews"),
      modebar_el=document.getElementById("modebar"), subjbar_el=document.getElementById("subjbar"),
      summary=document.getElementById("summary");
modebar_el.querySelectorAll("button").forEach(b=>b.onclick=()=>switchMode(b.dataset.m));
sumviews_el.querySelectorAll("button").forEach(b=>b.onclick=()=>{sumView=b.dataset.v;buildSubjBar();renderSummary();});

function matchQs(pat){
  const re=new RegExp(pat);
  return Q.filter(q=>q.section==="刑事組" && q.num<=35 && NOTES[keyOf(q)]
      && re.test((NOTES[keyOf(q)].concept||"")+(NOTES[keyOf(q)].body||"")))
    .sort((a,b)=>a.year-b.year);
}
function scenOf(q){
  const s=(window.SCEN||{})[keyOf(q)];
  if(s) return s;
  // 還沒手寫情境時的暫代：取題幹前段
  let t=q.stem;
  for(const mk of ["下列","試問","問甲","則甲","關於上述","依上述","上述","以下敘述","請問","何者"]){
    const i=t.indexOf(mk); if(i>6){t=t.slice(0,i);break;}
  }
  t=t.replace(/[，。、:：]\s*$/,"");
  if(t.length<6) return "（觀念題）"+((NOTES[keyOf(q)]||{}).concept||"");
  return t.length>42 ? t.slice(0,40)+"…" : t;
}
function qKind(stem){
  // right=找對(答案正確) / wrong=找錯(答案是錯敘述) / exclude=排除型(何者不構成、例外)
  if(/不構成|不該當|何者不是|不是刑法|無.{0,4}(我國|中華民國)?刑法之適用|無.{0,4}之適用/.test(stem)) return "exclude";
  if(/錯誤|不正確|何者非|非屬|不屬|不包括|尚非|不成立|不違反|未違反|不符合|錯誤者/.test(stem)) return "wrong";
  return "right";
}
function optsHTML(q){
  // 錯的觀念劃掉(紅)、對的打勾(綠)；排除型答案標例外(橘)
  const L=["A","B","C","D"], k=qKind(q.stem);
  return q.options.map((o,i)=>{
    const isAns=i===q.ansIndex;
    if(k==="exclude"){
      return isAns
        ? `<div class="o-pick"><span class="pm">◉</span> ${L[i]}. ${o}<span class="pickwrong">←答案（此項屬例外／不構成）</span></div>`
        : `<div class="o-right"><span class="cm">✔</span> ${L[i]}. ${o}</div>`;
    }
    const wrong = k==="wrong" ? isAns : !isAns;
    return wrong
      ? `<div class="o-wrong"><span class="xm">✘</span> <s>${L[i]}. ${o}</s>${k==="wrong"&&isAns?'<span class="pickwrong">←這題要選它（此敘述本身是錯的）</span>':''}</div>`
      : `<div class="o-right"><span class="cm">✔</span> ${L[i]}. ${o}${k==="right"&&isAns?'<span class="pickwrong" style="color:#5fe39b">←正解</span>':''}</div>`;
  }).join("");
}
function fullHTML(q){
  // 只補「法條詳解」，不再重複情境與選項(卡片已有)
  const nb=(NOTES[keyOf(q)]||{}).body||"";
  return `<div class="full"><div class="fnote">${nb.replace(/\n/g,"<br>")}</div></div>`;
}

const POS={1:[[50,27]],2:[[24,27],[76,27]],3:[[16,40],[50,14],[84,40]],

function diagFromDIAG(d){
  const ns=d.n.map(s=>{const a=s.split("|");return {id:a[0],label:a[0],sub:a[1]||""};});
  const pos=POS[ns.length]||POS[5], nm={};
  ns.forEach((n,i)=>{const pp=pos[i]||[50,27];n.x=pp[0];n.y=pp[1];nm[n.id]=n;});
  const edges=d.e.map(s=>{
    const a=s.split("|"), ft=a[0].split(">"), e={from:ft[0].trim(),to:ft[1].trim(),label:a[1]||"",curve:a[2]?+a[2]:0};
    const A=nm[e.from],B=nm[e.to]; if(!A||!B) return "";
    const mx=(A.x+B.x)/2, my=(A.y+B.y)/2+e.curve;
    return `<path d="M ${A.x} ${A.y} Q ${mx} ${my} ${B.x} ${B.y}" fill="none" stroke="#3a3326" stroke-width="0.7" marker-end="url(#ah)"/>
      <text x="${mx}" y="${my-1.2}" class="el" text-anchor="middle">${e.label}</text>`;
  }).join("");
  const nodes=ns.map(n=>`<circle cx="${n.x}" cy="${n.y}" r="5.4" fill="#fff" stroke="#2a2418" stroke-width="0.9"/>
    <text x="${n.x}" y="${n.y+1.6}" class="nl" text-anchor="middle">${n.label}</text>
    ${n.sub?`<text x="${n.x}" y="${n.y+9}" class="ns" text-anchor="middle">${n.sub}</text>`:""}`).join("");
  return `<svg class="relsvg" viewBox="0 0 100 54" preserveAspectRatio="xMidYMid meet">
    <defs><marker id="ah" markerWidth="5" markerHeight="5" refX="4.3" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 z" fill="#3a3326"/></marker></defs>${edges}${nodes}</svg>`;
}
function qCardHTML(q){
  const k=keyOf(q), p=parseNote(NOTES[k]||{}), d=(window.DIAG||{})[k];
  const top=(d&&d.n&&d.e)?diagFromDIAG(d):`<div class="sit">📖 ${scenOf(q)}</div>`;
  const point=(d&&d.p)?d.p:(p.key||p.concept);
  return `${top}<div class="sk-point">📌 ${point}</div>
    <div class="opts">${optsHTML(q)}</div>
    ${p.ans?`<div class="fixnote"><span class="lb">✏️ 訂正：</span>${p.ans}</div>`:""}`;
}
function vpairs(qs){
  // 每題一條，點開＝關係圖＋📌重點＋選項筆記(錯的劃掉訂正)
  return qs.map(q=>{
    const p=parseNote(NOTES[keyOf(q)]||{}), k=keyOf(q);
    return `<div class="vp" data-k="${k}">
      <div class="vp-h"><span class="vpn">${q.year}·${q.num}</span><span class="vpc">${p.concept}</span>
        <button class="hear" title="聽">🔊</button><span class="exp">＋ 展開</span></div>
      <div class="vp-c"></div></div>`;
  }).join("");
}

    else ex.textContent="＋ 展開";
  });
  // 🔊 點我聽：先念情境，再念易混與正確
  tree.querySelectorAll(".hear").forEach(b=>b.onclick=e=>{
    e.stopPropagation();

  });
  document.getElementById("expAll").onclick=()=>tree.querySelectorAll(".leaf").forEach(l=>{if(!l.classList.contains("cold"))l.classList.add("open");});

}

function diagramSVG(c){
  const nm={}; c.nodes.forEach(n=>nm[n.id]=n);
  const edges=c.edges.map(e=>{
    const a=nm[e.from], b=nm[e.to], cv=e.curve||0;
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2+cv;
    return `<path d="M ${a.x} ${a.y} Q ${mx} ${my} ${b.x} ${b.y}" fill="none" stroke="#3a3326" stroke-width="0.7"
      marker-end="url(#ah)" ${e.dash?'stroke-dasharray="2 1.6"':''}/>
      <text x="${mx}" y="${my-1.2}" class="el" text-anchor="middle">${e.label}</text>`;
  }).join("");
  const nodes=c.nodes.map(n=>`<circle cx="${n.x}" cy="${n.y}" r="5.4" fill="#fff" stroke="#2a2418" stroke-width="0.9"/>
    <text x="${n.x}" y="${n.y+1.6}" class="nl" text-anchor="middle">${n.label}</text>
    ${n.sub?`<text x="${n.x}" y="${n.y+9}" class="ns" text-anchor="middle">${n.sub}</text>`:''}`).join("");
  return `<svg class="relsvg" viewBox="0 0 100 54" preserveAspectRatio="xMidYMid meet">
    <defs><marker id="ah" markerWidth="5" markerHeight="5" refX="4.3" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 z" fill="#3a3326"/></marker></defs>${edges}${nodes}</svg>`;
}

    甲乙丙＝圈圈，他們之間的法律關係＝標號碼的箭頭線（①教唆②竊盜③送贓…），一看就懂誰對誰做了什麼。<br>

    html+=`<div class="sketch">

}
