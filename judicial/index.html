<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>司法官・律師一試｜歷屆全科複習（依當天考試節次）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0c0e13;--paper:#171b24;--ink:#e6e6e6;--muted:#7c8696;--line:#262b36;
        --green:#3ddc84;--greenbg:#10271c;--red:#ff6b6b;--blue:#7fb5ff;--gold:#e0c060;
        --grad:linear-gradient(135deg,#3a6ea5,#7c5cff);--card:linear-gradient(180deg,#171b24,#13161d);}
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:-apple-system,"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
       background:var(--bg);color:var(--ink);font-size:18px;line-height:1.6}
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(1100px 560px at 75% -8%,rgba(70,100,180,.13),transparent 60%),
               radial-gradient(900px 520px at -5% 105%,rgba(130,70,160,.11),transparent 60%);}
  .topnav{display:flex;gap:6px;background:#0b0d12;padding:8px 16px;border-bottom:1px solid #262b36;position:sticky;top:0;z-index:50;overflow-x:auto}
  .topnav a{color:#9aa4b2;text-decoration:none;font-size:14px;font-weight:600;padding:7px 16px;border-radius:8px;white-space:nowrap}
  .topnav a:hover{background:#161922;color:#e6e6e6}
  .topnav a.active{background:#1f2e3a;color:#7fb5ff}
  /* 頂部細條：倒數＋每日進度（一直顯示，不展開不擋畫面） */
  #topbar2{background:linear-gradient(135deg,#1b2030,#13161d 70%);color:#cfd6e2;font-size:12.5px;padding:6px 16px;display:flex;align-items:center;gap:14px;white-space:nowrap;overflow-x:auto;border-bottom:1px solid var(--line)}
  #topbar2 .brand{font-weight:bold;color:#dcd2ff;flex:none}
  #topbar2 .cd b{color:#ffd86b;margin:0 3px}
  #topbar2 #today.hit{color:#7CFFB0}
  .count b{font-size:21px;color:var(--gold);display:block}
  .sched{background:#11151c;border-bottom:1px solid var(--line);padding:6px 18px;font-size:13px;color:var(--muted);display:flex;gap:18px;flex-wrap:wrap}
  .sched b{color:#c3cad6}
  .controls{display:flex;gap:8px;padding:9px 18px;background:#11151c;border-bottom:1px solid var(--line);flex-wrap:wrap;align-items:center}
  .grp{display:flex;gap:4px;background:#0f1219;border:1px solid var(--line);border-radius:999px;padding:3px;flex-wrap:wrap}
  .controls button{border:none;background:transparent;padding:6px 14px;border-radius:999px;cursor:pointer;font-size:15px;font-family:inherit;white-space:nowrap;color:#9aa4b2;transition:.18s}
  .controls button:hover{color:#e6e6e6}
  .controls button.on{background:var(--grad);color:#fff;box-shadow:0 6px 18px rgba(80,90,255,.3)}
  #search{padding:7px 12px;border:1px solid var(--line);border-radius:999px;font-size:15px;width:150px;background:#0f1219;color:var(--ink)}
  #search::placeholder{color:#5b6472}
  .toggle{margin-left:auto;font-size:14px;color:var(--muted)}
  .wrap{display:flex;position:relative;height:calc(100vh - 96px)}
  /* 上方控制面板：平常收起，滑到頂條才滑出(覆蓋，不擠版面) */
  #ctrlzone{position:relative;z-index:42}
  #ctrl-tab{background:#11151c;border-bottom:1px solid var(--line);color:#9aa4b2;font-size:13px;text-align:center;padding:7px;letter-spacing:1px;cursor:default}
  #ctrl-tab .ctrl-hint{color:#5b6472;font-size:11px}
  #panel{position:absolute;top:100%;left:0;right:0;z-index:42;background:#0c0e13;border-bottom:1px solid var(--line);
         box-shadow:0 16px 40px rgba(0,0,0,.6);visibility:hidden;opacity:0;transform:translateY(-8px);transition:.22s}
  #ctrlzone:hover #panel{visibility:visible;opacity:1;transform:none}
  /* 錯題衝刺資訊條 */
  #sprintbar{display:none;position:absolute;top:0;left:0;right:0;z-index:35;
    background:linear-gradient(90deg,#3a2a10,#2a1f0c);border-bottom:1px solid var(--gold);
    color:#ffe7a8;font-size:13.5px;text-align:center;padding:8px}
  #sprintbar b{color:#ffd86b;margin:0 2px}
  body.sprintMode #detail{padding-top:42px}
  /* 錯題衝刺資訊條 */
  #sprintbar{display:none;position:absolute;top:0;left:0;right:0;z-index:35;
    background:linear-gradient(90deg,#3a2a10,#2a1f0c);border-bottom:1px solid var(--gold);
    color:#ffe7a8;font-size:13.5px;text-align:center;padding:8px}
  #sprintbar b{color:#ffd86b;margin:0 2px}
  body.sprintMode #detail{padding-top:42px}
  /* 考點統整左側目錄抽屜：平常細條(顯示現在位置)，滑上去展開可跳 */
  #sumnav{display:none;position:fixed;left:0;top:96px;height:calc(100vh - 96px);z-index:47;pointer-events:none}
  body.sumMode #sumnav{display:block}
  #sumnav-tab{pointer-events:auto;position:absolute;left:0;top:50%;transform:translateY(-50%);
    writing-mode:vertical-rl;background:#1b2030;border:1px solid var(--line);border-left:none;border-radius:0 12px 12px 0;
    padding:16px 9px;color:#ffd86b;font-size:14px;letter-spacing:3px;font-weight:bold;cursor:pointer;box-shadow:4px 0 16px rgba(0,0,0,.4);max-height:60vh;overflow:hidden}
  #sumnav-tab #sumnav-cur{color:#cfd6e2;font-size:13px}
  #sumnav-list{pointer-events:auto;position:absolute;left:0;top:0;height:100%;width:230px;background:#0f1219;border-right:1px solid var(--line);
    transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:12px 0 44px rgba(0,0,0,.55);overflow:auto;padding:10px 0}
  #sumnav-tab:hover + #sumnav-list,#sumnav-list:hover{transform:translateX(0)}
  #sumnav-list .snav{display:block;width:100%;text-align:left;background:none;border:none;border-left:3px solid transparent;
    color:#c3cad6;font-family:inherit;font-size:14px;padding:9px 16px;cursor:pointer;line-height:1.4}
  #sumnav-list .snav:hover{background:#1a2030;color:#fff}
  #sumnav-list .snav.cur{border-left-color:var(--gold);background:#1c2435;color:#ffd86b;font-weight:bold}
  #sumnav-list .snav.top{color:#9db4ff;font-weight:bold;border-bottom:1px solid var(--line);margin-bottom:6px}
  #sumnav-list .snav .gn{color:#7a8298;font-size:11.5px;margin-left:5px}
  #sumnav-list .snav-sys{position:sticky;top:0;background:#11151c;color:#ffd86b;font-size:12.5px;font-weight:bold;padding:6px 14px 5px;border-bottom:1px solid var(--line);z-index:1}
  #sumnav-list .snav.sub{padding:7px 14px 7px 22px;font-size:13px;color:#aeb6c4}
  #sumnav-list .snav.sub.cur{color:#ffd86b}
  /* 左側題目清單：滑到左緣才滑出(抽屜) */
  #list-tab{position:absolute;left:0;top:50%;transform:translateY(-50%);z-index:36;writing-mode:vertical-rl;
            background:#161922;border:1px solid var(--line);border-left:none;border-radius:0 12px 12px 0;
            padding:20px 9px;color:#9aa4b2;font-size:15px;letter-spacing:5px;cursor:pointer;box-shadow:4px 0 16px rgba(0,0,0,.35)}
  #list-tab:hover{color:#fff;background:#1f2937}
  #list{position:absolute;left:0;top:0;height:100%;width:370px;z-index:37;transform:translateX(-100%);
        transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:12px 0 44px rgba(0,0,0,.55);
        overflow:auto;border-right:1px solid var(--line);background:#0f1219}
  #list-tab:hover + #list,#list:hover{transform:translateX(0)}
  .secthead{position:sticky;top:0;background:#1b2030;color:#fff;padding:7px 14px;font-size:13px;z-index:2;border-bottom:1px solid var(--line)}
  .secthead .t{color:var(--gold)}
  .subhead{background:#11151c;padding:4px 14px 4px 22px;font-size:13px;color:#9aa4b2;font-weight:bold}
  .qrow{padding:9px 14px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;gap:8px;align-items:flex-start}
  .qrow:hover{background:#161c27}
  .qrow.sel{background:#1a2230;border-left:4px solid var(--gold)}
  .qrow .n{font-weight:bold;color:var(--blue);min-width:42px;font-size:14px}
  .qrow .s{font-size:13.5px;color:#9aa4b2;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .dot{width:9px;height:9px;border-radius:50%;margin-left:auto;margin-top:5px;flex:none}
  .dot.ok{background:var(--green)} .dot.review{background:var(--red)}
  #detail{position:absolute;inset:0;overflow:auto;padding:28px max(40px,5vw);z-index:1}
  #detail>*{max-width:1000px;margin-left:auto;margin-right:auto}
  .tags{display:flex;gap:7px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  .tag{background:#1f2430;border-radius:20px;padding:3px 11px;font-size:13px;color:#c3cad6}
  .tag.subj{background:var(--grad);color:#fff}
  .tag.per{background:var(--gold);color:#1b1b1b;font-weight:bold}
  .lawchip{background:#2a2410;border:1px solid var(--gold);border-radius:6px;padding:1px 8px;font-size:12px;color:#f0d98a}
  .stem{font-size:22px;line-height:1.7;margin:6px 0 16px;font-weight:500}
  .opt{border:2px solid var(--line);background:var(--paper);border-radius:12px;padding:11px 15px;margin:8px 0;display:flex;gap:11px;cursor:pointer}
  .opt .lab{font-weight:bold;color:var(--muted);flex:none}
  .opt.correct{border-color:var(--green);background:var(--greenbg)}
  .opt.correct .lab{color:var(--green)}
  .opt.correct::after{content:"✔ 官方正解";color:var(--green);margin-left:auto;font-size:14px;white-space:nowrap}
  body.hideAns .opt.correct{border-color:var(--line);background:var(--paper)}
  body.hideAns .opt.correct::after{content:""}
  body.hideAns .opt.correct.reveal{border-color:var(--green);background:var(--greenbg)}
  body.hideAns .opt.correct.reveal::after{content:"✔ 官方正解";color:var(--green);margin-left:auto;font-size:14px}
  .note{margin-top:20px;border:1px solid #3a3320;border-left:4px solid var(--gold);border-radius:14px;padding:16px 18px;
        background:linear-gradient(180deg,#1c1d18,#16160f);white-space:pre-wrap;line-height:1.8;color:#e9e4d3}
  .note h3{margin:0 0 8px;font-size:16px;color:#e0c060}
  .note.auto{border-style:dashed;border-color:#5a4f2a}
  .btns{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .btns button{font-family:inherit;font-size:15px;padding:9px 16px;border:none;border-radius:24px;cursor:pointer}
  .play{background:#3a6ea5;color:#fff} .note-play{background:#7a5cd0;color:#fff}
  .ok-b{background:#1f8a4c;color:#fff} .rev-b{background:#d64b4b;color:#fff}
  .btns button{transition:.12s}
  /* 按下去的「壓下」感：內凹陰影＋亮環＋打勾標記 */
  .ok-b.on,.rev-b.on{transform:translateY(1px);box-shadow:inset 0 4px 11px rgba(0,0,0,.55);filter:brightness(.82)}
  .ok-b.on{outline:2.5px solid #9af0bf;outline-offset:1px}
  .rev-b.on{outline:2.5px solid #ffb3b3;outline-offset:1px}
  .ok-b.on::after{content:" ✓";font-weight:bold} .rev-b.on::after{content:" ✓";font-weight:bold}
  .nav{display:flex;justify-content:space-between;margin-top:22px;border-top:1px solid var(--line);padding-top:14px}
  .nav button{background:#1f2430;color:#fff;border:1px solid var(--line);border-radius:24px;padding:9px 20px;font-size:15px;cursor:pointer}
  .empty{color:var(--muted);padding:40px;text-align:center}
  /* ===== 考點統整模式 ===== */
  .modebar{display:flex;gap:4px;background:#0f1219;border:1px solid var(--line);border-radius:999px;padding:3px}
  .modebar button{color:#cdb86a;background:transparent;font-weight:bold;border-radius:999px}
  .modebar button.on{background:var(--grad);color:#fff;box-shadow:0 6px 18px rgba(80,90,255,.3)}
  #subjbar{display:none;gap:8px;padding:9px 18px;background:#11151c;border-bottom:1px solid var(--line);flex-wrap:wrap;align-items:center}
  #summary{display:none;height:calc(100vh - 96px);overflow:auto;padding:18px 22px;max-width:1000px;margin:0 auto}
  .sumtitle{font-size:15px;color:#e0c060;font-weight:bold;margin:18px 0 8px;border-bottom:2px solid var(--gold);padding-bottom:5px;position:sticky;top:-18px;background:var(--bg);z-index:2}
  .sumtitle:first-child{margin-top:0}
  /* 法條速記表 */
  .lawrow{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:10px;padding:11px 14px;margin:9px 0}
  .lawrow .law{font-weight:bold;color:#e0c060;font-size:16px}
  .lawrow .cpt{color:var(--blue);font-weight:bold;font-size:15px;margin-left:6px}
  .lawrow .key{display:block;margin-top:5px;color:#d3d8e0;font-size:15.5px;line-height:1.7}
  .lawrow .key b{color:#ff8a8a}
  .qchips{margin-top:7px;display:flex;gap:5px;flex-wrap:wrap}
  .qchip{background:#1f2430;border-radius:14px;padding:1px 9px;font-size:12px;color:#c3cad6;cursor:pointer;border:none;font-family:inherit}
  .qchip:hover{background:var(--gold);color:#1b1b1b}
  /* 易錯觀念卡 */
  .trapcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin:10px 0;cursor:pointer}
  .trapcard .qtag{font-size:12px;color:var(--muted);margin-bottom:4px}
  .trapcard .trap{font-size:16px;line-height:1.7}
  .trapcard .trap .x{color:#ff6b6b;font-weight:bold}
  .trapcard .ans{display:none;margin-top:11px;padding-top:10px;border-top:1px dashed var(--gold);font-size:15.5px;line-height:1.75}
  .trapcard.open{border-color:var(--green);background:#10241b}
  .trapcard.open .ans{display:block}
  .trapcard .flip{font-size:12px;color:var(--blue);margin-top:6px}
  .sumcount{font-size:13.5px;color:#b9b0c8;margin-bottom:14px;line-height:1.7;background:rgba(20,26,40,.6);border:1px dashed var(--gold);border-radius:10px;padding:10px 14px}
  .sumcount b{color:#e0c060}
  /* 抽屜地圖 */
  .sysmap{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;align-items:center}
  .sysmap::before{content:"";}
  .mapbtn{font-family:inherit;font-size:13px;font-weight:bold;padding:5px 12px;border-radius:16px;border:1.5px solid var(--blue);background:#161b28;color:#9db4ff;cursor:pointer}
  .mapbtn:hover{background:var(--blue);color:#fff}
  /* 體系群組 */
  .sysgrp{margin-bottom:14px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#0f131b}
  .sysgrp-h{font-size:17px;font-weight:bold;color:#ffd86b;padding:12px 16px;cursor:pointer;background:linear-gradient(90deg,#1b2030,#12151d);display:flex;align-items:center;gap:10px;user-select:none}
  .sysgrp-h::before{content:"▾";font-size:14px;color:var(--gold);transition:transform .2s}
  .sysgrp:not(.open) .sysgrp-h::before{transform:rotate(-90deg)}
  .sysgrp-h .gn{margin-left:auto;font-size:12px;color:#8a8aa0;font-weight:normal;background:#1f2535;padding:2px 9px;border-radius:10px}
  .sysgrp-body{padding:10px 14px 14px}
  .sysgrp:not(.open) .sysgrp-body{display:none}
  /* 考點卡 */
  .kpt{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:10px;padding:11px 14px;margin:9px 0}
  .kpt-top{display:flex;align-items:flex-start;gap:7px;flex-wrap:wrap}
  .kpt-top .law{font-weight:bold;color:#e0c060;font-size:15px}
  .kpt-top .cpt{color:var(--blue);font-weight:bold;font-size:15.5px;flex:1}
  .kpt-audio{flex:none;background:#7c5cff;color:#fff;border:none;border-radius:50%;width:30px;height:30px;font-size:15px;cursor:pointer;box-shadow:0 3px 9px rgba(124,92,255,.4)}
  /* 考點卡上的「再看／我懂了」標記鈕，按下去會壓下變色 */
  .km{flex:none;width:32px;height:28px;border-radius:9px;border:1px solid var(--line);background:#222834;color:#aeb6c4;font-size:14px;cursor:pointer;transition:.12s;padding:0}
  .km:hover{filter:brightness(1.15)}
  .km.rev.on{background:#d64b4b;color:#fff;border-color:#ff9d9d;box-shadow:inset 0 3px 7px rgba(0,0,0,.5);transform:translateY(1px)}
  .km.ok.on{background:#1f8a4c;color:#fff;border-color:#9af0bf;box-shadow:inset 0 3px 7px rgba(0,0,0,.5);transform:translateY(1px)}
  .kpt .key{margin-top:6px;color:#e7ebf2;font-size:15.5px;line-height:1.75;font-weight:600}
  .kpt .key b{color:#ff8a8a}
  .kpt .krules{margin-top:7px;color:#cdb0a0;font-size:13.5px;line-height:1.65;background:rgba(60,30,20,.35);border-radius:8px;padding:7px 10px}
  .kpt .krules b{color:#ff9d6b}
  .qchips{margin-top:9px;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
  .qchips-lab{font-size:12px;color:#8a8aa0}
  .qchip{background:#1f2430;border-radius:14px;padding:2px 10px;font-size:12.5px;color:#c3cad6;cursor:pointer;border:none;font-family:inherit}
  .qchip:hover{background:var(--gold);color:#1b1b1b}
  .qchip.on{outline:2px solid var(--blue);outline-offset:1px;background:#26314a;color:#fff}
  .qchip.ok{background:#1f8a4c;color:#fff}
  .qchip.review{background:#d64b4b;color:#fff}
  /* 攤開的原題 */
  .qopen:empty{display:none}
  .qcard{margin-top:10px;background:#0c0f16;border:1px solid var(--blue);border-radius:10px;padding:12px 14px}
  .qcard-h{font-size:13px;color:#9db4ff;font-weight:bold;margin-bottom:8px;display:flex;align-items:center;gap:10px}
  .qcard-audio{font-family:inherit;font-size:12px;background:#7c5cff;color:#fff;border:none;border-radius:14px;padding:3px 11px;cursor:pointer}
  .qstem{font-size:15.5px;line-height:1.7;margin-bottom:9px}
  .sopt{font-size:14.5px;line-height:1.6;padding:5px 9px;border-radius:7px;margin:3px 0;background:#141923;color:#c3cad6}
  .sopt.cor{background:#13301f;color:#9af0bf;border:1px solid var(--green);font-weight:600}
  .sopt b{color:#e0c060;margin-right:4px}
  .qnote{margin-top:10px;padding-top:9px;border-top:1px dashed var(--gold);font-size:14.5px;line-height:1.8;color:#d9c98c}
  /* ===== 知識樹 ===== */
  #tree{display:none;height:calc(100vh - 96px);overflow:auto;padding:16px;max-width:1060px;margin:0 auto}
  .treehint{background:rgba(20,26,40,.7);border:1px dashed var(--gold);border-radius:10px;padding:11px 14px;font-size:14.5px;color:#d9c98c;margin-bottom:16px;line-height:1.7}
  .branch{border-radius:16px;padding:14px 16px;margin-bottom:18px;border:1px solid var(--line)}
  .branch.zong{background:linear-gradient(180deg,#141d2c,#10141c);border-color:#2a3a55}
  .branch.fen{background:linear-gradient(180deg,#241620,#171015);border-color:#5a3145}
  .branch>h2{margin:0 0 6px;font-size:21px;display:flex;align-items:center;gap:9px}
  .branch.zong>h2{color:#7fb5ff} .branch.fen>h2{color:#ff9ecb}
  .branch>.sub{font-size:13px;color:var(--muted);margin-bottom:12px}
  .grp2{margin:14px 0 4px}
  .grp2>h3{margin:0 0 7px;font-size:15px;color:#c3cad6;display:flex;align-items:center;gap:7px}
  .grp2.zong>h3{border-left:5px solid #3a6ea5;padding-left:9px}
  .grp2.fen>h3{border-left:5px solid #c0613a;padding-left:9px}
  .leaf{border:1px solid var(--line);border-radius:11px;margin:6px 0;background:#13171f;overflow:hidden}
  .leaf-head{padding:10px 13px;cursor:pointer;display:flex;align-items:center;gap:9px;font-size:16px}
  .leaf-head:hover{background:#1a1f2a}
  .leaf-head .ic{font-size:17px}
  .leaf .bdg{margin-left:auto;background:#262b36;border-radius:13px;padding:1px 10px;font-size:12.5px;color:#c3cad6;font-weight:bold;flex:none}
  .leaf.hot .leaf-head{background:#241a12}
  .leaf.hot .bdg{background:#e0894e;color:#fff}
  .leaf.cold .leaf-head{opacity:.5}
  .leaf.cold .bdg{background:#333a47;color:#8a94a3}
  .leaf.open{border-color:var(--blue);box-shadow:0 6px 22px rgba(80,120,200,.18)}

<script>
const Q = window.QUESTIONS || [];
const NOTES = window.NOTES || {};
const LS = "sjg_marks_v2";
let marks = JSON.parse(localStorage.getItem(LS) || "{}");
let curYear = Math.max(...Q.map(q=>q.year));
let curSec = "全部";          // 全部/刑事組/公法組/民事組/商事組
let curKey = null, search = "";
let activeQ = null;   // 計時器要標記的「目前這一題」，不分模式（逐題/衝刺/考點統整開的題都算）

function daysTo(d){return Math.max(0,Math.ceil((new Date(d)-new Date())/86400000));}
d1.textContent = daysTo("2026-08-01")+"天";

/* ===== 每日進度：記錄今天複習了哪些題、連續幾天 ===== */
const DLS="sjg_daily_v1", GOAL=50;
let daily=JSON.parse(localStorage.getItem(DLS)||"{}");   // {日期:[題key]}
function dstr(d){return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function recordStudied(k){
  const t=dstr(new Date());
  if(!daily[t]) daily[t]=[];
  if(!daily[t].includes(k)){ daily[t].push(k); localStorage.setItem(DLS,JSON.stringify(daily)); }
  updateDaily();
}
function streakDays(){
  let s=0; const d=new Date();
  if(!(daily[dstr(d)]||[]).length) d.setDate(d.getDate()-1); // 今天還沒做也算延續昨天
  while((daily[dstr(d)]||[]).length){ s++; d.setDate(d.getDate()-1); }
  return s;
}
function updateDaily(){
  const n=(daily[dstr(new Date())]||[]).length;
  const te=document.getElementById("today"); if(te){ te.textContent=n; te.classList.toggle("hit",n>=GOAL); }
  const se=document.getElementById("streakN"); if(se) se.textContent=streakDays();
}
d2.textContent = daysTo("2026-08-08")+"天";

const years = [...new Set(Q.map(q=>q.year))].sort();
const secOrder = ["刑事組","公法組","民事組","商事組"];
const secLabel = {"全部":"全部","刑事組":"①刑事","公法組":"②公法","民事組":"③民事","商事組":"④商事"};

function buildTabs(){
  years_el.innerHTML = years.map(y=>`<button data-y="${y}" class="${y==curYear?'on':''}">${y}年</button>`).join("");
  years_el.querySelectorAll("button").forEach(b=>b.onclick=()=>{curYear=+b.dataset.y;buildTabs();renderList();});
  const secs=["全部",...secOrder];
  sections_el.innerHTML = secs.map(s=>`<button data-s="${s}" class="${s==curSec?'on':''}">${secLabel[s]}</button>`).join("");
  sections_el.querySelectorAll("button").forEach(b=>b.onclick=()=>{
    curSec=b.dataset.s; buildTabs();
    if(mode==="summary"){ if(curSec==="全部"||!SUBJ[curSec]){curSec="刑事組";buildTabs();} buildSubjBar(); renderSummary(); }
    else renderList();
  });
}
const years_el=document.getElementById("years"), sections_el=document.getElementById("sections");

function keyOf(q){return q.year+"-"+q.section+"-"+q.num;}
function filtered(){
  if(mode==="sprint"){
    let r = Q.filter(q=> marks[keyOf(q)]==="review"
        && (!search || (q.stem+q.options.join("")).includes(search)) );
    r.sort((a,b)=> a.section.localeCompare(b.section) || a.year-b.year || a.num-b.num);
    return r;
  }
  let r = Q.filter(q=> q.year===curYear
      && (curSec==="全部"||q.section===curSec)
      && (!search || (q.stem+q.options.join("")).includes(search)) );
  r.sort((a,b)=> a.period-b.period || a.num-b.num);
  return r;
}

function renderList(){
  const items=filtered();
  let html="", lastSec=null, lastSub=null;
  items.forEach(q=>{
    if(q.section!==lastSec){
      html+=`<div class="secthead"><span class="t">第${q.period}節 ${q.time}</span>　${q.volume}·${q.section}</div>`;
      lastSec=q.section; lastSub=null;
    }
    if(q.section==="刑事組" && q.subject!==lastSub){
      html+=`<div class="subhead">${q.subject}</div>`; lastSub=q.subject;
    }
    const k=keyOf(q), m=marks[k];
    html+=`<div class="qrow ${k===curKey?'sel':''}" data-k="${k}">
        <span class="n">第${q.num}題</span><span class="s">${q.stem.slice(0,42)}</span>
        <span class="dot ${m||''}"></span></div>`;
  });
  list.innerHTML = html || `<div class="empty">沒有符合的題目</div>`;
  list.querySelectorAll(".qrow").forEach(r=>r.onclick=()=>showQ(r.dataset.k));
  prog.textContent = Object.values(marks).filter(v=>v==="ok").length;
}
const list=document.getElementById("list");

function qByKey(k){const[y,sec,n]=k.split("-");return Q.find(q=>q.year==y&&q.section===sec&&q.num==n);}
function qType(s){return /錯誤|不正確|何者非|不屬|不包括|不得|尚非|不成立|不違反/.test(s)?"找『錯』的":
  /正確|何者是|何者得|何者應|構成|成立|何罪/.test(s)?"找『對』的":"判斷題";}
function autoNote(q){
  const laws=q.laws.length?("　法條："+q.laws.join("、")):"";
  const ansTxt = q.ansLetter==="#" ? "本題官方一律給分（送分題）" : q.ansLetter;
  return {auto:true,concept:"考點提示（詳解待補）",
    body:`📌 ${q.volume}・${q.section}（${q.subject}）${laws}\n📝 題型：這題要你${qType(q.stem)}\n✔ 官方答案：${ansTxt}\n\n（白話詳解之後補。）`};
}

function autoActors(s){
  const r=[];
  "甲乙丙丁戊己庚辛壬癸".split("").forEach(a=>{if(s.includes(a))r.push(a);});
  ["A","B","C","D","X","Y"].forEach(a=>{ if(new RegExp(a+"(女|男|公司|銀行|地|屋|店|機關|車|藥|畫|船|廠)").test(s)&&!r.includes(a)) r.push(a); });
  return r;
}
function studyDiagram(q){
  // 每一題都有圖：有手繪精準關係圖就用它，否則自動用當事人＋情境畫成箭頭圖
  const k=keyOf(q), d=(window.DIAG||{})[k], p=parseNote(NOTES[k]||{});
  let body, tag;
  if(d&&d.n&&d.e){ body=diagText(d); tag="🖼️ 關係圖"; }
  else{
    const ac=autoActors(q.stem), sc=scenOf(q); tag="🖼️ 快速理解";
    if(ac.length===2) body=diagText({n:ac,e:[`${ac[0]}>${ac[1]}|${sc}`]});
    else body=`<div class="reldiag">${ac.length?`<div class="rel-line">👥 ${ac.map(a=>`（${a}）`).join(" ")}</div>`:""}<div class="rel-line" style="font-size:16px">📖 ${sc}</div></div>`;
  }
  const key=memPoint(q,d,p);
  return `<div class="studydiag"><div class="sd-h">${tag}</div>${body}${key?`<div class="sk-point">📌 要記(觀念)：${key}</div>`:""}</div>`;
}
function showQ(k){
  curKey=k; activeQ=k; const q=qByKey(k); const note=NOTES[k]||autoNote(q);
  document.body.classList.toggle("hideAns", hideAns.checked);
  const L=["A","B","C","D"];
  const opts=q.options.map((o,i)=>`<div class="opt ${i===q.ansIndex?'correct':''}">
      <span class="lab">${L[i]}</span><span>${o}</span></div>`).join("");
  const laws=q.laws.map(l=>`<span class="lawchip">${l}</span>`).join("");
  detail.innerHTML=`
    <div class="tags"><span class="tag per">第${q.period}節 ${q.time}</span>
      <span class="tag subj">${q.section}</span><span class="tag">${q.subject}</span>
      <span class="tag">${q.year}年 第${q.num}題</span>${laws}</div>
    <div class="stem">${q.stem}</div>${opts}
    ${q.ansLetter==="#"?'<div style="margin:10px 0;padding:8px 14px;background:#fff3cd;border:2px solid var(--gold);border-radius:10px;font-weight:bold">⭐ 本題官方一律給分（送分題）</div>':''}
    ${studyDiagram(q)}
    <div class="note ${note.auto?'auto':''}"><h3>🖊️ ${note.concept}</h3>${note.body}</div>
    <div class="btns">
      <button class="play" onclick="readQ()">🔊 念題目</button>
      <button class="note-play" onclick="readNote()">🔊 念詳解</button>
      <button class="ok-b ${marks[k]==='ok'?'on':''}" onclick="mark('ok')">✅ 我懂了</button>
      <button class="rev-b ${marks[k]==='review'?'on':''}" onclick="mark('review')">🔁 再看</button></div>
    <div class="nav"><button onclick="step(-1)">◀ 上一題</button>
      <button onclick="step(1)">下一題 ▶</button></div>`;
  detail.querySelectorAll(".opt").forEach(o=>o.onclick=()=>o.classList.add("reveal"));
  window._q=q; window._note=note; recordStudied(k); renderList(); if(typeof tAutoRestart==="function") tAutoRestart();
  const sel=list.querySelector(".qrow.sel"); if(sel) list.scrollTop=Math.max(0,sel.offsetTop-44); // 選到的題自動移到最上面
  detail.scrollTop=0;
}
const detail=document.getElementById("detail"), hideAns=document.getElementById("hideAns");

function step(d){const it=filtered();const i=it.findIndex(q=>keyOf(q)===curKey);const n=it[i+d];if(n)showQ(keyOf(n));}
function mark(t){
  const sprint=mode==="sprint";
  if(sprint && t==="review" && marks[curKey]==="review"){ // 衝刺中按再看：保留、跳下一題(下一輪再刷)
    const pool=filtered(),i=pool.findIndex(q=>keyOf(q)===curKey),n=pool[i+1]||pool[0];
    if(n&&keyOf(n)!==curKey) showQ(keyOf(n)); return;
  }
  const oldIdx=sprint?filtered().findIndex(q=>keyOf(q)===curKey):-1;
  marks[curKey]=marks[curKey]===t?undefined:t; if(!marks[curKey])delete marks[curKey];
  localStorage.setItem(LS,JSON.stringify(marks)); renderList();
  const _o=detail.querySelector(".ok-b"),_r=detail.querySelector(".rev-b");
  if(_o)_o.classList.toggle("on",marks[curKey]==="ok");
  if(_r)_r.classList.toggle("on",marks[curKey]==="review");
  if(sprint){ updateSprintBanner();
    if(marks[curKey]!=="review"){ const pool=filtered();
      if(pool.length) showQ(keyOf(pool[Math.min(Math.max(oldIdx,0),pool.length-1)]));
      else showSprintDone();
    }
  }
}
function updateSprintBanner(){
  const n=Q.filter(q=>marks[keyOf(q)]==="review").length;
  const sb=document.getElementById("sprintbar");
  sb.innerHTML=`🔁 <b>錯題衝刺</b>　還剩 <b>${n}</b> 題　·　按「✅ 我懂了」就從這裡消失；按「🔁 再看」留著下輪再刷`;
}
function showSprintDone(){
  detail.innerHTML=`<div class="empty" style="font-size:18px;line-height:2.1">🎉 「🔁 再看」的題全清光了！<br>
    <span style="font-size:14px;color:#9aa4b2">回「📖 逐題複習」做題，遇到不會的點「🔁 再看」，<br>它們就會自動進到這裡讓你反覆衝刺。</span></div>`;
}
function enterSprint(){
  const pool=filtered(); renderList(); updateSprintBanner();
  if(pool.length) showQ(keyOf(pool[0])); else showSprintDone();
}

function cleanForSpeech(t){
  return t
    .replace(/§\s*(\d+)\s*-\s*(\d+)/g,'第$1條之$2')   // §131-1 → 第131條之1
    .replace(/§\s*(\d+)/g,'第$1條')                    // §158 → 第158條
    .replace(/Ⅰ/g,'第一項').replace(/Ⅱ/g,'第二項').replace(/Ⅲ/g,'第三項')
    .replace(/\p{Extended_Pictographic}/gu,' ')         // 去掉所有 emoji（語音引擎會卡住）
    .replace(/[【】→•·▶◀↺✔（）()]/g,' ')
    .replace(/\n+/g,'。').replace(/\s+/g,' ').trim();
}
function speak(t){
  t=cleanForSpeech(t); if(!t) return;
  const u=new SpeechSynthesisUtterance(t);u.lang="zh-TW";u.rate=.92;
  const v=speechSynthesis.getVoices().find(v=>/zh|TW|Chinese|Mei|Ting|Han/i.test(v.lang+v.name));if(v)u.voice=v;
  speechSynthesis.cancel();speechSynthesis.speak(u);}
function readQ(){const q=window._q,L=["A","B","C","D"];
  speak("第"+q.num+"題。"+q.stem+" "+q.options.map((o,i)=>"選項"+L[i]+"，"+o).join("。"));}
function readNote(){const n=window._note;speak(n.concept+"。"+n.body);}

document.getElementById("search").oninput=e=>{search=e.target.value.trim();renderList();};
hideAns.onchange=()=>{if(curKey)showQ(curKey);};

/* ===================== 考點統整模式 ===================== */
let mode="study", sumView="sys", curSub=null;
const SUBJ={
  刑事組:["刑法","刑訴","法律倫理"],
  公法組:["憲法","行政法","國際公法","國際私法"],
  民事組:["民法","民訴"],
  商事組:["公司法","保險法","票據法","證交法","強制執行","法學英文"]
};
function subOf(q){
  const n=q.num, sec=q.section;
  if(sec==="刑事組") return n<=35?"刑法":n<=60?"刑訴":"法律倫理";
  if(sec==="民事組") return n<=50?"民法":"民訴";
  if(sec==="商事組") return n<=15?"公司法":n<=25?"保險法":n<=35?"票據法":n<=45?"證交法":n<=55?"強制執行":"法學英文";
  if(sec==="公法組"){
    const law=((NOTES[keyOf(q)]||{}).body||"").split("\n").find(l=>l.trim().startsWith("⚖️"))||"";
    if(/涉外|國際私法|準據法|反致|法律適用法/.test(law)) return "國際私法";
    if(/國際公法|條約|公約|海洋法|聯合國|領海|引渡|戰爭|國際法院|外交/.test(law)) return "國際公法";
    if(/行政/.test(law)) return "行政法";
    return "憲法";
  }
  return q.subject;
}
// ===== 體系分類（記憶抽屜）：把每題歸到正確的體系格子 =====
function systemOf(q){
  const su=subOf(q);
  const c=(NOTES[keyOf(q)]||{}).concept||"";
  const law=((NOTES[keyOf(q)]||{}).body||"").split("\n").find(l=>l.trim().startsWith("⚖️"))||"";
  const t=c+" "+law;
  const has=re=>re.test(t);
  if(su==="刑法"){
    if(has(/故意|過失|因果|結果加重|不作為|構成要件|錯誤|包攝|打擊|客體錯誤/)) return "刑總·構成要件/故意過失";
    if(has(/正當防衛|緊急避難|承諾|阻卻違法|依法令|依命令|自助/)) return "刑總·阻卻違法";

    if(has(/未遂|中止|預備|著手|不能犯/)) return "刑總·未遂";
    if(has(/正犯|共犯|教唆|幫助|共同正犯|間接正犯|結夥|脫離/)) return "刑總·正犯與共犯";
    if(has(/競合|想像競合|數罪|吸收|不罰|罪數|牽連|接續/)) return "刑總·罪數競合";
    if(has(/沒收|易科|易服|緩刑|累犯|自首|量刑|褫奪|保安處分|時效|追訴權|主刑|從刑|利得/)) return "刑總·刑罰與沒收";
    if(has(/殺人|傷害|遺棄|墮胎|性交|猥褻|妨害自由|拘禁|強制|恐嚇|名譽|誹謗|侮辱|秘密|電腦|GPS|跟追/)) return "刑分·個人法益";
    if(has(/竊盜|搶奪|強盜|詐欺|侵占|背信|恐嚇取財|贓物|毀損|重利|擄人勒贖|結合犯/)) return "刑分·財產犯罪";
    if(has(/瀆職|受賄|行賄|圖利|濫權|洩.*秘密|妨害公務|脫逃|藏匿|頂替|湮滅|偽證|誣告|投票|賄選/)) return "刑分·國家法益";
    if(has(/公共危險|放火|決水|往來|交通|酒駕|不能安全駕駛|偽造貨幣|偽造文書|有價證券|印章|署押|賭博|猥褻物品|風化|鴉片|毒品/)) return "刑分·社會法益";
    return "刑分·其他";
  }
  if(su==="法律倫理"){
    if(has(/檢察官|檢察一體|檢察長|偵查不公開/)) return "倫理·檢察官";
    if(has(/律師/)) return "倫理·律師";
    if(has(/法官/)) return "倫理·法官";
    return "倫理·通則";
  }
  if(su==="刑訴"){
    if(has(/傳喚|拘提|逮捕|現行犯|通緝|羈押|具保|責付|搜索|扣押|監聽|通訊監察|身體檢查|強制處分/)) return "刑訴·強制處分";
    if(has(/證據|自白|傳聞|補強|證據能力|證據排除|權衡|158|159|156|勘驗|鑑定|詰問|誘導|證人|具結/)) return "刑訴·證據法則";
    if(has(/告訴|告發|自訴|不起訴|緩起訴|起訴|再議|准許提起自訴|偵查|卷證|辯護人指定/)) return "刑訴·偵查與起訴";
    if(has(/管轄|迴避|簡式|簡易|協商|國民法官|一造辯論|準備程序|審判|判決|相牽連|追加起訴|變更起訴/)) return "刑訴·審判程序";
    if(has(/上訴|抗告|再審|非常上訴|確定/)) return "刑訴·救濟程序";
    return "刑訴·其他";
  }
  if(su==="憲法"){
    if(has(/平等|自由|財產|工作|訴訟|人身|隱私|秘密通訊|集會|結社|宗教|受教育|生命|人格|遷徙|居住|基本權|釋字|憲判|比例原則|法律保留/)) return "憲法·基本權";
    return "憲法·政府組織與釋憲";
  }
  if(su==="行政法"){
    if(has(/組織|機關|管轄|公務員|委託|委任|行政法人|公物|地方自治|自治條例|自治規則/)) return "行政法·組織與自治";
    if(has(/處分|命令|規則|契約|行政罰|事實行為|裁量|法律保留|信賴保護|比例|附款|程序|聽證|送達/)) return "行政法·行政作用";
    if(has(/訴願|行政訴訟|國家賠償|國賠|損失補償|強制執行|暫時權利|審判權|救濟/)) return "行政法·行政救濟";
    return "行政法·其他";
  }
  if(su==="國際公法") return "國際公法";
  if(su==="國際私法") return "國際私法";
  if(su==="民法"){
    if(has(/行為能力|意思表示|法律行為|代理|消滅時效|條件|期日|期間|權利能力|人格|法人|住所|物之概念|誠信|權利濫用|監護宣告|輔助宣告|死亡宣告/)) return "民總";
    if(has(/債|契約|侵權|不當得利|無因管理|買賣|租賃|承攬|委任|借貸|保證|債務不履行|給付|代位|撤銷|讓與|承擔|連帶|抵銷|定金|違約金|解除|擔保|瑕疵/)) return "債編";

    if(has(/繼承|遺產|遺囑|特留分|應繼分|拋棄繼承|限定|代位繼承|歸扣|遺贈/)) return "繼承";

    if(has(/管轄|當事人|訴訟能力|選定當事人|訴訟標的|起訴|訴之變更|追加|反訴|重複起訴|當事人恆定|適格/)) return "民訴·主體與標的";
    if(has(/言詞辯論|自認|舉證|證據|證人|調解|和解|爭點|審理|闡明/)) return "民訴·審理與證據";
    if(has(/判決|既判力|確定|對世效|假執行|對待給付/)) return "民訴·裁判效力";

    if(has(/保全|假扣押|假處分|支付命令|公示催告|簡易|小額|家事|繫屬登記|保全證據/)) return "民訴·特別與保全程序";
    return "民訴·其他";
  }
  return su; // 公司/保險/票據/證交/強執/法學英文 已是體系
}
function parseNote(note){
  const lines=(note.body||"").split("\n");
  const grab=e=>{const m=lines.find(l=>l.trim().startsWith(e));return m?m.replace(e,"").replace(/^法條：/,"").trim():"";};
  return {law:grab("⚖️"), key:grab("🔑"), ans:grab("✅"), trap:grab("❌"), concept:note.concept||""};
}
function sumItems(){
  return Q.filter(q=> q.section===curSec && NOTES[keyOf(q)] && (!curSub||subOf(q)===curSub))
          .sort((a,b)=> a.num-b.num || a.year-b.year)
          .map(q=>({q, p:parseNote(NOTES[keyOf(q)]), k:keyOf(q)}));
}
function aggRules(its){
  const keys=[],traps=[],anss=[];
  its.forEach(it=>{
    if(it.p.key&&!keys.includes(it.p.key)) keys.push(it.p.key);
    if(it.p.trap&&!traps.includes(it.p.trap)) traps.push(it.p.trap);
    if(it.p.ans&&!anss.includes(it.p.ans)) anss.push(it.p.ans);
  });
  return {keys,traps,anss};
}
function kptCardHTML(concept,its){
  const law=(its.find(x=>x.p.law)||{p:{}}).p.law||"";
  const {keys,traps,anss}=aggRules(its);
  const ks=its.map(it=>it.k);
  const allOk=ks.length&&ks.every(k=>marks[k]==="ok"), anyRev=ks.some(k=>marks[k]==="review");
  const chips=its.sort((a,b)=>a.q.year-b.q.year).map(it=>`<button class="qchip ${marks[it.k]||''}" data-k="${it.k}">${it.q.year}·${it.q.num}</button>`).join("");
  const keyHTML=keys.length?`<div class="key">${keys.map(k=>"🔑 "+k).join("<br>")}</div>`:
                (anss.length?`<div class="key">${anss.map(a=>"✅ "+a).join("<br>")}</div>`:"");
  const trapHTML=traps.length?`<div class="krules"><b>⚠️ 別搞混（其他選項也考過的規則）：</b>${traps.join("　｜　")}</div>`:"";
  const speakTxt=concept+"。"+keys.concat(anss).join("。")+"。"+(traps.length?"要分清楚："+traps.join("。"):"");
  return `<div class="kpt">
    <div class="kpt-top"><span class="law">${law}</span><span class="cpt">${concept}</span>
      <button class="km rev ${anyRev?'on':''}" title="再看(整個考點)">🔁</button>
      <button class="km ok ${allOk?'on':''}" title="我懂了(整個考點)">✅</button>
      <button class="kpt-audio" data-s="${encodeURIComponent(speakTxt)}" title="念這個考點">🔊</button></div>
    ${keyHTML}${trapHTML}
    <div class="qchips"><span class="qchips-lab">原題👉</span>${chips}</div>
    <div class="qopen" data-k=""></div></div>`;
}
function refreshCardMark(card){
  const ks=[...card.querySelectorAll(".qchip")].map(c=>c.dataset.k);
  const allOk=ks.length&&ks.every(k=>marks[k]==="ok"), anyRev=ks.some(k=>marks[k]==="review");
  card.querySelector(".km.rev").classList.toggle("on",anyRev);
  card.querySelector(".km.ok").classList.toggle("on",allOk);
  card.querySelectorAll(".qchip").forEach(c=>{c.classList.remove("ok","review");const m=marks[c.dataset.k];if(m&&!c.classList.contains("on"))c.classList.add(m);});
}
function sumQHTML(k){
  const q=qByKey(k),note=NOTES[k]||{},L=["A","B","C","D"];
  const opts=q.options.map((o,i)=>`<div class="sopt ${i===q.ansIndex?'cor':''}"><b>${L[i]}</b> ${o}</div>`).join("");
  return `<div class="qcard">
    <div class="qcard-h">📄 ${q.year}年 第${q.num}題　<button class="qcard-audio" data-k="${k}">🔊 念整題</button></div>
    <div class="qstem">${q.stem}</div>${opts}

function toggleQOpen(chip){
  const kpt=chip.closest(".kpt"),open=kpt.querySelector(".qopen"),k=chip.dataset.k;
  if(open.dataset.k===k){open.innerHTML="";open.dataset.k="";chip.classList.remove("on");refreshCardMark(kpt);return;}
  kpt.querySelectorAll(".qchip").forEach(c=>{c.classList.remove("on");const m=marks[c.dataset.k];if(m)c.classList.add(m);});
  chip.classList.add("on");open.innerHTML=sumQHTML(k);open.dataset.k=k;
  activeQ=k;                                    // 打開哪題，計時器就對哪題
  const ab=open.querySelector(".qcard-audio");
  ab.onclick=e=>{e.stopPropagation();window._q=qByKey(k);readQ();};
  if(typeof tAutoRestart==="function") tAutoRestart();
}
function renderSummary(){
  const items=sumItems(); let html="";
  if(sumView==="trap"){
    const cards=items.filter(it=>it.p.trap);
    html=`<div class="sumcount">⚠️ <b>${curSub}</b>　共 <b>${cards.length}</b> 張易混淆卡｜先看陷阱說法，<b>點卡片翻開</b>看正解記憶</div>`;
    cards.forEach(it=>{
      html+=`<div class="trapcard" data-k="${it.k}">
        <div class="qtag">${it.q.year}年第${it.q.num}題｜${it.p.concept}</div>
        <div class="trap"><span class="x">⚠️ 常考易混淆：</span>${it.p.trap}</div>
        <div class="flip">👆 點開看正解＋法條</div>
        <div class="ans">✅ ${it.p.ans}${it.p.law?`<br><span style="color:#9a6a16">⚖️ ${it.p.law}</span>`:""}
          ${it.p.key?`<br>🔑 ${it.p.key}`:""}</div></div>`;
    });
    summary.innerHTML=html||`<div class="empty">此科目尚無資料</div>`;
    summary.querySelectorAll(".trapcard").forEach(card=>card.onclick=()=>card.classList.toggle("open"));
    return;
  }
  const totalC=new Set(items.map(it=>it.p.concept)).size;
  const hint=sumView==="sys"?"🗂️ <b>按『體系抽屜』分好了</b>：考到先想它屬於哪一格，再把規則往那一格擺，這樣才記得住。點 🔊 可念該考點、點原題號可直接攤開看那題。"
            :sumView==="year"?"📅 <b>按年度排</b>：看每年各考了哪些考點。"
            :"⚖️ <b>全部考點（去重）</b>：每個觀念該記的規則都列出來了。";
  html=`<div class="sumcount">${hint}<br><b>${curSub}</b>　共 <b>${totalC}</b> 個考點</div>`;
  if(sumView==="sys"||sumView==="year"){
    const groups=new Map();
    const gOf=sumView==="sys"?(it=>systemOf(it.q)):(it=>it.q.year+" 年");
    items.forEach(it=>{const g=gOf(it);if(!groups.has(g))groups.set(g,[]);groups.get(g).push(it);});
    const keys=[...groups.keys()].sort();
    if(sumView==="sys"){
      html+=`<div class="sysmap">📍 抽屜地圖：${keys.map((g,i)=>`<button class="mapbtn" data-i="${i}">${g}</button>`).join("")}</div>`;
    }
    keys.forEach((g,i)=>{
      const its=groups.get(g),byC=new Map();
      its.forEach(it=>{if(!byC.has(it.p.concept))byC.set(it.p.concept,[]);byC.get(it.p.concept).push(it);});
      let inner="";for(const [c,cits] of byC) inner+=kptCardHTML(c,cits);
      html+=`<div class="sysgrp open" id="sg${i}"><div class="sysgrp-h">${g}<span class="gn">${byC.size} 考點</span></div><div class="sysgrp-body">${inner}</div></div>`;
    });
  }else{ // law：去重平鋪，但內容＆目錄都按體系排好
    const byC=new Map();
    items.forEach(it=>{if(!byC.has(it.p.concept))byC.set(it.p.concept,[]);byC.get(it.p.concept).push(it);});
    const arr=[...byC.entries()].map(([c,cits])=>({c,cits,sys:systemOf(cits[0].q)}));
    arr.sort((a,b)=> a.sys<b.sys?-1:a.sys>b.sys?1:(a.c<b.c?-1:a.c>b.c?1:0));
    arr.forEach(o=>{ html+=kptCardHTML(o.c,o.cits).replace('<div class="kpt">',`<div class="kpt" data-sys="${o.sys}">`); });
  }
  summary.innerHTML=html||`<div class="empty">此科目尚無資料</div>`;
  summary.querySelectorAll(".sysgrp-h").forEach(h=>h.onclick=()=>h.parentElement.classList.toggle("open"));
  summary.querySelectorAll(".mapbtn").forEach(b=>b.onclick=()=>{const g=document.getElementById("sg"+b.dataset.i);g.classList.add("open");g.scrollIntoView({behavior:"smooth",block:"start"});});
  summary.querySelectorAll(".kpt-audio").forEach(b=>b.onclick=e=>{e.stopPropagation();speak(decodeURIComponent(b.dataset.s));});
  summary.querySelectorAll(".qchip").forEach(c=>c.onclick=e=>{e.stopPropagation();toggleQOpen(c);});
  summary.querySelectorAll(".km").forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    const card=b.closest(".kpt"), type=b.classList.contains("ok")?"ok":"review";
    const ks=[...card.querySelectorAll(".qchip")].map(c=>c.dataset.k);
    const allThis=ks.length&&ks.every(k=>marks[k]===type);
    ks.forEach(k=>{ if(allThis) delete marks[k]; else marks[k]=type; });
    localStorage.setItem(LS,JSON.stringify(marks));
    refreshCardMark(card); renderList();
  });
  buildSumNav();
  summary.onscroll=()=>{ if(window._spyRAF) return; window._spyRAF=requestAnimationFrame(()=>{window._spyRAF=0;updateSumSpy();}); };
}
function sumAnchors(){
  // 有體系分組(依體系/依年度)就用群組；沒有(依法條)就用每個考點，並帶其體系
  const gs=[...summary.querySelectorAll(".sysgrp")];
  let arr;
  if(gs.length) arr=gs.map(g=>({el:g,grp:true,name:g.querySelector(".sysgrp-h").firstChild.textContent.trim(),sys:"",cnt:(g.querySelector(".gn")||{}).textContent||""}));
  else arr=[...summary.querySelectorAll(".kpt")].map(k=>({el:k,grp:false,name:(k.querySelector(".cpt")||{}).textContent||"考點",sys:k.dataset.sys||"",cnt:""}));
  arr.forEach((a,i)=>{ if(!a.el.id) a.el.id="anc"+i; });
  return arr;
}
function buildSumNav(){
  const list=document.getElementById("sumnav-list");
  const ancs=sumAnchors();
  let html=`<button class="snav top">⬆ 回到最上面</button>`;
  let lastSys=null;
  ancs.forEach(a=>{
    if(!a.grp && a.sys && a.sys!==lastSys){ html+=`<div class="snav-sys">${a.sys}</div>`; lastSys=a.sys; }
    html+=`<button class="snav ${a.grp?"":"sub"}" data-t="${a.el.id}">${a.name}${a.cnt?`<span class="gn">${a.cnt}</span>`:""}</button>`;
  });
  list.innerHTML=html;
  list.querySelector(".snav.top").onclick=()=>summary.scrollTo({top:0,behavior:"smooth"});
  list.querySelectorAll(".snav[data-t]").forEach(b=>b.onclick=()=>{
    const el=document.getElementById(b.dataset.t); if(el.classList.contains("sysgrp")) el.classList.add("open");
    el.scrollIntoView({behavior:"smooth",block:"start"});
  });
  updateSumSpy();
}
function updateSumSpy(){
  const cur=document.getElementById("sumnav-cur"); if(!cur) return;
  const ancs=sumAnchors();
  if(!ancs.length){cur.textContent="回頂端";return;}
  const sr=summary.getBoundingClientRect(); let a0=ancs[0];
  ancs.forEach(a=>{ if(a.el.getBoundingClientRect().top - sr.top <= 70) a0=a; });
  cur.textContent=a0.sys?a0.sys+"·"+a0.name:a0.name;
  document.querySelectorAll("#sumnav-list .snav").forEach(b=>b.classList.toggle("cur",b.dataset.t===a0.el.id));
}
function buildSubjBar(){
  const subs=SUBJ[curSec]||[curSec];
  if(!subs.includes(curSub)) curSub=subs[0];
  subjs_el.innerHTML=subs.map(s=>`<button data-su="${s}" class="${s===curSub?'on':''}">${s}</button>`).join("");
  subjs_el.querySelectorAll("button").forEach(b=>b.onclick=()=>{curSub=b.dataset.su;buildSubjBar();renderSummary();});
  sumviews_el.querySelectorAll("button").forEach(b=>b.classList.toggle("on",b.dataset.v===sumView));
}
function switchMode(m){
  mode=m;
  modebar_el.querySelectorAll("button").forEach(b=>b.classList.toggle("on",b.dataset.m===m));
  const wrapOn = (m==="study"||m==="sprint");
  document.getElementById("wrap").style.display = wrapOn?"flex":"none";
  document.body.classList.toggle("sprintMode", m==="sprint");
  document.getElementById("sprintbar").style.display = m==="sprint"?"block":"none";
  summary.style.display = m==="summary"?"block":"none";
  document.body.classList.toggle("sumMode", m==="summary");
  document.getElementById("tree").style.display = m==="tree"?"block":"none";
  subjbar_el.style.display = m==="summary"?"flex":"none";
  // 卷別/年份/搜尋/遮答案：依模式顯示
  years_el.style.display = m==="study"?"flex":"none";
  sections_el.style.display = (m==="study"||m==="summary")?"flex":"none";
  document.getElementById("search").style.display = wrapOn?"block":"none";
  hideAns.parentElement.style.display = wrapOn?"inline-flex":"none";
  if(m==="summary"){
    if(curSec==="全部"||!SUBJ[curSec]){curSec="刑事組";buildTabs();}
    buildSubjBar(); renderSummary();
  }
  if(m==="sprint") enterSprint();
  if(m==="tree") renderTree();
}

function matchQs(pat){
  const re=new RegExp(pat);
  return Q.filter(q=>q.section==="刑事組" && q.num<=35 && NOTES[keyOf(q)]
      && re.test((NOTES[keyOf(q)].concept||"")+(NOTES[keyOf(q)].body||"")))
    .sort((a,b)=>a.year-b.year);
}
function scenOf(q){
  const s=(window.SCEN||{})[keyOf(q)];
  if(s) return s;
  // 還沒手寫情境時的暫代：取題幹前段
  let t=q.stem;
  for(const mk of ["下列","試問","問甲","則甲","關於上述","依上述","上述","以下敘述","請問","何者"]){
    const i=t.indexOf(mk); if(i>6){t=t.slice(0,i);break;}
  }
  t=t.replace(/[，。、:：]\s*$/,"");
  if(t.length<6) return "（觀念題）"+((NOTES[keyOf(q)]||{}).concept||"");
  return t.length>42 ? t.slice(0,40)+"…" : t;
}
function qKind(stem){
  // right=找對(答案正確) / wrong=找錯(答案是錯敘述) / exclude=排除型(何者不構成、例外)
  if(/不構成|不該當|何者不是|不是刑法|無.{0,4}(我國|中華民國)?刑法之適用|無.{0,4}之適用/.test(stem)) return "exclude";
  if(/錯誤|不正確|何者非|非屬|不屬|不包括|尚非|不成立|不違反|未違反|不符合|錯誤者/.test(stem)) return "wrong";
  return "right";
}
function optsHTML(q){
  // 錯的觀念劃掉(紅)、對的打勾(綠)；排除型答案標例外(橘)
  const L=["A","B","C","D"], k=qKind(q.stem);
  return q.options.map((o,i)=>{
    const isAns=i===q.ansIndex;
    if(k==="exclude"){
      return isAns
        ? `<div class="o-pick"><span class="pm">◉</span> ${L[i]}. ${o}<span class="pickwrong">←答案（此項屬例外／不構成）</span></div>`
        : `<div class="o-right"><span class="cm">✔</span> ${L[i]}. ${o}</div>`;
    }
    const wrong = k==="wrong" ? isAns : !isAns;
    return wrong
      ? `<div class="o-wrong"><span class="xm">✘</span> <s>${L[i]}. ${o}</s>${k==="wrong"&&isAns?'<span class="pickwrong">←這題要選它（此敘述本身是錯的）</span>':''}</div>`
      : `<div class="o-right"><span class="cm">✔</span> ${L[i]}. ${o}${k==="right"&&isAns?'<span class="pickwrong" style="color:#5fe39b">←正解</span>':''}</div>`;
  }).join("");
}
function fullHTML(q){
  // 只補「法條詳解」，不再重複情境與選項(卡片已有)
  const nb=(NOTES[keyOf(q)]||{}).body||"";
  return `<div class="full"><div class="fnote">${nb.replace(/\n/g,"<br>")}</div></div>`;
}
/* 簡單一行文字關係圖：（甲）──行為──▶（乙），一個關係一行 */
function diagText(d){
  // 直式樹狀關係圖：當事人由上往下，邊上標短標籤，會分岔
  const nm={}; (d.n||[]).forEach(s=>{const a=s.split("|");nm[a[0]]=a[1]?`${a[0]}·${a[1]}`:a[0];});
  const lab=id=>nm[id]||id;
  const adj={}, tos=new Set(), froms=new Set();
  (d.e||[]).forEach(s=>{const a=s.split("|"); const ft=a[0].split(">"); const f=ft[0].trim(),t=ft[1].trim();
    (adj[f]=adj[f]||[]).push({t,l:a[1]||""}); froms.add(f); tos.add(t);});
  let roots=[...froms].filter(f=>!tos.has(f));
  if(!roots.length) roots=[(d.n&&d.n[0])?d.n[0].split("|")[0]:[...froms][0]];
  const seen=new Set();
  function node(id){
    seen.add(id);
    const ch=adj[id]||[];
    const render1=e=>{
      const conn=`<div class="vt-conn"><span class="vt-l">${e.l}</span><div class="vt-a">▼</div></div>`;
      const child=seen.has(e.t)?`<div class="vt-box vt-ref">（${lab(e.t)}）</div>`:node(e.t);
      return `<div class="vt-col">${conn}${child}</div>`;
    };
    let inner = ch.length===1 ? render1(ch[0]) : ch.length>1 ? `<div class="vt-branch">${ch.map(render1).join("")}</div>` : "";
    return `<div class="vt-col"><div class="vt-box">（${lab(id)}）</div>${inner}</div>`;
  }
  const trees=roots.map(r=>node(r)).join('<div class="vt-gap"></div>');
  return `<div class="reldiag"><div class="vtree">${trees}</div></div>`;
}
function memPoint(q,d,p){
  // 觀念記憶點：手繪重點 > 構成要件 > 答案規則 > 概念名
  if(d&&d.p) return d.p;
  if(p.key) return p.key;
  if(p.ans) return p.ans.replace(/^答案[#A-D]+（?[^：:]*）?[：:]/,"").trim();
  return p.concept||"";
}
function optNotes(q){
  // 有手寫選項筆記就用(短描述＋為什麼)，否則退回原選項劃掉
  const d=(window.DIAG||{})[keyOf(q)];
  if(d&&d.o) return d.o.map(x=> x.y
    ? `<div class="o-right"><span class="cm">✔</span> <b>${x.t}</b>${x.why?` → ${x.why}`:""}</div>`
    : `<div class="o-wrong"><span class="xm">✘</span> <s>${x.t}</s>${x.why?` <span class="why">→ ${x.why}</span>`:""}</div>`
  ).join("");
  return optsHTML(q);
}
function qCardHTML(q){
  const k=keyOf(q), p=parseNote(NOTES[k]||{}), d=(window.DIAG||{})[k];
  const top=(d&&d.n&&d.e)?diagText(d):`<div class="sit">📖 ${scenOf(q)}</div>`;
  const point=memPoint(q,d,p);
  const fix=(d&&d.o)?"":(p.ans?`<div class="fixnote"><span class="lb">✏️ 訂正：</span>${p.ans}</div>`:"");
  return `${top}<div class="sk-point">📌 ${point}</div><div class="opts">${optNotes(q)}</div>${fix}`;
}
function vpairs(qs){
  // 每題一條，點開＝關係圖＋📌重點＋選項筆記(錯的劃掉訂正)
  return qs.map(q=>{
    const p=parseNote(NOTES[keyOf(q)]||{}), k=keyOf(q);
    return `<div class="vp" data-k="${k}">
      <div class="vp-h"><span class="vpn">${q.year}·${q.num}</span><span class="vpc">${p.concept}</span>
        <button class="hear" title="聽">🔊</button><span class="exp">＋ 展開</span></div>
      <div class="vp-c"></div></div>`;
  }).join("");
}
function renderTree(){
  const tree=document.getElementById("tree");
  let html=`<div class="treehint">🌳 <b>刑法・按考點正誤對照</b>：照「總則→分則」找到考點，<b>點考點就直接攤開</b>那個觀念所有「❌易混 → ✅正確」，往下滑就複習完，不用一題題點。<br>
    旁邊數字＝6年考幾次（🔥=高頻必背）。<span style="color:#b0532c">同一題會出現在多個相關考點（殺人未遂＝殺人罪＋未遂＋故意）。</span><br>
    👉 這版對了跟我說，我把憲法/民法/其他科也照這樣做。</div>
    <div class="treetools"><button id="expAll">🔽 全部展開（整科一路滑）</button><button id="colAll">🔼 全部收合</button></div>`;
  CRIM_TREE.forEach((br,bi)=>{
    html+=`<div class="branch ${br.cls}"><h2>${br.icon} ${br.name}</h2><div class="sub">${br.sub}</div>`;
    br.groups.forEach((g,gi)=>{
      html+=`<div class="grp2 ${br.cls}"><h3>${g.name}</h3>`;
      g.leaves.forEach((lf,li)=>{
        const qs=matchQs(lf.pat); const c=qs.length;
        const cls=lf.cold||c===0?"cold":c>=15?"hot":"";
        const id=`lf-${bi}-${gi}-${li}`;
        html+=`<div class="leaf ${cls}" id="${id}">
          <div class="leaf-head" data-t="${id}"><span class="ic">${lf.ic}</span><span>${lf.n}</span>
            <span class="bdg">${c===0?"未考過":c+"題"}</span></div>
          <div class="leaf-body">
            ${lf.key?`<div class="k">🔑 <b>構成要件：</b>${lf.key}</div>`:""}
            ${c?`<div class="qh">📚 這個考點歷屆「正誤對照」（${c}題，往下滑）：</div>${vpairs(qs)}`
              :`<div class="qh">這個觀念在 109–114 年沒單獨出過題，但屬完整體系，仍建議了解。</div>`}
          </div></div>`;
      });
      html+=`</div>`;
    });
    html+=`</div>`;
  });
  tree.innerHTML=html;
  tree.querySelectorAll(".leaf-head").forEach(h=>h.onclick=()=>document.getElementById(h.dataset.t).classList.toggle("open"));
  // 點一題 → 展開：關係圖＋📌重點＋選項訂正
  tree.querySelectorAll(".vp-h").forEach(h=>h.onclick=()=>{
    const vp=h.closest(".vp"), c=vp.querySelector(".vp-c"), ex=h.querySelector(".exp");
    if(vp.classList.toggle("open")){ if(!c.innerHTML) c.innerHTML=qCardHTML(qByKey(vp.dataset.k)); ex.textContent="－ 收合"; }
    else ex.textContent="＋ 展開";
  });
  // 🔊 點我聽：先念情境，再念易混與正確
  tree.querySelectorAll(".hear").forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    const q=qByKey(b.closest(".vp").dataset.k), p=parseNote(NOTES[keyOf(q)]||{}), k=qKind(q.stem);
    const lead = k==="wrong" ? "這題要選錯的，答案是" : k==="exclude" ? "這題要選例外的，答案是" : "正確答案是";
    speak("情境，"+scenOf(q)+"。"+lead+["A","B","C","D"][q.ansIndex]+"。訂正成正確觀念，"+(p.ans||""));
  });
  document.getElementById("expAll").onclick=()=>tree.querySelectorAll(".leaf").forEach(l=>{if(!l.classList.contains("cold"))l.classList.add("open");});
  document.getElementById("colAll").onclick=()=>tree.querySelectorAll(".leaf").forEach(l=>l.classList.remove("open"));
}
function jumpTo(k){const p=k.split("-");curYear=+p[0];curSec=p[1];buildTabs();switchMode("study");showQ(k);}
/* ===== 答題計時器 ===== */
let tTotal=60, tLeft=60, tInt=null, tRunning=false;
function tFmt(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}
function tRender(){
  const w=document.getElementById("timer");
  document.getElementById("timer-disp").textContent=tFmt(Math.max(0,tLeft));
  w.classList.toggle("warn",tLeft<=10&&tLeft>0);
}
function tBeep(){ try{
  const a=new (window.AudioContext||window.webkitAudioContext)();
  [0,250,500].forEach(d=>{ const o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type="sine";o.frequency.value=880;
    g.gain.setValueAtTime(.0001,a.currentTime+d/1000);
    g.gain.exponentialRampToValueAtTime(.25,a.currentTime+d/1000+.02);
    g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d/1000+.18);
    o.start(a.currentTime+d/1000);o.stop(a.currentTime+d/1000+.2); });
  setTimeout(()=>a.close(),900);
}catch(e){} }
function tTick(){ tLeft--; if(tLeft<=0){ clearInterval(tInt); tRunning=false; tLeft=0;
    document.getElementById("t-start").textContent="▶ 開始"; tRender();
    document.getElementById("timer").classList.add("done"); tBeep();
    if(navigator.vibrate) navigator.vibrate([200,90,200]); tTimeoutMark(); } else tRender(); }
function tTimeoutMark(){
  const cb=document.getElementById("t-mark");
  if(!cb||!cb.checked||!activeQ) return;          // 只要有「目前這一題」就生效，不分模式
  if(marks[activeQ]==="ok"){ tToast("⏰ 時間到（這題你已標『我懂了』）"); return; }
  marks[activeQ]="review"; localStorage.setItem(LS,JSON.stringify(marks)); renderList();
  // 逐題/衝刺：更新詳解上的按鈕
  if(curKey===activeQ){ const _r=detail.querySelector(".rev-b"); if(_r)_r.classList.add("on");
    const _o=detail.querySelector(".ok-b"); if(_o)_o.classList.remove("on"); }
  if(mode==="sprint") updateSprintBanner();
  // 考點統整：更新該題所在卡片的著色／標記鈕
  const chip=summary.querySelector('.qchip[data-k="'+activeQ+'"]');
  if(chip){ const card=chip.closest(".kpt"); if(card) refreshCardMark(card); }
  tToast("⏰ 時間到，已自動標 🔁 再看");
}
function tToast(msg){
  let el=document.getElementById("t-toast");
  if(!el){ el=document.createElement("div"); el.id="t-toast"; document.body.appendChild(el); }
  el.textContent=msg; el.classList.add("show");
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove("show"),2000);
}
function tStart(){ if(tRunning) return; if(tLeft<=0) tLeft=tTotal;
  tRunning=true; document.getElementById("t-start").textContent="⏸ 暫停";
  document.getElementById("timer").classList.remove("done");
  tInt=setInterval(tTick,1000); tRender(); }
function tPause(){ tRunning=false; clearInterval(tInt); document.getElementById("t-start").textContent="▶ 開始"; }
function tReset(){ tPause(); tLeft=tTotal; document.getElementById("timer").classList.remove("done"); tRender(); }
function tSetPreset(s,el){ tTotal=s; tLeft=s; tPause();
  document.querySelectorAll(".tp").forEach(b=>b.classList.toggle("on",b===el));
  document.getElementById("timer").classList.remove("done"); tStart(); }
document.querySelectorAll(".tp").forEach(b=>b.onclick=()=>tSetPreset(+b.dataset.s,b));
document.getElementById("t-start").onclick=()=>{ tRunning?tPause():tStart(); };
document.getElementById("t-reset").onclick=tReset;
document.getElementById("timer-min").onclick=()=>document.getElementById("timer").classList.toggle("collapsed");
document.getElementById("timer-disp").onclick=()=>{ if(document.getElementById("timer").classList.contains("collapsed")) document.getElementById("timer").classList.remove("collapsed"); };
function tAutoRestart(){ if(document.getElementById("t-auto")&&document.getElementById("t-auto").checked){ tReset(); tStart(); } }
document.querySelector('.tp[data-s="60"]').classList.add("on");
