<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>司法官・律師一試｜歷屆全科複習（依當天考試節次）</title>
<style>
  :root{--bg:#f4f1e8;--paper:#fff;--ink:#26262b;--muted:#8a8a8a;--line:#e3ddcf;
        --green:#2e9e5b;--greenbg:#e9faf0;--red:#d64545;--blue:#2f6fb0;--gold:#e0b94e;}
  *{box-sizing:border-box}
  body{margin:0;font-family:"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
       background:var(--bg);color:var(--ink);font-size:18px;line-height:1.6}
  .topnav{display:flex;gap:6px;background:#0b0d12;padding:8px 16px;border-bottom:1px solid #262b36;position:sticky;top:0;z-index:50;overflow-x:auto}
  .topnav a{color:#9aa4b2;text-decoration:none;font-size:14px;font-weight:600;padding:7px 16px;border-radius:8px;white-space:nowrap}
  .topnav a:hover{background:#161922;color:#e6e6e6}
  .topnav a.active{background:#1f2e3a;color:#7fb5ff}
  header{background:#26262b;color:#fff;padding:10px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:19px;margin:0}
  .count{margin-left:auto;display:flex;gap:14px;font-size:13px;text-align:center}
  .count b{font-size:21px;color:var(--gold);display:block}
  .sched{background:#fffdf7;border-bottom:1px solid var(--line);padding:6px 18px;font-size:13px;color:#666;display:flex;gap:18px;flex-wrap:wrap}
  .sched b{color:#26262b}
  .controls{display:flex;gap:8px;padding:9px 18px;background:#fff;border-bottom:1px solid var(--line);flex-wrap:wrap;align-items:center}
  .grp{display:flex;gap:4px;background:#efe9da;border-radius:10px;padding:3px;flex-wrap:wrap}
  .controls button{border:none;background:transparent;padding:6px 13px;border-radius:8px;cursor:pointer;font-size:15px;font-family:inherit;white-space:nowrap}
  .controls button.on{background:#26262b;color:#fff}
  #search{padding:7px 12px;border:1px solid var(--line);border-radius:8px;font-size:15px;width:150px}
  .toggle{margin-left:auto;font-size:14px;color:#555}
  .wrap{display:flex;height:calc(100vh - 190px)}
  #list{width:350px;overflow:auto;border-right:1px solid var(--line);background:#faf7ef}
  .secthead{position:sticky;top:0;background:#26262b;color:#fff;padding:7px 14px;font-size:13px;z-index:2}
  .secthead .t{color:var(--gold)}
  .subhead{background:#efe9da;padding:4px 14px 4px 22px;font-size:13px;color:#6a6a6a;font-weight:bold}
  .qrow{padding:9px 14px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;gap:8px;align-items:flex-start}
  .qrow:hover{background:#fff}
  .qrow.sel{background:#fff;border-left:4px solid var(--gold)}
  .qrow .n{font-weight:bold;color:var(--blue);min-width:42px;font-size:14px}
  .qrow .s{font-size:13.5px;color:#555;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .dot{width:9px;height:9px;border-radius:50%;margin-left:auto;margin-top:5px;flex:none}
  .dot.ok{background:var(--green)} .dot.review{background:var(--red)}
  #detail{flex:1;overflow:auto;padding:24px 32px}
  .tags{display:flex;gap:7px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  .tag{background:#efe9da;border-radius:20px;padding:3px 11px;font-size:13px;color:#555}
  .tag.subj{background:#26262b;color:#fff}
  .tag.per{background:var(--gold);color:#26262b;font-weight:bold}
  .lawchip{background:#fff3cd;border:1px solid var(--gold);border-radius:6px;padding:1px 8px;font-size:12px}
  .stem{font-size:22px;line-height:1.7;margin:6px 0 16px;font-weight:500}
  .opt{border:2px solid var(--line);background:var(--paper);border-radius:12px;padding:11px 15px;margin:8px 0;display:flex;gap:11px;cursor:pointer}
  .opt .lab{font-weight:bold;color:var(--muted);flex:none}
  .opt.correct{border-color:var(--green);background:var(--greenbg)}
  .opt.correct .lab{color:var(--green)}
  .opt.correct::after{content:"✔ 官方正解";color:var(--green);margin-left:auto;font-size:14px;white-space:nowrap}
  body.hideAns .opt.correct{border-color:var(--line);background:var(--paper)}
  body.hideAns .opt.correct::after{content:""}
  body.hideAns .opt.correct.reveal{border-color:var(--green);background:var(--greenbg)}
  body.hideAns .opt.correct.reveal::after{content:"✔ 官方正解";color:var(--green);margin-left:auto;font-size:14px}
  .note{margin-top:20px;border:2px solid var(--gold);border-radius:14px;padding:16px 18px;
        background:#fffdf2;white-space:pre-wrap;line-height:1.8}
  .note h3{margin:0 0 8px;font-size:16px;color:#9a7b16}
  .note.auto{border-style:dashed;border-color:#cdb86a}
  .btns{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .btns button{font-family:inherit;font-size:15px;padding:9px 16px;border:none;border-radius:24px;cursor:pointer}
  .play{background:var(--blue);color:#fff} .note-play{background:#7a5cd0;color:#fff}
  .ok-b{background:var(--green);color:#fff} .rev-b{background:var(--red);color:#fff}
  .nav{display:flex;justify-content:space-between;margin-top:22px;border-top:1px solid var(--line);padding-top:14px}
  .nav button{background:#26262b;color:#fff;border:none;border-radius:24px;padding:9px 20px;font-size:15px;cursor:pointer}
  .empty{color:var(--muted);padding:40px;text-align:center}
</style>
</head>
<body>
<nav class="topnav">
  <a href="https://elainechi-art.github.io/">🏠 首頁</a>
  <a href="https://elainechi-art.github.io/taiwan-stock-dashboard/">📈 股市儀表板</a>
  <a href="https://elainechi-art.github.io/research-radar/">📡 研究雷達</a>
  <a class="active" href="https://elainechi-art.github.io/judicial/">📚 司法官・律師複習</a>
</nav>
<header>
  <h1>📚 司法官・律師一試 歷屆全科複習</h1>
  <div class="count">
    <div>一試倒數<b id="d1">–</b></div>
    <div>調查局<b id="d2">–</b></div>
    <div>已懂<b id="prog">0</b></div>
  </div>
</header>

<div class="sched">
  <span>📅 <b>當天試程（一天4節）</b></span>
  <span><b>第1節</b> 09:00 綜一·刑事(刑法/刑訴/倫理)</span>
  <span><b>第2節</b> 11:10 綜一·公法(憲/行政/國公/國私)</span>
  <span><b>第3節</b> 14:00 綜二·民事(民法/民訴)</span>
  <span><b>第4節</b> 16:20 綜二·商事(公司/保險/票據/證交/強執/法英)</span>
</div>

<div class="controls">
  <div class="grp" id="years"></div>
  <div class="grp" id="sections"></div>
  <input id="search" placeholder="🔍 搜尋關鍵字…">
  <label class="toggle"><input type="checkbox" id="hideAns"> 遮答案自測</label>
</div>

<div class="wrap">
  <div id="list"></div>
  <div id="detail"><div class="empty">← 左邊點一題開始複習；預設依當天節次排列</div></div>
</div>

<script src="data.js"></script>
<script src="notes.js"></script>
<script>
const Q = window.QUESTIONS || [];
const NOTES = window.NOTES || {};
const LS = "sjg_marks_v2";
let marks = JSON.parse(localStorage.getItem(LS) || "{}");
let curYear = Math.max(...Q.map(q=>q.year));
let curSec = "全部";          // 全部/刑事組/公法組/民事組/商事組
let curKey = null, search = "";

function daysTo(d){return Math.max(0,Math.ceil((new Date(d)-new Date())/86400000));}
d1.textContent = daysTo("2026-08-01")+"天";
d2.textContent = daysTo("2026-08-08")+"天";

const years = [...new Set(Q.map(q=>q.year))].sort();
const secOrder = ["刑事組","公法組","民事組","商事組"];
const secLabel = {"全部":"全部","刑事組":"①刑事","公法組":"②公法","民事組":"③民事","商事組":"④商事"};

function buildTabs(){
  years_el.innerHTML = years.map(y=>`<button data-y="${y}" class="${y==curYear?'on':''}">${y}年</button>`).join("");
  years_el.querySelectorAll("button").forEach(b=>b.onclick=()=>{curYear=+b.dataset.y;buildTabs();renderList();});
  const secs=["全部",...secOrder];
  sections_el.innerHTML = secs.map(s=>`<button data-s="${s}" class="${s==curSec?'on':''}">${secLabel[s]}</button>`).join("");
  sections_el.querySelectorAll("button").forEach(b=>b.onclick=()=>{curSec=b.dataset.s;buildTabs();renderList();});
}
const years_el=document.getElementById("years"), sections_el=document.getElementById("sections");

function keyOf(q){return q.year+"-"+q.section+"-"+q.num;}
function filtered(){
  let r = Q.filter(q=> q.year===curYear
      && (curSec==="全部"||q.section===curSec)
      && (!search || (q.stem+q.options.join("")).includes(search)) );
  r.sort((a,b)=> a.period-b.period || a.num-b.num);
  return r;
}

function renderList(){
  const items=filtered();
  let html="", lastSec=null, lastSub=null;
  items.forEach(q=>{
    if(q.section!==lastSec){
      html+=`<div class="secthead"><span class="t">第${q.period}節 ${q.time}</span>　${q.volume}·${q.section}</div>`;
      lastSec=q.section; lastSub=null;
    }
    if(q.section==="刑事組" && q.subject!==lastSub){
      html+=`<div class="subhead">${q.subject}</div>`; lastSub=q.subject;
    }
    const k=keyOf(q), m=marks[k];
    html+=`<div class="qrow ${k===curKey?'sel':''}" data-k="${k}">
        <span class="n">第${q.num}題</span><span class="s">${q.stem.slice(0,42)}</span>
        <span class="dot ${m||''}"></span></div>`;
  });
  list.innerHTML = html || `<div class="empty">沒有符合的題目</div>`;
  list.querySelectorAll(".qrow").forEach(r=>r.onclick=()=>showQ(r.dataset.k));
  prog.textContent = Object.values(marks).filter(v=>v==="ok").length;
}
const list=document.getElementById("list");

function qByKey(k){const[y,sec,n]=k.split("-");return Q.find(q=>q.year==y&&q.section===sec&&q.num==n);}
function qType(s){return /錯誤|不正確|何者非|不屬|不包括|不得|尚非|不成立|不違反/.test(s)?"找『錯』的":
  /正確|何者是|何者得|何者應|構成|成立|何罪/.test(s)?"找『對』的":"判斷題";}
function autoNote(q){
  const laws=q.laws.length?("　法條："+q.laws.join("、")):"";
  return {auto:true,concept:"考點提示（詳解待補）",
    body:`📌 ${q.volume}・${q.section}（${q.subject}）${laws}\n📝 題型：這題要你${qType(q.stem)}\n✔ 官方答案：${q.ansLetter}\n\n（白話詳解之後補。）`};
}

function showQ(k){
  curKey=k; const q=qByKey(k); const note=NOTES[k]||autoNote(q);
  document.body.classList.toggle("hideAns", hideAns.checked);
  const L=["A","B","C","D"];
  const opts=q.options.map((o,i)=>`<div class="opt ${i===q.ansIndex?'correct':''}">
      <span class="lab">${L[i]}</span><span>${o}</span></div>`).join("");
  const laws=q.laws.map(l=>`<span class="lawchip">${l}</span>`).join("");
  detail.innerHTML=`
    <div class="tags"><span class="tag per">第${q.period}節 ${q.time}</span>
      <span class="tag subj">${q.section}</span><span class="tag">${q.subject}</span>
      <span class="tag">${q.year}年 第${q.num}題</span>${laws}</div>
    <div class="stem">${q.stem}</div>${opts}
    <div class="note ${note.auto?'auto':''}"><h3>🖊️ ${note.concept}</h3>${note.body}</div>
    <div class="btns">
      <button class="play" onclick="readQ()">🔊 念題目</button>
      <button class="note-play" onclick="readNote()">🔊 念詳解</button>
      <button class="ok-b" onclick="mark('ok')">✅ 我懂了</button>
      <button class="rev-b" onclick="mark('review')">🔁 再看</button></div>
    <div class="nav"><button onclick="step(-1)">◀ 上一題</button>
      <button onclick="step(1)">下一題 ▶</button></div>`;
  detail.querySelectorAll(".opt").forEach(o=>o.onclick=()=>o.classList.add("reveal"));
  window._q=q; window._note=note; renderList(); detail.scrollTop=0;
}
const detail=document.getElementById("detail"), hideAns=document.getElementById("hideAns");

function step(d){const it=filtered();const i=it.findIndex(q=>keyOf(q)===curKey);const n=it[i+d];if(n)showQ(keyOf(n));}
function mark(t){marks[curKey]=marks[curKey]===t?undefined:t;if(!marks[curKey])delete marks[curKey];
  localStorage.setItem(LS,JSON.stringify(marks));renderList();}

function speak(t){const u=new SpeechSynthesisUtterance(t);u.lang="zh-TW";u.rate=.95;
  const v=speechSynthesis.getVoices().find(v=>/zh|TW|Chinese|Mei|Ting/i.test(v.lang+v.name));if(v)u.voice=v;
  speechSynthesis.cancel();speechSynthesis.speak(u);}
function readQ(){const q=window._q,L=["A","B","C","D"];
  speak("第"+q.num+"題。"+q.stem+" "+q.options.map((o,i)=>"選項"+L[i]+"，"+o).join("。"));}
function readNote(){const n=window._note;speak(n.concept+"。"+n.body.replace(/[【】📌📝✔🖊️]/g,""));}

document.getElementById("search").oninput=e=>{search=e.target.value.trim();renderList();};
hideAns.onchange=()=>{if(curKey)showQ(curKey);};
buildTabs(); renderList();
</script>
</body>
</html>
