<style>

  html[data-theme="parchment"]{--bg:#ece3d2;--panel:#f6f0e5;--panel2:#fbf6ee;--line:#dccfb9;--nav:#e2d6c1;--glow:#f1ead9;--tx:#3a322a;--mut:#7c715f;--acc:#9c6f3a;--acc2:#7d3a44;--green:#5f7d57;--red:#a85a5a}

  html,body{max-width:100%;overflow-x:hidden;-webkit-text-size-adjust:100%}

    background:radial-gradient(1200px 700px at 50% -10%,var(--glow) 0%,var(--bg) 60%);-webkit-font-smoothing:antialiased}
  *{transition:background-color .22s,border-color .22s,color .22s}
  .topnav{display:flex;gap:6px;background:var(--nav);padding:8px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;overflow-x:auto;padding-top:calc(8px + env(safe-area-inset-top,0px))}
  .topnav a{color:#9aa4b2;text-decoration:none;font-size:14px;font-weight:600;padding:9px 16px;border-radius:8px;white-space:nowrap}
  .topnav a:hover{background:#161922} .topnav a.active{background:color-mix(in srgb,var(--acc) 12%,transparent);color:var(--acc)}
  html.standalone .topnav{display:none}
  .wrap{max-width:900px;margin:0 auto;padding:20px 18px 90px}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 12px 30px -22px #000}

  .sec-n{color:var(--acc);border:1px solid var(--acc);width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-family:var(--serif)}

  .row{display:flex;gap:9px;flex-wrap:wrap;align-items:center}

  .empty{color:var(--mut);text-align:center;padding:26px;font-size:14px;line-height:1.7}
  input[type=range]{accent-color:var(--acc2)} select{background:var(--panel2);border:1px solid var(--line);color:var(--tx);border-radius:8px;padding:7px 9px;font-family:inherit}
  /* 朗讀器 overlay */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;z-index:100}
  .ov.show{display:flex;align-items:center;justify-content:center;padding:14px}
  .reader{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:100%;max-width:760px;height:min(90vh,860px);display:flex;flex-direction:column;position:relative;overflow:hidden}
  .rnav{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
  .rtitle{font-family:var(--serif);font-weight:600;font-size:15px;color:var(--acc);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:22px 26px 40px}
  .para{font-size:calc(18px*var(--fs));line-height:2.05;color:var(--tx);text-align:left;margin-bottom:15px}
  .para.head{font-family:var(--serif);font-weight:600;font-size:calc(24px*var(--fs));color:var(--acc);text-align:center;margin:4px 0 18px}
  .para.tip{color:var(--green)}

  .para .hl{color:var(--acc);font-weight:700}

  .sent.cur{background:color-mix(in srgb,var(--acc) 30%,transparent);box-shadow:0 0 0 1px color-mix(in srgb,var(--acc) 45%,transparent)}
  .rarrow{position:absolute;top:50%;transform:translateY(-50%);z-index:4;width:40px;height:84px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--mut);font-size:32px;cursor:pointer;font-family:var(--serif)}
  .rarrow.l{left:2px} .rarrow.r{right:2px} .rarrow:hover{color:var(--acc)}
  .rctrl{border-top:1px solid var(--line);padding:12px 14px calc(12px + env(safe-area-inset-bottom,0px));flex-shrink:0}
  .rctrl .main{display:flex;justify-content:center;align-items:center;gap:10px}
  .rctrl .sub{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap;color:var(--mut);font-size:12.5px}
  .prog{color:var(--mut);font-size:12px}
</style>

<!-- 朗讀器 -->
<div class="ov" id="ov"><div class="reader">
  <div class="rnav">

<div class="ov" id="ovTheme" style="align-items:flex-start"><div class="reader" style="height:auto;max-width:560px;padding:22px;margin-top:8vh"><h2 style="font-family:var(--serif)">外觀</h2>
  <div class="msg">字級</div><div class="row" id="fsRow" style="margin:6px 0 14px"></div>

  <div class="msg" style="margin-top:8px">語音（挑最順耳的中文語音，會記在這台）</div>
  <div id="voicePick" style="margin-top:6px"></div>
  <div class="msg" style="margin-top:14px">速度 <span id="vRateV"></span></div>

<script>
"use strict";
const APP_VERSION='v2';
const LS='readDocs_v1';
const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const md=s=>esc(s).replace(/\*\*(.+?)\*\*/g,'<b class="hl">$1</b>');

/* ---- 資料 ---- */
let DOCS=load();
function load(){ try{return JSON.parse(localStorage.getItem(LS))||[];}catch(e){return [];} }
function save(){ localStorage.setItem(LS,JSON.stringify(DOCS)); }
const isMeta=l=>/^(沒問題|我將|好的[，,]|以下|接著為您|接續為您)/.test(l.trim());
const isHeader=l=>/^題型/.test(l.trim());
/* 把一段貼上文字依「題型」切成多篇 */
function splitDocs(text){
  const lines=text.split(/\r?\n/); const out=[]; let cur=null;
  for(let raw of lines){ const l=raw.trim(); if(!l) continue;
    if(isHeader(l)){ cur={title:l.replace(/：.*$/,'').slice(0,60),text:l+'\n'}; out.push(cur); }
    else if(cur){ cur.text+=l+'\n'; }
    else if(!isMeta(l)){ cur={title:l.slice(0,40),text:l+'\n'}; out.push(cur); }
  }
  return out.map(d=>({id:'d'+Math.random().toString(36).slice(2,9)+Date.now().toString(36),title:d.title,text:d.text.trim(),ts:Date.now()}));
}
/* 一篇 → 可朗讀段落（過濾空行/AI開場白） */
function segsOf(text){ return text.split(/\r?\n/).map(s=>s.trim()).filter(s=>s && !isMeta(s) && !/^[-=—─]{2,}$/.test(s)); }

/* ---- 清單 ---- */
function renderDocs(){
  const q=($('#q').value||'').trim();
  let list=DOCS.slice().reverse();
  if(q) list=list.filter(d=>d.title.includes(q)||d.text.includes(q));
  $('#docList').innerHTML = list.length ? list.map(d=>`
    <div class="doc" data-id="${d.id}">
      <div class="t" data-open="${d.id}"><div class="tt">${esc(d.title)}</div><div class="tm">${segsOf(d.text).length} 段 ‧ ${new Date(d.ts).toLocaleDateString()}</div></div>
      <button class="btn sm" data-open="${d.id}">▶ 播</button>
      <button class="btn ghost sm" data-del="${d.id}">刪</button>
    </div>`).join('') : '<div class="empty">還沒有篇章。上面貼上內容按「加入並收好」。</div>';
  $('#foot').textContent=`朗讀器 ${APP_VERSION} ‧ 共 ${DOCS.length} 篇 ‧ 資料存於本機`;
}
$('#docList').addEventListener('click',e=>{
  const o=e.target.closest('[data-open]'); if(o){ openDoc(o.dataset.open); return; }
  const d=e.target.closest('[data-del]'); if(d){ if(confirm('刪除這篇？')){ DOCS=DOCS.filter(x=>x.id!==d.dataset.del); save(); renderDocs(); } }
});
$('#q').oninput=renderDocs;
$('#addBtn').onclick=()=>{ const t=$('#inp').value; const ds=splitDocs(t);
  if(!ds.length){ $('#addMsg').textContent='⚠ 沒有可加入的內容'; return; }
  DOCS.push(...ds); save(); $('#inp').value=''; $('#addMsg').textContent=`✓ 加入 ${ds.length} 篇`; renderDocs(); };
$('#playRawBtn').onclick=()=>{ const t=$('#inp').value.trim(); if(!t){ $('#addMsg').textContent='⚠ 先貼上內容'; return; }
  openReader({title:'（未儲存）',lines:segsOf(t)}); };
$('#playAllBtn').onclick=()=>{ if(!DOCS.length)return; const lines=[]; DOCS.forEach(d=>{ lines.push('◆ '+d.title); lines.push(...segsOf(d.text)); });
  openReader({title:'全部連續朗讀',lines}); };

/* ---- 朗讀器：整題顯示，逐句往下念、念到哪反白 ---- */
let R={units:[],idx:0,playing:false,title:''};
function openDoc(id){ const d=DOCS.find(x=>x.id===id); if(!d)return; openReader({title:d.title,lines:segsOf(d.text)}); }
function kindOf(s){ if(/^題型|^◆/.test(s))return 'head'; if(/^💡|考場膝蓋反射/.test(s))return 'tip'; if(/^【.*】/.test(s))return 'point'; return ''; }
function splitSentences(line){ if(kindOf(line)) return [line];
  const p=line.replace(/([。！？])/g,'$1\u0001').split('\u0001').map(s=>s.trim()).filter(Boolean); return p.length?p:[line]; }
function openReader(o){ R.title=o.title; R.idx=0; R.playing=false;
  R.units=[]; let html='';
  (o.lines||[]).forEach(line=>{ const k=kindOf(line);
    const cls='para'+(k==='head'?' head':k==='tip'?' tip':k==='point'?' point':'');
    const sents=splitSentences(line);
    html+=`<div class="${cls}">`+ sents.map(s=>{ const i=R.units.length; R.units.push(s);
      return `<span class="sent" data-i="${i}">${md(s.replace(/^◆\s*/,''))}</span>`; }).join(' ') +`</div>`;
  });
  $('#rBody').innerHTML=html; $('#rTitle').textContent=R.title;
  $('#rRate').value=speakRate; $('#rRateV').textContent=speakRate.toFixed(1)+'x';
  $('#ov').classList.add('show'); highlight(0); updateProg();
  play();
}
function highlight(i){ const b=$('#rBody'); b.querySelectorAll('.sent.cur').forEach(e=>e.classList.remove('cur'));
  const cur=b.querySelector('.sent[data-i="'+i+'"]'); if(cur){ cur.classList.add('cur'); cur.scrollIntoView({block:'center',behavior:'smooth'}); } }
function updateProg(){ $('#rProg').textContent=(R.units.length?R.idx+1:0)+' / '+R.units.length; $('#rPlay').textContent=R.playing?'⏸ 暫停':'▶ 播放'; }
async function play(){ if(!R.units.length)return; R.playing=true; updateProg();
  while(R.playing){
    if(!$('#ov').classList.contains('show')){ R.playing=false; break; }
    if(R.idx>=R.units.length){ R.playing=false; updateProg(); break; }
    highlight(R.idx); updateProg();
    await sayOnce(speakClean(R.units[R.idx]));
    if(!R.playing) break;
    R.idx++;
  }
  updateProg();
}
function pause(){ R.playing=false; stopSpeak(); updateProg(); }
function rnav(d){ const wasPlaying=R.playing; pause(); R.idx=Math.max(0,Math.min(R.units.length-1,R.idx+d)); highlight(R.idx); updateProg(); if(wasPlaying) play(); }
$('#rBody').addEventListener('click',e=>{ const s=e.target.closest('.sent'); if(!s)return; const was=R.playing; pause(); R.idx=+s.dataset.i; highlight(R.idx); updateProg(); if(was) play(); });
$('#rPlay').onclick=()=>{ R.playing?pause():play(); };
$('#rBack').onclick=()=>rnav(-1); $('#rFwd').onclick=()=>rnav(1);
$('#rPrev').onclick=()=>rnav(-1); $('#rNext').onclick=()=>rnav(1);
$('#rClose').onclick=()=>{ pause(); $('#ov').classList.remove('show'); };
$('#ov').onclick=e=>{ if(e.target===$('#ov')){ pause(); $('#ov').classList.remove('show'); } };
$('#rFont').onclick=()=>cycleFont();
$('#rRate').oninput=e=>{ speakRate=+e.target.value; localStorage.setItem('ankiRate',speakRate); $('#rRateV').textContent=speakRate.toFixed(1)+'x'; };

/* ---- 語音 ---- */
let voices=[]; function loadVoices(){ try{voices=speechSynthesis.getVoices();}catch(e){voices=[];} }
loadVoices(); if(window.speechSynthesis) speechSynthesis.onvoiceschanged=loadVoices;
let voicePref=JSON.parse(localStorage.getItem('ankiVoice')||'{}');
let speakRate=parseFloat(localStorage.getItem('ankiRate')||'1');
function bestVoice(){ const c=voices.filter(v=>/^zh|^cmn|^yue/i.test(v.lang)); if(voicePref.zh){const p=c.find(v=>v.name===voicePref.zh);if(p)return p;} return c.find(v=>v.lang==='zh-TW')||c[0]||null; }
function speakClean(t){ return String(t)
  .replace(/\*\*/g,'').replace(/💡/g,'').replace(/[【】◆]/g,'').replace(/^題型\s*/,'題型，')
  .replace(/\$\s*\\?rightarrow\s*\$/g,'，則，').replace(/→/g,'，則，')
  .replace(/§\s*(\d+)(?:-(\d+))?/g,(m,a,b)=>'第'+a+(b?'之'+b:'')+'條')
  .replace(/Ⅰ/g,'第一項').replace(/Ⅱ/g,'第二項').replace(/Ⅲ/g,'第三項').replace(/Ⅳ/g,'第四項')
  .replace(/[#\x60]/g,'').replace(/\s+/g,' ').trim(); }
function sayOnce(text){ return new Promise(res=>{ if(!text||!window.speechSynthesis){res();return;}
  try{ const u=new SpeechSynthesisUtterance(text); u.lang='zh-TW'; u.rate=speakRate; const v=bestVoice(); if(v)u.voice=v; u.onend=res; u.onerror=res; speechSynthesis.speak(u); }catch(e){res();} }); }
function stopSpeak(){ try{speechSynthesis.cancel();}catch(e){} }

/* ---- 外觀 / 字級 / 語音 modal ---- */
const THEMES=[['wine','酒紅'],['sapphire','藍寶石'],['emerald','翡翠'],['amethyst','紫晶'],['graphite','石墨'],['parchment','羊皮紙']];
const FS=[['s','小'],['m','中'],['l','大'],['xl','特大']];
function applyTheme(t){ localStorage.setItem('ankiTheme',t); if(t==='wine')document.documentElement.removeAttribute('data-theme'); else document.documentElement.setAttribute('data-theme',t); renderTheme(); }
function applyFont(f){ localStorage.setItem('ankiFont',f); if(f==='m')document.documentElement.removeAttribute('data-fs'); else document.documentElement.setAttribute('data-fs',f); renderTheme(); }
function cycleFont(){ const o=['m','l','xl','s'],cur=localStorage.getItem('ankiFont')||'m'; applyFont(o[(o.indexOf(cur)+1)%o.length]); }
function renderTheme(){ const ct=localStorage.getItem('ankiTheme')||'sapphire', cf=localStorage.getItem('ankiFont')||'m';
  $('#themeRow').innerHTML=THEMES.map(([id,nm])=>`<button class="btn ghost sm ${ct===id?'':''}" data-t="${id}" style="${ct===id?'border-color:var(--acc);color:var(--acc)':''}">${nm}</button>`).join('');
  $('#fsRow').innerHTML=FS.map(([id,nm])=>`<button class="btn ghost sm" data-f="${id}" style="${cf===id?'border-color:var(--acc);color:var(--acc)':''}">${nm}</button>`).join('');
  $('#themeRow').querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>applyTheme(b.dataset.t));
  $('#fsRow').querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>applyFont(b.dataset.f)); }
function buildVoicePicker(){ loadVoices(); const zh=voices.filter(v=>/^zh|^cmn|^yue/i.test(v.lang));
  if(!zh.length) return '<div class="msg" style="margin:0">這裝置沒有可選的中文語音（iPhone Safari 常只有內建那種，仍可念）。</div>';
  return `<div class="row">中文 <select id="vZh" style="flex:1;min-width:150px">${zh.map(v=>`<option value="${esc(v.name)}"${voicePref.zh===v.name?' selected':''}>${esc(v.name)}（${v.lang}）</option>`).join('')}</select><button class="btn ghost sm" id="vTest">試聽</button></div>`; }
function wireVoicePicker(){ const z=$('#vZh'); if(z)z.onchange=()=>{voicePref.zh=z.value;localStorage.setItem('ankiVoice',JSON.stringify(voicePref));speak('這是中文語音試聽');}; const t=$('#vTest'); if(t)t.onclick=()=>speak('這是中文語音試聽'); }
function speak(t){ stopSpeak(); sayOnce(speakClean(t)); }
$('#btnTheme').onclick=()=>{ renderTheme(); $('#ovTheme').classList.add('show'); };
$('#btnVoice').onclick=()=>{ $('#voicePick').innerHTML=buildVoicePicker(); wireVoicePicker(); $('#vRate').value=speakRate; $('#vRateV').textContent=speakRate.toFixed(1)+'x'; $('#ovVoice').classList.add('show'); };
$('#vRate').oninput=e=>{ speakRate=+e.target.value; localStorage.setItem('ankiRate',speakRate); $('#vRateV').textContent=speakRate.toFixed(1)+'x'; };
document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>b.closest('.ov').classList.remove('show'));
$('#ovTheme').onclick=e=>{ if(e.target===$('#ovTheme'))$('#ovTheme').classList.remove('show'); };
$('#ovVoice').onclick=e=>{ if(e.target===$('#ovVoice'))$('#ovVoice').classList.remove('show'); };

/* ---- 啟動 ---- */
renderDocs();
async function checkUpdate(){ try{ const r=await fetch('read-version.json?_='+Date.now(),{cache:'no-store'}); if(!r.ok)return; const j=await r.json(),v=j&&j.v!=null?String(j.v):null; if(!v||v===APP_VERSION)return; const cur=new URL(location.href).searchParams.get('_v'); if(cur===v)return; const u=new URL(location.href);u.searchParams.set('_v',v);location.replace(u.toString()); }catch(e){} }
checkUpdate(); setInterval(checkUpdate,60000);
</script>
