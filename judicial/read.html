  (function(){ try{
    if(navigator.standalone===true||(window.matchMedia&&matchMedia('(display-mode: standalone)').matches)) document.documentElement.classList.add('standalone');

  }catch(e){} })();

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{ --bg:#100c0d;--panel:#1a1516;--panel2:#221b1c;--line:#332a2b;--tx:#ece3da;--mut:#9b8d84;--acc:#c8a86a;--acc2:#7d3a44;
    --green:#86a07c;--red:#b97070;--nav:#0c0809;--glow:#1a1314;--serif:"Cormorant Garamond","Noto Serif TC",Georgia,serif;--fs:1}
  html[data-theme="sapphire"]{--bg:#0a0d12;--panel:#141921;--panel2:#1b2230;--line:#28323f;--nav:#070a0e;--glow:#142033;--tx:#e7edf4;--mut:#8b97a8;--acc:#a7c4e6;--acc2:#33598a;--green:#82a37f;--red:#bd7a7a}
  html[data-theme="emerald"]{--bg:#0a0f0d;--panel:#121916;--panel2:#19211d;--line:#26312b;--nav:#070b09;--glow:#0f201a;--tx:#e7efe9;--mut:#8ba093;--acc:#7fc9a6;--acc2:#2e6b57;--green:#86a07c;--red:#bd7a7a}
  html[data-theme="amethyst"]{--bg:#0f0a12;--panel:#181320;--panel2:#1f1929;--line:#2e2738;--nav:#0a070d;--glow:#1c1430;--tx:#ece4f2;--mut:#9b8fa6;--acc:#c9a7e0;--acc2:#5e3a78;--green:#86a07c;--red:#bd7a7a}
  html[data-theme="graphite"]{--bg:#0e0f10;--panel:#17181a;--panel2:#1e2023;--line:#2c2f33;--nav:#090a0b;--glow:#191b1e;--tx:#e9ebee;--mut:#969aa0;--acc:#c2c7ce;--acc2:#474c54;--green:#86a07c;--red:#bd7a7a}
  html[data-theme="parchment"]{--bg:#ece3d2;--panel:#f6f0e5;--panel2:#fbf6ee;--line:#dccfb9;--nav:#e2d6c1;--glow:#f1ead9;--tx:#3a322a;--mut:#7c715f;--acc:#9c6f3a;--acc2:#7d3a44;--green:#5f7d57;--red:#a85a5a}
  html[data-fs="s"]{--fs:.92} html[data-fs="l"]{--fs:1.22} html[data-fs="xl"]{--fs:1.5}
  html,body{max-width:100%;overflow-x:hidden;-webkit-text-size-adjust:100%}
  body{font-family:"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;color:var(--tx);min-height:100vh;letter-spacing:.2px;
    background:radial-gradient(1200px 700px at 50% -10%,var(--glow) 0%,var(--bg) 60%);-webkit-font-smoothing:antialiased}
  *{transition:background-color .22s,border-color .22s,color .22s}
  .topnav{display:flex;gap:6px;background:var(--nav);padding:8px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;overflow-x:auto;padding-top:calc(8px + env(safe-area-inset-top,0px))}
  .topnav a{color:#9aa4b2;text-decoration:none;font-size:14px;font-weight:600;padding:9px 16px;border-radius:8px;white-space:nowrap}
  .topnav a:hover{background:#161922} .topnav a.active{background:color-mix(in srgb,var(--acc) 12%,transparent);color:var(--acc)}
  html.standalone .topnav{display:none}
  .wrap{max-width:1040px;margin:0 auto;padding:20px 18px 90px}
  h1{font-family:var(--serif);font-weight:600;font-size:30px} .sub{color:var(--mut);font-size:13px;letter-spacing:1.2px;margin-bottom:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 12px 30px -22px #000}
  .sec-h{font-family:var(--serif);font-weight:600;font-size:19px;margin-bottom:12px;display:flex;align-items:center;gap:9px}
  .sec-n{color:var(--acc);border:1px solid var(--acc);width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-family:var(--serif)}
  textarea{width:100%;min-height:150px;background:var(--panel2);border:1px solid var(--line);color:var(--tx);border-radius:10px;padding:12px;font-size:14px;line-height:1.7;font-family:inherit;resize:vertical;outline:none}
  textarea:focus{border-color:var(--acc)}
  .btn{background:var(--acc2);color:#f3e7e3;border:none;border-radius:9px;padding:11px 18px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn:hover{filter:brightness(1.1)} .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--tx)} .btn.ghost:hover{border-color:var(--acc)}
  .btn.sm{padding:7px 13px;font-size:13px}
  .row{display:flex;gap:9px;flex-wrap:wrap;align-items:center}

  .doc .tt{font-family:var(--serif);font-weight:600;font-size:15.5px;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .doc .tm{color:var(--mut);font-size:11.5px;margin-top:2px}
  .empty{color:var(--mut);text-align:center;padding:26px;font-size:14px;line-height:1.7}
  .chiprow{display:flex;gap:7px;flex-wrap:wrap}
  .shelfchip{font-size:13px;padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:var(--panel2);color:var(--mut);cursor:pointer;font-family:inherit}

  .stag{display:inline-block;font-size:11px;color:var(--acc);border:1px solid color-mix(in srgb,var(--acc) 32%,transparent);border-radius:9px;padding:0 6px;margin-right:4px}
  input[type=range]{accent-color:var(--acc2)} select{background:var(--panel2);border:1px solid var(--line);color:var(--tx);border-radius:8px;padding:7px 9px;font-family:inherit}

  .modebtn.on{color:#f3e7e3;background:var(--acc2)}
  .rtitle{font-family:var(--serif);font-weight:600;font-size:15px;color:var(--acc);flex:1;min-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rbody{padding:26px clamp(16px,4vw,52px) 44px}
  .para{font-size:calc(18px*var(--fs));line-height:2.05;color:var(--tx);text-align:left;margin-bottom:15px}
  .para.head{font-family:var(--serif);font-weight:600;font-size:calc(27px*var(--fs));color:var(--acc);text-align:center;margin:6px 0 22px}
  .para.tip{color:var(--green)}
  .para.point{color:var(--tx)}
  .para .hl{color:var(--acc);font-weight:700}
  /* 課本式（仿英文閱讀神器）：案例題目＝連續原文、解析＝下方小字註解、不打斷閱讀 */
  .factline{font-family:var(--serif);font-size:calc(21px*var(--fs));line-height:2.1;color:var(--tx);margin-top:10px;font-weight:500}
  .factline .sent{text-decoration:underline;text-decoration-color:color-mix(in srgb,var(--acc) 55%,transparent);text-decoration-thickness:1.5px;text-underline-offset:4px}
  .explline{font-size:calc(14px*var(--fs));line-height:1.7;color:var(--mut);padding-left:16px;margin:2px 0 8px;position:relative}

  .explline .hl{color:var(--acc);font-weight:600}
  .factline .hl{color:var(--acc);font-weight:700}
  /* 隱藏解析＝只讀連續原文題目 */
  html.hidetrans .explline{display:none}
  html.hidetrans .factline{margin-top:2px;line-height:2.05}
  .sent{border-radius:4px;padding:0 2px;cursor:pointer;transition:background-color .15s}
  .sent.cur{background:color-mix(in srgb,var(--acc) 28%,transparent);box-shadow:0 0 0 1px color-mix(in srgb,var(--acc) 42%,transparent)}
  .notesblk{margin-top:22px;border-top:1px dashed var(--line);padding-top:14px}
  .noteslbl{font-size:13px;color:var(--acc);font-weight:600;margin-bottom:8px}
  #rNote{width:100%;min-height:120px;background:var(--panel2);border:1px solid var(--line);color:var(--tx);border-radius:10px;padding:12px;font-size:calc(15px*var(--fs));line-height:1.7;font-family:inherit;resize:vertical;outline:none}
  #rNote:focus{border-color:var(--acc)}
  .rarrow{position:absolute;top:50%;transform:translateY(-50%);z-index:4;width:40px;height:84px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--mut);font-size:32px;cursor:pointer;font-family:var(--serif)}
  .rarrow.l{left:2px} .rarrow.r{right:2px} .rarrow:hover{color:var(--acc)}
  .rctrl{border-top:1px solid var(--line);padding:12px 14px calc(12px + env(safe-area-inset-bottom,0px));flex-shrink:0}
  .rctrl .main{display:flex;justify-content:center;align-items:center;gap:10px}
  .rctrl .sub{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap;color:var(--mut);font-size:12.5px}
  .prog{color:var(--mut);font-size:12px}
</style>

<div class="wrap">
  <div class="row" style="justify-content:space-between;align-items:flex-start">

<script>
"use strict";
const APP_VERSION='v12';
const LS='readDocs_v1';
const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const md=s=>esc(s).replace(/\*\*(.+?)\*\*/g,'<b class="hl">$1</b>');

/* ---- 資料 ---- */
let DOCS=load();
function load(){ try{return JSON.parse(localStorage.getItem(LS))||[];}catch(e){return [];} }
function save(){ try{
  const prev=localStorage.getItem(LS);
  // 保護：若目前是空的、但原本有資料，不覆蓋（避免任何情況把你的篇章洗掉），並留一份自動備份
  if((!DOCS||!DOCS.length) && prev && prev.length>4 && prev!=='[]'){ return; }
  if(prev && prev.length>4 && prev!=='[]') localStorage.setItem(LS+'_bak',prev);
  localStorage.setItem(LS,JSON.stringify(DOCS));
}catch(e){} }
/* 匯出 / 匯入 / 還原自動備份 */
$('#expBtn').onclick=()=>{ const data={app:'read',v:1,ts:Date.now(),docs:DOCS,shelves:SHELVES};
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'}); const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='申論朗讀器備份-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  $('#backupMsg').textContent='✓ 已匯出 '+DOCS.length+' 篇'; };
$('#impBtn').onclick=()=>$('#impFile').click();
function mergeDocs(docs,shelves){ const ids=new Set(DOCS.map(x=>x.id)); let add=0;
  (docs||[]).forEach(x=>{ if(x&&x.id&&!ids.has(x.id)){ DOCS.push(x); ids.add(x.id); add++; } });
  (shelves||[]).forEach(s=>{ if(s&&!SHELVES.includes(s)) SHELVES.push(s); }); saveShelves(); save();
  renderShelfBar(); renderDocs(); return add; }
$('#impFile').onchange=e=>{ const f=e.target.files[0]; if(!f)return; const rd=new FileReader();
  rd.onload=()=>{ try{ const d=JSON.parse(rd.result); const docs=Array.isArray(d)?d:d.docs; if(!Array.isArray(docs))throw 0;
    const add=mergeDocs(docs, d.shelves||[]); $('#backupMsg').textContent='✓ 匯入合併 '+add+' 篇（不覆蓋原本）';
  }catch(err){ $('#backupMsg').textContent='⚠ 檔案格式不對，讀取失敗'; } }; rd.readAsText(f); e.target.value=''; };
$('#restoreBtn').onclick=()=>{ const bak=localStorage.getItem(LS+'_bak');
  if(!bak){ $('#backupMsg').textContent='這台目前沒有自動備份可還原'; return; }
  try{ const arr=JSON.parse(bak); if(!Array.isArray(arr))throw 0;
    if(confirm('還原自動備份（'+arr.length+' 篇）？會與目前的合併，不刪除現有。')){ const add=mergeDocs(arr,[]); $('#backupMsg').textContent='✓ 還原並合併 '+add+' 篇'; }
  }catch(e){ $('#backupMsg').textContent='備份損毀，無法還原'; } };
const isMeta=l=>/^(沒問題|我將|好的[，,]|以下|接著為您|接續為您)/.test(l.trim());
const isHeader=l=>/^題型/.test(l.trim());
/* 把一段貼上文字依「題型」切成多篇 */
function splitDocs(text){
  const lines=text.split(/\r?\n/); const out=[]; let cur=null;
  for(let raw of lines){ const l=raw.trim(); if(!l) continue;
    if(isHeader(l)){ cur={title:l.replace(/：.*$/,'').slice(0,60),text:l+'\n'}; out.push(cur); }
    else if(cur){ cur.text+=l+'\n'; }
    else if(!isMeta(l)){ cur={title:l.slice(0,40),text:l+'\n'}; out.push(cur); }
  }
  return out.map(d=>({id:'d'+Math.random().toString(36).slice(2,9)+Date.now().toString(36),title:d.title,text:d.text.trim(),ts:Date.now()}));
}
/* 一篇 → 可朗讀段落（過濾空行/AI開場白） */
function segsOf(text){ return text.split(/\r?\n/).map(s=>s.trim()).filter(s=>s && !isMeta(s) && !/^[-=—─]{2,}$/.test(s)); }

/* ---- 清單 ---- */
/* ---- 書櫃 ---- */
let SHELVES=JSON.parse(localStorage.getItem('readShelves')||'[]');
let curShelf='全部', selDocs=new Set(), shelfTarget=[];
const saveShelves=()=>localStorage.setItem('readShelves',JSON.stringify(SHELVES));
const allShelves=()=>{ const set=new Set(SHELVES); DOCS.forEach(d=>(d.shelves||[]).forEach(s=>set.add(s))); return [...set]; };
const addShelf=n=>{ n=(n||'').trim(); if(n&&!SHELVES.includes(n)){SHELVES.push(n);saveShelves();} return n; };
const countInShelf=n=>DOCS.filter(d=>(d.shelves||[]).includes(n)).length;
function filteredDocs(){ const q=($('#q').value||'').trim(); let list=DOCS.slice().reverse();
  if(curShelf==='未分類') list=list.filter(d=>!(d.shelves&&d.shelves.length));
  else if(curShelf!=='全部') list=list.filter(d=>(d.shelves||[]).includes(curShelf));
  if(q) list=list.filter(d=>d.title.includes(q)||d.text.includes(q)); return list; }
function renderShelfBar(){
  let h=`<button class="shelfchip ${curShelf==='全部'?'on':''}" data-sf="全部">全部<span class="n">${DOCS.length}</span></button>`;
  h+=`<button class="shelfchip ${curShelf==='未分類'?'on':''}" data-sf="未分類">未分類<span class="n">${DOCS.filter(d=>!(d.shelves&&d.shelves.length)).length}</span></button>`;
  allShelves().forEach(s=> h+=`<button class="shelfchip ${curShelf===s?'on':''}" data-sf="${esc(s)}">${esc(s)}<span class="n">${countInShelf(s)}</span></button>`);
  h+=`<button class="shelfchip" id="newShelfChip">＋ 新書櫃</button>`;
  $('#shelfBar').innerHTML=h;
  $('#shelfBar').querySelectorAll('[data-sf]').forEach(b=> b.onclick=()=>{ curShelf=b.dataset.sf; renderShelfBar(); renderDocs(); });
  $('#newShelfChip').onclick=()=>{ const n=prompt('新書櫃名稱'); if(n&&addShelf(n)){ curShelf=n.trim(); renderShelfBar(); renderDocs(); } };
  const real=curShelf!=='全部'&&curShelf!=='未分類';
  $('#shelfManage').style.display=real?'flex':'none';
}
$('#shRename').onclick=()=>{ const o=curShelf, n=(prompt('書櫃改名為：',o)||'').trim(); if(!n||n===o)return;
  SHELVES=[...new Set(SHELVES.map(s=>s===o?n:s))]; DOCS.forEach(d=>{if(d.shelves)d.shelves=[...new Set(d.shelves.map(s=>s===o?n:s))];}); saveShelves(); save(); curShelf=n; renderShelfBar(); renderDocs(); };
$('#shDel').onclick=()=>{ const o=curShelf; if(!confirm('刪除書櫃「'+o+'」？（篇章不會刪，只是移出此櫃）'))return;
  SHELVES=SHELVES.filter(s=>s!==o); DOCS.forEach(d=>{if(d.shelves)d.shelves=d.shelves.filter(s=>s!==o);}); saveShelves(); save(); curShelf='全部'; renderShelfBar(); renderDocs(); };

function renderDocs(){
  const list=filteredDocs();
  $('#docList').innerHTML = list.length ? list.map(d=>{
    const tags=(d.shelves||[]).map(s=>`<span class="stag">${esc(s)}</span>`).join('');
    return `<div class="doc" data-id="${d.id}">
      <input type="checkbox" class="dchk" data-id="${d.id}" ${selDocs.has(d.id)?'checked':''}>
      <div class="t" data-open="${d.id}"><div class="tt">${d.note&&d.note.trim()?'📝 ':''}${esc(d.title)}</div><div class="tm">${tags}${segsOf(d.text).length} 段 ‧ ${new Date(d.ts).toLocaleDateString()}</div></div>
      <button class="btn sm" data-open="${d.id}">▶ 播</button>
      <button class="btn ghost sm" data-shelf="${d.id}">📚</button>
      <button class="btn ghost sm" data-del="${d.id}">刪</button>
    </div>`; }).join('') : '<div class="empty">這個書櫃還沒有篇章。上面貼上內容按「加入並收好」，或到「全部」勾選篇章加入書櫃。</div>';
  renderSelTools();
  $('#foot').textContent=`朗讀器 ${APP_VERSION} ‧ 共 ${DOCS.length} 篇 ‧ ${allShelves().length} 個書櫃 ‧ 存於本機`;
}
function renderSelTools(){ $('#selTools').style.display=selDocs.size?'flex':'none'; $('#selInfo').textContent='已選 '+selDocs.size; }
$('#docList').addEventListener('change',e=>{ const c=e.target.closest('.dchk'); if(!c)return;
  c.checked?selDocs.add(c.dataset.id):selDocs.delete(c.dataset.id); c.closest('.doc'); renderSelTools(); });
$('#docList').addEventListener('click',e=>{
  const sh=e.target.closest('[data-shelf]'); if(sh){ openShelfPicker([sh.dataset.shelf]); return; }
  const o=e.target.closest('[data-open]'); if(o){ openDoc(o.dataset.open); return; }
  const d=e.target.closest('[data-del]'); if(d){ if(confirm('刪除這篇？')){ DOCS=DOCS.filter(x=>x.id!==d.dataset.del); selDocs.delete(d.dataset.del); save(); renderShelfBar(); renderDocs(); } }
});
$('#assignBtn').onclick=()=>{ if(selDocs.size) openShelfPicker([...selDocs]); };
$('#selClr').onclick=()=>{ selDocs.clear(); renderDocs(); };
$('#selDel').onclick=()=>{ if(!selDocs.size)return; if(confirm('刪除勾選的 '+selDocs.size+' 篇？')){ DOCS=DOCS.filter(x=>!selDocs.has(x.id)); selDocs.clear(); save(); renderShelfBar(); renderDocs(); } };
$('#q').oninput=renderDocs;

/* 書櫃選擇器：對 shelfTarget（單篇或勾選多篇）多選加入/移出書櫃 */
function openShelfPicker(ids){ shelfTarget=ids; $('#shelfMsg').textContent='套用到 '+ids.length+' 篇（點書櫃可加入/移出，可多選）'; renderShelfPick(); $('#ovShelf').classList.add('show'); }
function renderShelfPick(){
  const docs=shelfTarget.map(id=>DOCS.find(d=>d.id===id)).filter(Boolean);
  const on=s=>docs.length&&docs.every(d=>(d.shelves||[]).includes(s));
  const list=allShelves();
  $('#shelfPick').innerHTML = list.length? list.map(s=>`<button class="shelfchip ${on(s)?'on':''}" data-s="${esc(s)}">${esc(s)}</button>`).join('') : '<span class="msg" style="margin:0">還沒有書櫃，下面新增一個。</span>';
  $('#shelfPick').querySelectorAll('[data-s]').forEach(b=> b.onclick=()=>toggleShelf(b.dataset.s));
}
function toggleShelf(s){ const docs=shelfTarget.map(id=>DOCS.find(d=>d.id===id)).filter(Boolean);
  const allHave=docs.length&&docs.every(d=>(d.shelves||[]).includes(s));
  docs.forEach(d=>{ d.shelves=d.shelves||[]; if(allHave)d.shelves=d.shelves.filter(x=>x!==s); else if(!d.shelves.includes(s))d.shelves.push(s); });
  save(); renderShelfPick(); renderShelfBar(); renderDocs(); }
$('#newShelfBtn').onclick=()=>{ const n=addShelf($('#newShelf').value); if(!n)return; $('#newShelf').value=''; if(!(shelfTarget.length&&shelfTarget.every(id=>{const d=DOCS.find(x=>x.id===id);return d&&(d.shelves||[]).includes(n);}))) toggleShelf(n); else { renderShelfPick(); renderShelfBar(); } };
document.querySelectorAll('#ovShelf [data-close]').forEach(b=>b.onclick=()=>$('#ovShelf').classList.remove('show'));
$('#ovShelf').onclick=e=>{ if(e.target===$('#ovShelf'))$('#ovShelf').classList.remove('show'); };
$('#addBtn').onclick=()=>{ const t=$('#inp').value; const ds=splitDocs(t);
  if(!ds.length){ $('#addMsg').textContent='⚠ 沒有可加入的內容'; return; }
  DOCS.push(...ds); save(); $('#inp').value=''; $('#addMsg').textContent=`✓ 加入 ${ds.length} 篇`; renderDocs(); };
$('#playRawBtn').onclick=()=>{ const t=$('#inp').value.trim(); if(!t){ $('#addMsg').textContent='⚠ 先貼上內容'; return; }
  openReader({title:'（未儲存）',lines:segsOf(t)}); };
$('#playAllBtn').onclick=()=>{ const src=filteredDocs().slice().reverse(); if(!src.length)return; const lines=[]; src.forEach(d=>{ lines.push('◆ '+d.title); lines.push(...segsOf(d.text)); });
  openReader({title:'連續朗讀 ‧ '+curShelf,lines}); };

/* ---- 朗讀器：整題顯示，逐句往下念、念到哪反白 ---- */
let R={units:[],idx:0,playing:false,title:''};
function openDoc(id){ const d=DOCS.find(x=>x.id===id); if(!d)return; openReader({title:d.title,lines:segsOf(d.text),id:d.id}); }
function kindOf(s){ if(/^題型|^◆/.test(s))return 'head'; if(/^💡|考場膝蓋反射/.test(s))return 'tip'; if(/^【.*】/.test(s))return 'point'; return ''; }
function splitSentences(line){ if(kindOf(line)) return [line];
  const p=line.replace(/([。！？])/g,'$1\u0001').split('\u0001').map(s=>s.trim()).filter(Boolean); return p.length?p:[line]; }
function openReader(o){ R.title=o.title; R.idx=0; R.playing=false; R.docId=o.id||null;
  R.units=[]; R.roles=[]; let html=''; let mode='body', bodyN=0;
  (o.lines||[]).forEach(line=>{ const k=kindOf(line);
    let cls, role;
    if(k==='head'){ cls='para head'; role='head'; mode='body'; bodyN=0; }
    else if(k==='tip'){ cls='para tip'; role='tip'; mode='tip'; }
    else if(mode==='tip'){ cls='para tip'; role='tip'; }
    else { const f=(bodyN%2===0); cls=f?'factline':'explline'; role=f?'fact':'expl'; bodyN++; }   // 交替：案例事實=正文、下一句解析=下方翻譯
    const sents=splitSentences(line);
    html+=`<div class="${cls}">`+ sents.map(s=>{ const i=R.units.length; R.units.push(s); R.roles.push(role);
      return `<span class="sent" data-i="${i}">${md(s.replace(/^◆\s*/,''))}</span>`; }).join(' ') +`</div>`;
  });
  if(R.docId) html+=`<div class="notesblk"><div class="noteslbl">📝 我的筆記 <span class="prog" id="noteState"></span></div><textarea id="rNote" placeholder="邊看邊寫筆記，會自動儲存…"></textarea></div>`;
  $('#rBody').innerHTML=html; $('#rTitle').textContent=R.title;
  $('#rRate').value=speakRate; $('#rRateV').textContent=speakRate.toFixed(1)+'x';
  wireNote();
  $('#readCard').style.display='block'; highlight(0); updateProg();
  $('#readCard').scrollIntoView({behavior:'smooth',block:'start'});   // 捲到沉浸閱讀區
}
let noteTimer=null;
function wireNote(){ const ta=$('#rNote'); if(!ta)return; const d=DOCS.find(x=>x.id===R.docId); if(d)ta.value=d.note||'';
  ta.oninput=()=>{ const dd=DOCS.find(x=>x.id===R.docId); if(!dd)return; dd.note=ta.value; $('#noteState').textContent='儲存中…';
    clearTimeout(noteTimer); noteTimer=setTimeout(()=>{ save(); $('#noteState').textContent='已儲存 ✓'; },400); }; }
function highlight(i){ const b=$('#rBody'); b.querySelectorAll('.sent.cur').forEach(e=>e.classList.remove('cur'));
  const cur=b.querySelector('.sent[data-i="'+i+'"]'); if(cur){ cur.classList.add('cur');
    const ae=document.activeElement; if(!ae||ae.id!=='rNote') cur.scrollIntoView({block:'center',behavior:'smooth'}); } }
function updateProg(){ $('#rProg').textContent=(R.units.length?R.idx+1:0)+' / '+R.units.length; $('#rPlay').textContent=R.playing?'⏸ 暫停':'▶ 朗讀全文'; }
R.gen=0; R.mode='all';
function allowed(i){ const r=R.roles[i]; if(R.mode==='all')return true;
  if(R.mode==='q')return r==='fact'||r==='head'; if(R.mode==='a')return r==='expl'||r==='tip'; return true; }
async function play(){ if(!R.units.length)return; R.playing=true; const g=++R.gen; updateProg();
  while(R.playing && g===R.gen){
    if($('#readCard').style.display==='none'){ R.playing=false; break; }
    if(R.idx>=R.units.length){ R.playing=false; break; }
    if(!allowed(R.idx)){ R.idx++; continue; }   // 模式過濾：跳過不念的句子
    highlight(R.idx); updateProg();
    await sayOnce(speakClean(R.units[R.idx]));
    if(!R.playing || g!==R.gen) break;   // 被暫停或有新迴圈接手→退出，避免兩個迴圈搶反白
    R.idx++;
  }
  if(g===R.gen) updateProg();
}
document.querySelectorAll('.modebtn').forEach(b=>b.onclick=()=>{ R.mode=b.dataset.mode;
  document.querySelectorAll('.modebtn').forEach(x=>x.classList.toggle('on',x===b));
  if(R.playing){ pause(); play(); } });
function pause(){ R.playing=false; R.gen++; stopSpeak(); updateProg(); }   // gen++ 讓正在等待的舊迴圈確實結束
function goto(i,keepPlaying){ const was=keepPlaying!=null?keepPlaying:R.playing; pause();
  R.idx=Math.max(0,Math.min(R.units.length-1,i)); highlight(R.idx); updateProg(); if(was) play(); }
function rnav(d){ goto(R.idx+d); }
$('#rBody').addEventListener('click',e=>{ const s=e.target.closest('.sent'); if(!s)return; goto(+s.dataset.i); });
$('#rPlay').onclick=()=>{ R.playing?pause():play(); };
$('#rBack').onclick=()=>rnav(-1); $('#rFwd').onclick=()=>rnav(1);
$('#rClose').onclick=()=>{ pause(); $('#readCard').style.display='none'; document.querySelector('#docList').scrollIntoView({behavior:'smooth',block:'start'}); };
$('#rFont').onclick=()=>cycleFont();
function updateTransBtn(){ const b=$('#rTrans'); if(!b)return; const hid=document.documentElement.classList.contains('hidetrans');
  b.textContent=hid?'解析🔒':'解析'; b.style.borderColor=hid?'':'var(--acc)'; b.style.color=hid?'':'var(--acc)'; }
$('#rTrans').onclick=()=>{ const hid=document.documentElement.classList.toggle('hidetrans');
  localStorage.setItem('readHideTrans',hid?'1':'0'); updateTransBtn(); };
updateTransBtn();
$('#rRate').oninput=e=>{ speakRate=+e.target.value; localStorage.setItem('ankiRate',speakRate); $('#rRateV').textContent=speakRate.toFixed(1)+'x'; };

/* ---- 語音 ---- */
let voices=[]; function loadVoices(){ try{voices=speechSynthesis.getVoices();}catch(e){voices=[];} }
loadVoices(); if(window.speechSynthesis) speechSynthesis.onvoiceschanged=loadVoices;
let voicePref=JSON.parse(localStorage.getItem('ankiVoice')||'{}');
let speakRate=parseFloat(localStorage.getItem('ankiRate')||'1');
function bestVoice(){ const c=voices.filter(v=>/^zh|^cmn|^yue/i.test(v.lang)); if(voicePref.zh){const p=c.find(v=>v.name===voicePref.zh);if(p)return p;} return c.find(v=>v.lang==='zh-TW')||c[0]||null; }
function speakClean(t){ return String(t)
  .replace(/\*\*/g,'').replace(/💡/g,'').replace(/[【】◆]/g,'').replace(/^題型\s*/,'題型，')
  .replace(/\$\s*\\?rightarrow\s*\$/g,'，則，').replace(/→/g,'，則，')
  .replace(/§\s*(\d+)(?:-(\d+))?/g,(m,a,b)=>'第'+a+(b?'之'+b:'')+'條')
  .replace(/Ⅰ/g,'第一項').replace(/Ⅱ/g,'第二項').replace(/Ⅲ/g,'第三項').replace(/Ⅳ/g,'第四項')
  .replace(/[#\x60]/g,'').replace(/\s+/g,' ').trim(); }
function sayOnce(text){ return new Promise(res=>{ if(!text||!window.speechSynthesis){res();return;}
  try{ const u=new SpeechSynthesisUtterance(text); u.lang='zh-TW'; u.rate=speakRate; const v=bestVoice(); if(v)u.voice=v; u.onend=res; u.onerror=res; speechSynthesis.speak(u); }catch(e){res();} }); }
function stopSpeak(){ try{speechSynthesis.cancel();}catch(e){} }

/* ---- 外觀 / 字級 / 語音 modal ---- */
const THEMES=[['wine','酒紅'],['sapphire','藍寶石'],['emerald','翡翠'],['amethyst','紫晶'],['graphite','石墨'],['parchment','羊皮紙']];
const FS=[['s','小'],['m','中'],['l','大'],['xl','特大']];
function applyTheme(t){ localStorage.setItem('ankiTheme',t); if(t==='wine')document.documentElement.removeAttribute('data-theme'); else document.documentElement.setAttribute('data-theme',t); renderTheme(); }
function applyFont(f){ localStorage.setItem('ankiFont',f); if(f==='m')document.documentElement.removeAttribute('data-fs'); else document.documentElement.setAttribute('data-fs',f); renderTheme(); }
function cycleFont(){ const o=['m','l','xl','s'],cur=localStorage.getItem('ankiFont')||'m'; applyFont(o[(o.indexOf(cur)+1)%o.length]); }
function renderTheme(){ const ct=localStorage.getItem('ankiTheme')||'sapphire', cf=localStorage.getItem('ankiFont')||'m';
  $('#themeRow').innerHTML=THEMES.map(([id,nm])=>`<button class="btn ghost sm ${ct===id?'':''}" data-t="${id}" style="${ct===id?'border-color:var(--acc);color:var(--acc)':''}">${nm}</button>`).join('');
  $('#fsRow').innerHTML=FS.map(([id,nm])=>`<button class="btn ghost sm" data-f="${id}" style="${cf===id?'border-color:var(--acc);color:var(--acc)':''}">${nm}</button>`).join('');
  $('#themeRow').querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>applyTheme(b.dataset.t));
  $('#fsRow').querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>applyFont(b.dataset.f)); }
function buildVoicePicker(){ loadVoices(); const zh=voices.filter(v=>/^zh|^cmn|^yue/i.test(v.lang));
  if(!zh.length) return '<div class="msg" style="margin:0">這裝置沒有可選的中文語音（iPhone Safari 常只有內建那種，仍可念）。</div>';
  return `<div class="row">中文 <select id="vZh" style="flex:1;min-width:150px">${zh.map(v=>`<option value="${esc(v.name)}"${voicePref.zh===v.name?' selected':''}>${esc(v.name)}（${v.lang}）</option>`).join('')}</select><button class="btn ghost sm" id="vTest">試聽</button></div>`; }
function wireVoicePicker(){ const z=$('#vZh'); if(z)z.onchange=()=>{voicePref.zh=z.value;localStorage.setItem('ankiVoice',JSON.stringify(voicePref));speak('這是中文語音試聽');}; const t=$('#vTest'); if(t)t.onclick=()=>speak('這是中文語音試聽'); }
function speak(t){ stopSpeak(); sayOnce(speakClean(t)); }
$('#btnTheme').onclick=()=>{ renderTheme(); $('#ovTheme').classList.add('show'); };
$('#btnVoice').onclick=()=>{ $('#voicePick').innerHTML=buildVoicePicker(); wireVoicePicker(); $('#vRate').value=speakRate; $('#vRateV').textContent=speakRate.toFixed(1)+'x'; $('#ovVoice').classList.add('show'); };
$('#vRate').oninput=e=>{ speakRate=+e.target.value; localStorage.setItem('ankiRate',speakRate); $('#vRateV').textContent=speakRate.toFixed(1)+'x'; };
document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>b.closest('.ov').classList.remove('show'));
$('#ovTheme').onclick=e=>{ if(e.target===$('#ovTheme'))$('#ovTheme').classList.remove('show'); };
$('#ovVoice').onclick=e=>{ if(e.target===$('#ovVoice'))$('#ovVoice').classList.remove('show'); };

/* ---- 啟動 ---- */
renderShelfBar(); renderDocs();
async function checkUpdate(){ try{ const r=await fetch('read-version.json?_='+Date.now(),{cache:'no-store'}); if(!r.ok)return; const j=await r.json(),v=j&&j.v!=null?String(j.v):null; if(!v||v===APP_VERSION)return; const cur=new URL(location.href).searchParams.get('_v'); if(cur===v)return; const u=new URL(location.href);u.searchParams.set('_v',v);location.replace(u.toString()); }catch(e){} }
checkUpdate(); setInterval(checkUpdate,60000);
</script>
